<script id="mamilas-verbatim-semantic-split">
(function(){
  const SPEAKERS='ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\\s+BİRDEN|IKISI\\s+BIRDEN|BOTH';
  const SPEAKER_START=new RegExp(`^\\s*(${SPEAKERS})(?:\\s*:\\s*|\\s+)([\\s\\S]*)$`,'i');
  const MARKER_START=/^\s*\[?\s*(?:SAHNE|SCENE|TEXT|text)\s*#?\s*\d{1,5}\s*\]?[:.\-]?\s*/i;
  function oneLine(s){return String(s||'').replace(/\r/g,'').replace(/[ \t]+/g,' ').trim()}
  function speakerName(s){
    s=String(s||'').toUpperCase().replace('OGRETMEN','ÖĞRETMEN').replace('IKISI BIRDEN','İKİSİ BİRDEN').replace('BOTH','İKİSİ BİRDEN').replace(/\s+/g,' ');
    return s;
  }
  function stripMarker(s){return String(s||'').replace(MARKER_START,'').trim()}
  function stripSpeaker(s){
    s=stripMarker(s);
    let m=s.match(SPEAKER_START);
    return m?oneLine(m[2]||''):oneLine(s);
  }
  function normRaw(s){
    return String(s||'').replace(/\r/g,'').split(/\n+/).map(oneLine).filter(Boolean).map(line=>stripSpeaker(line)).filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
  }
  function normScenes(scenes){return (scenes||[]).map(stripSpeaker).filter(Boolean).join(' ').replace(/\s+/g,' ').trim()}
  function audit(raw,scenes){
    let source=normRaw(raw),parsed=normScenes(scenes),ok=source===parsed,missing='';
    if(!ok){
      let a=source.split(' '),b=parsed.split(' '),i=0,j=0,miss=[];
      while(i<a.length&&miss.length<18){if(a[i]===b[j]){i++;j++;continue}miss.push(a[i]);i++}
      missing=miss.join(' ');
    }
    return {ok,sourceChars:source.length,parsedChars:parsed.length,missing};
  }
  function parseBlocks(raw){
    let lines=String(raw||'').replace(/\r/g,'').split(/\n+/).map(oneLine).filter(Boolean),blocks=[],cur=null;
    function flush(){if(cur&&oneLine(cur.text)){cur.text=oneLine(cur.text);blocks.push(cur)}cur=null}
    lines.forEach(line=>{
      let m=line.match(SPEAKER_START);
      if(m){flush();cur={speaker:speakerName(m[1]),text:oneLine(m[2]||'')};return}
      if(cur)cur.text=oneLine((cur.text?cur.text+' ':'')+line);
      else cur={speaker:'',text:line};
    });
    flush();
    return blocks;
  }
  function sentenceUnits(text){
    let s=oneLine(text),out=[],buf='',paren=0;
    for(let i=0;i<s.length;i++){
      let ch=s[i],next=s[i+1]||'';
      buf+=ch;
      if(ch==='(')paren++;
      if(ch===')')paren=Math.max(0,paren-1);
      if(/[.!?…]/.test(ch)&&!paren){
        if(/["”]/.test(next)){buf+=next;i++}
        let after=s[i+1]||'';
        if(!after||/\s/.test(after)){out.push(oneLine(buf));buf=''}
      }
    }
    if(oneLine(buf))out.push(oneLine(buf));
    return out.length?out:[s];
  }
  function semanticParts(unit,target){
    let s=oneLine(unit);
    let estimate=typeof estimateVO==='function'?estimateVO(s):0;
    if(estimate<=target)return [s];
    let parts=s.split(/(?<=[,;:])\s+/).map(oneLine).filter(Boolean);
    for(let i=0;i<parts.length-1;i++){
      if(/:$/.test(parts[i])){
        parts[i]=oneLine(parts[i]+' '+parts[i+1]);
        parts.splice(i+1,1);
      }
    }
    if(parts.length<2)parts=s.split(/\s+(?=(?:ve|veya|ama|Bu|Bugün|Birkaç|Plan|Kendini|Örnek|Kısa|Uzun|Seçtiğin|Senden|Başka|Bir)\b)/).map(oneLine).filter(Boolean);
    if(parts.length<2)return [s];
    let out=[],buf='';
    parts.forEach(p=>{
      let next=buf?buf+' '+p:p;
      let vo=typeof estimateVO==='function'?estimateVO(next):0;
      if(buf&&vo>target){out.push(oneLine(buf));buf=p}
      else buf=next;
    });
    if(buf)out.push(oneLine(buf));
    return out;
  }
  function parseScenes(raw){
    let lim=typeof getEngineLimits==='function'?getEngineLimits():{usable:8.5};
    let target=Math.max(6.6,(lim.usable||8.5)*0.88);
    let scenes=[];
    parseBlocks(raw).forEach(block=>{
      let units=sentenceUnits(block.text).flatMap(u=>semanticParts(u,target));
      let buf='';
      function push(txt){txt=oneLine(txt);if(txt)scenes.push((block.speaker?block.speaker+': ':'')+txt)}
      units.forEach(u=>{
        let next=buf?buf+' '+u:u;
        let vo=typeof estimateVO==='function'?estimateVO(next):0;
        if(buf&&vo>target){push(buf);buf=u}
        else buf=next;
      });
      if(buf)push(buf);
    });
    return scenes.map(oneLine).filter(Boolean);
  }
  function commit(raw,reason){
    let scenes=parseScenes(raw),coverage=audit(raw,scenes);
    try{if(typeof snapshot==='function')snapshot(reason||'semantic verbatim parse')}catch(e){}
    production.sceneRawSource=raw;
    production.sceneParsedClean=true;
    production.sceneCoverage=coverage;
    production.autoSplitReview={count:0,before:0,after:scenes.length,reason:'semantic lossless parser',at:new Date().toISOString()};
    production.scenes=scenes.join('\n\n');
    production.finalConfirmed=false;
    try{save();render();toast(coverage.ok?'VO birebir korundu · '+scenes.length+' sahne':'DİKKAT: metin coverage farkı var')}catch(e){}
  }
  window.mamilasParseLosslessScenes=parseScenes;
  window.saveRawScenes=function(){commit(document.getElementById('rawScenes')?.value??'','semantic raw save')};
  window.reSplitNow=function(){let raw=production.sceneRawSource||production.scenes||'';if(raw)commit(raw,'semantic resplit')};
  window.splitScenes=function(raw){
    let text=String(raw||'').trim();
    if(!text)return[];
    if(production&&production.sceneParsedClean&&text===(production.scenes||'').trim())return text.split(/\n\s*\n+/).map(oneLine).filter(Boolean);
    if(/\n\s*\n/.test(text)||SPEAKER_START.test(text))return parseScenes(text);
    return text.split(/\n\s*\n+/).map(oneLine).filter(Boolean);
  };
})();
</script>

}

<script id="mamilas-smart-screen-text">
(function(){
  function cleanBody(s){
    return String(s||'')
      .replace(/^\s*\[?\s*(?:SAHNE|SCENE|TEXT|text)\s*#?\s*\d{1,5}\s*\]?[:.\-]?\s*/i,'')
      .replace(/^\s*(?:ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\s+BİRDEN|IKISI\s+BIRDEN|BOTH)\s*:?\s*/i,'')
      .replace(/\s+/g,' ')
      .trim();
  }
  function trimText(s,max=34){
    s=String(s||'').replace(/[“”"]/g,'').replace(/\s+/g,' ').trim();
    if(s.length<=max)return s;
    let cut=s.slice(0,max+1),sp=cut.lastIndexOf(' ');
    return (sp>14?cut.slice(0,sp):s.slice(0,max)).replace(/[,.!?;:]+$/,'')+'...';
  }
  function suggestScreenText(raw){
    const body=cleanBody(raw),t=body.toLowerCase();
    let out=null,style='label',position='center',why='';
    const quoted=[...body.matchAll(/"([^"]{4,70})"/g)].map(m=>m[1].trim());
    if(/gelecekteki ben|kişisel gelişim yolculuğu/i.test(body)){out='Gelecekteki Ben';style='title';position='center';why='ana başlık'}
    else if(/kendi gelişim projemiz/i.test(body)){out='Kendi Gelişim Projemiz';style='title';position='center';why='ders başlığı'}
    else if(/hangi konuda daha iyi olmak istiyorum/i.test(body)){out='Hangi konuda daha iyi olmak istiyorum?';style='subtitle';position='bottom';why='kilit soru'}
    else if(/deneyim inceleme/i.test(body)){out='Deneyim İnceleme';style='label';position='top';why='kavram etiketi'}
    else if(/kısa vadeli plan/i.test(t)){out='Kısa Vadeli Plan';style='title';position='center';why='plan başlığı'}
    else if(/uzun vadeli plan/i.test(t)){out='Uzun Vadeli Plan';style='title';position='center';why='plan başlığı'}
    else if(/15 dakika|potaya atış/i.test(body)){out='Her gün 15 dk pratik';style='label';position='bottom';why='örnek adım'}
    else if(/okul takımına seçilecek/i.test(body)){out='1 yıl hedefi';style='label';position='bottom';why='uzun hedef'}
    else if(/dedektif gibi|etrafına bakmalısın/i.test(body)){out='Dedektif gibi bak';style='label';position='top';why='metafor etiketi'}
    else if(/plan yapmak|harita/i.test(body)){out='Plan = Harita';style='label';position='top';why='metafor etiketi'}
    else if(/en küçük.*adım/i.test(body)){out='En küçük adım ne?';style='subtitle';position='bottom';why='soru/CTA'}
    else if(/bir yıl sonra|nerede hayal/i.test(body)){out='1 yıl sonra nerede?';style='subtitle';position='bottom';why='soru/CTA'}
    else if(quoted.length && /belirledin mi|ne olurdu|hayal ediyorsun/i.test(body)){out=trimText(quoted[0],36);style='subtitle';position='bottom';why='ekran sorusu'}
    if(!out)return null;
    if(out.length>42)out=trimText(out,42);
    return {text:out,style,position,why};
  }
  function applySmartScreenText(force=false){
    let blocks=[];try{blocks=sceneBlocks()}catch(e){}
    let applied=[];
    production.sceneMeta=production.sceneMeta||{};
    blocks.forEach(b=>{
      let id=String(b.id),m=sceneMeta(id);
      if(!force && (String(m.screenText||'').trim()||m.screenTextDismissed))return;
      let s=suggestScreenText(b.rawText);
      if(!s)return;
      m.screenText=s.text;
      m.screenStyle=s.style;
      m.screenPosition=s.position;
      m.screenTextAuto=true;
      m.screenTextDismissed=false;
      applied.push({id,text:s.text,why:s.why});
    });
    production.smartScreenTextReview={count:applied.length,items:applied,at:new Date().toISOString()};
    production.finalConfirmed=false;
    return applied;
  }
  window.applySmartScreenText=applySmartScreenText;
  const oldClearSmart=window.clearSceneScreenText;
  window.clearSceneScreenText=function(id){
    let m=sceneMeta(id);
    m.screenText='';
    m.screenTextAuto=false;
    m.screenTextDismissed=true;
    m.screenStyle='label';
    m.screenPosition='center';
    production.finalConfirmed=false;
    try{save();render();toast('Bu sahnede video içi yazı kapatıldı')}catch(e){if(oldClearSmart)oldClearSmart(id)}
  };
  const oldSetTextSmart=window.setSceneTextMeta;
  window.setSceneTextMeta=function(id,key,val){
    let m=sceneMeta(id);
    m[key]=String(val||'');
    if(key==='screenText'){
      m.screenTextAuto=false;
      m.screenTextDismissed=!String(val||'').trim();
    }
    production.finalConfirmed=false;
    try{save()}catch(e){if(oldSetTextSmart)oldSetTextSmart(id,key,val)}
  };
  const oldSaveSmart=window.saveRawScenes;
  window.saveRawScenes=function(){
    if(oldSaveSmart)oldSaveSmart();
    let applied=applySmartScreenText(false);
    try{save();render();if(applied.length)toast(`Akıllı yazı önerdim: ${applied.length} sahne`)}catch(e){}
  };
  const oldResplitSmart=window.reSplitNow;
  window.reSplitNow=function(){
    if(oldResplitSmart)oldResplitSmart();
    let applied=applySmartScreenText(false);
    try{save();render();if(applied.length)toast(`Akıllı yazı önerdim: ${applied.length} sahne`)}catch(e){}
  };
  const oldRenderScenesSmart=window.renderScenes;
  if(typeof oldRenderScenesSmart==='function')window.renderScenes=function(){
    let html=oldRenderScenesSmart();
    const toolbarBtn=`<button class="btn sm" onclick="applySmartScreenText(true);save();render();toast('Akıllı yazılar yenilendi')">Akıllı Yazı Öner</button>`;
    html=html.replace('</div><div class="sceneList">',`${toolbarBtn}</div><div class="sceneList">`);
    let r=production&&production.smartScreenTextReview;
    if(r&&r.count){
      let sample=(r.items||[]).slice(0,4).map(x=>`text#${x.id}: ${x.text}`).join(' · ');
      let msg=`<div class="smartTextReview"><b>Akıllı yazı önerdim:</b> ${r.count} sahneye kısa video içi yazı eklendi. ${sample?sample:''} <button onclick="production.smartScreenTextReview=null;save();render()">Tamam</button></div>`;
      html=html.replace('<div class="sceneList">',msg+'<div class="sceneList">');
    }
    html=html.replace(/brief locked/g,function(){return 'brief locked'});
    html=html.replace(/<span class="sceneTag green">TEXT<\/span>/g,'<span class="sceneTag green">TEXT</span>');
    return html;
  };
  const oldDirectiveSmart=window.sceneDirectiveLine;
  if(typeof oldDirectiveSmart==='function')window.sceneDirectiveLine=function(b){
    let out=oldDirectiveSmart(b);
    let m=sceneMeta(b.id);
    if(String(m.screenText||'').trim() && !/TEXT TIMING:/.test(out)){
      out += `\nTEXT TIMING: Show only if it improves clarity. Keep it short, large, stable, high contrast. Avoid covering faces or key action.`;
    }
    return out;
  };
  if(typeof render==='function')setTimeout(()=>{try{render()}catch(e){console.error('mamilas smart screen text',e)}},0);
})();
</script>

(function(){

  function sharedBrain(kind){

Ana dil: Türkçe. IMAGE / MOTION / SUNO promptları Mami aksini istemedikçe İngilizce.

FINAL BRIEF READER
Aktif setup her zaman eski/stale bloklardan üstündür. Reference: X ise başka referansa ait eski güvenli çeviri bloğunu takip etme. Palette aktifse ışık, bounce, shadow temperature, material response, atmosphere ve emotional temperature olarak kullan. Reference production grammar verir; palette production light/color authority verir. Scene Editor direktifleri otomatik yorumdan üstündür.

REFERENCE / IP SAFETY
Reference kopya hedefi değil, production grammar kaynağıdır: kamera, ışık, materyal, ritim, staging, mood, dünya mantığı.
Protected character, logo, exact costume, exact frame, exact UI, franchise identity kopyalama.
Ama reference'ı generic mood'a da düşürme. Film/anime/oyun/dizi referansı güvenli şekilde subject-world sinyali taşımalı: dünya ölçeği, materyal, kamera, canlı türü/prop kategorisi, enerji ve renk mantığı görünmeli.

CREATIVE STANDARD
Her sahne tek güçlü görsel fikre sahip olmalı. Narration'ı düz resimleme; eğitim kavramını fiziksel, sinematik bir olaya çevir.
Generic classroom, boş oda, random glow, anlamsız particles, flat slide, cheap UI wall, generic child placeholder, aşırı kalabalık prop, belirsiz metafor ve sadece "cinematic beautiful" tarzı boş prompt yasak.
Her promptta subject, environment, lens/framing, light, palette behavior, material response, depth, composition, lip-sync safety ve motion-ready unresolved start state olmalı.

${characterPolicy()}

ON-SCREEN TEXT
Scene Editor ON-SCREEN TEXT verirse aynen kullan. Kısa, büyük, temiz, yüksek kontrast, seçilen pozisyonda, yüzleri ve ana aksiyonu kapatmadan. Uzun cümleleri ekrana basma. Random ekstra text üretme. Türkçe eğitim videosunda izinsiz İngilizce yazı oluşturma.

IMAGE PROMPT STANDARD
Image prompt bir START FRAME'dir, bitmiş aksiyon değil. Motion'a taşınabilecek gerilim, bekleyen hareket veya sebep-sonuç başlangıcı kur. Start frame üretim kalitesinde, okunur ve tek bakışta anlaşılır olmalı.

MOTION PROMPT STANDARD
Motion prompt onaylı image/start frame'den devam eder. Basit spine kullan: camera approach -> pause/focus -> main event -> environment reaction -> stable final hold. İki baskın hareketi geçme. Yüz, el, tipografi, kıyafet, karakter kimliği, mekan ve palette continuity korunur. Tail sessiz/stabil hold içindir.

ENGINE ROUTES
Nano Banana: premium 3D animated feature quality, clean staging, readable composition, stable child characters, controlled palette, material clarity.
Flux: photoreal skin/material, PBR, real lens, natural imperfection, credible documentary/commercial light.
Kling: start-frame based controlled motion, clear camera path, two dominant motions max, stable final.
Runway: concise action/camera/lens/light, moderate motion, stable identity.
Luma: spatial continuity, graceful camera path, environment persistence.

${outputRules()}

QUALITY AUDIT BEFORE ANSWERING
Sessizce kontrol et: tüm sahneler var mı, text# sırası doğru mu, phase doğru mu, palette ışık/gölgeye işliyor mu, reference güvenli çevrilmiş mi, screen text korunmuş mu, karakter/metafor override obey edilmiş mi, prompt blokları copy-ready mi, hiçbir boş başlık veya eski brief çakışması kalmış mı.

<script id="mamilas-inline-speaker-hardlock">
(function(){
  const SPEAKERS='ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\\s+BİRDEN|IKISI\\s+BIRDEN|BOTH';
  const INLINE=new RegExp(`([.!?…\\"”'])\\s+(${SPEAKERS})\\s*:`, 'gi');
  function splitInlineSpeakers(raw){
    return String(raw||'')
      .replace(INLINE, (m,p,sp)=>`${p}\n\n${sp.toUpperCase().replace('OGRETMEN','ÖĞRETMEN').replace('IKISI BIRDEN','İKİSİ BİRDEN')}:`)
      .replace(new RegExp(`([^\\n])\\s+(${SPEAKERS})\\s*:\\s+(?=[A-ZÇĞİÖŞÜ"“])`, 'gi'), (m,p,sp)=>`${p}\n\n${sp.toUpperCase().replace('OGRETMEN','ÖĞRETMEN').replace('IKISI BIRDEN','İKİSİ BİRDEN')}: `);
  }
  function stripAllSpeakerLabels(s){
    const re=new RegExp(`(^|\\s)(${SPEAKERS})\\s*:\\s*`, 'gi');
    return String(s||'').replace(re,' ').replace(/\s+/g,' ').trim();
  }
  function auditRaw(raw,scenes){
    let source=stripAllSpeakerLabels(raw).replace(/\s+/g,' ').trim();
    let parsed=(scenes||[]).map(stripAllSpeakerLabels).join(' ').replace(/\s+/g,' ').trim();
    let ok=source===parsed,missing='';
    if(!ok){
      let a=source.split(' '),b=parsed.split(' '),i=0,j=0,miss=[];
      while(i<a.length&&miss.length<18){if(a[i]===b[j]){i++;j++;continue}miss.push(a[i]);i++}
      missing=miss.join(' ');
    }
    return {ok,sourceChars:source.length,parsedChars:parsed.length,missing};
  }
  const oldParse=window.mamilasParseLosslessScenes;
  window.mamilasParseLosslessScenes=function(raw){
    let fixed=splitInlineSpeakers(raw);
    return oldParse?oldParse(fixed):String(fixed||'').split(/\n\s*\n+/).map(x=>x.trim()).filter(Boolean);
  };
  window.saveRawScenes=function(){
    let raw=document.getElementById('rawScenes')?.value??'';
    let fixed=splitInlineSpeakers(raw);
    let scenes=mamilasParseLosslessScenes(fixed);
    try{if(typeof snapshot==='function')snapshot('inline speaker split')}catch(e){}
    production.sceneRawSource=raw;
    production.sceneParsedClean=true;
    production.sceneCoverage=auditRaw(raw,scenes);
    production.autoSplitReview={count:0,before:0,after:scenes.length,reason:'inline speaker hardlock',at:new Date().toISOString()};
    production.scenes=scenes.join('\n\n');
    production.finalConfirmed=false;
    try{save();render();toast('Konuşmacılar ayrıldı · '+scenes.length+' sahne')}catch(e){}
  };
  window.reSplitNow=function(){
    let raw=production.sceneRawSource||production.scenes||'';
    if(!raw)return;
    let fixed=splitInlineSpeakers(raw);
    let scenes=mamilasParseLosslessScenes(fixed);
    production.sceneCoverage=auditRaw(raw,scenes);
    production.scenes=scenes.join('\n\n');
    production.sceneParsedClean=true;
    production.finalConfirmed=false;
    try{save();render();toast('Inline konuşmacılar yeniden ayrıldı')}catch(e){}
  };
  window.splitScenes=function(raw){
    let text=String(raw||'').trim();
    if(!text)return[];
    if(production&&production.sceneParsedClean&&text===(production.scenes||'').trim())return text.split(/\n\s*\n+/).map(x=>x.trim()).filter(Boolean);
    return mamilasParseLosslessScenes(splitInlineSpeakers(text));
  };
})();
</script>

<script id="mamilas-v367-lossless-parser-final">
(function(){
  'use strict';
  const SPEAKERS='ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\\s+BİRDEN|IKISI\\s+BIRDEN|BOTH';

  const SPEAKER_NOCOLON=/^\s*(ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\s+BİRDEN|IKISI\s+BIRDEN|BOTH)\s+(.+)$/;
  const MARKER=/^\s*\[?\s*(?:SAHNE|SCENE|TEXT|text)\s*#?\s*\d{1,5}\s*\]?[:.\-]?\s*/i;
  const HEADINGS=['Olumlu Cümle','Olumsuz Cümle','Çok Önemli Bir Karıştırma!','Sonuç','Görev Zamanı 🎯','Kısa Vadeli Plan','Uzun Vadeli Plan','Kısa Vadeli Plan (Hemen Şimdi!)','Uzun Vadeli Plan (Gelecekte!)'];
  function oneLine(s){return String(s||'').replace(/\r/g,'').replace(/[ \t]+/g,' ').replace(/\s+([,.;:!?])/g,'$1').trim();}
  function speakerName(s){return String(s||'').toUpperCase().replace('OGRETMEN','ÖĞRETMEN').replace('IKISI BIRDEN','İKİSİ BİRDEN').replace('BOTH','İKİSİ BİRDEN').replace(/\s+/g,' ');}
  function stripMarker(s){return String(s||'').replace(MARKER,'').trim();}
  function speakerMatch(p){let s=stripMarker(p),m=s.match(SPEAKER_COLON);if(m)return {speaker:speakerName(m[1]),body:oneLine(m[2]||'')};m=s.match(SPEAKER_NOCOLON);if(m)return {speaker:speakerName(m[1]),body:oneLine(m[2]||'')};return {speaker:'',body:oneLine(s)};}
  function protectStructure(raw){
    let s=String(raw||'').replace(/\r/g,'');
    s=s.replace(/([A-Za-zÇĞİÖŞÜçğıöşü])-\s*\n\s*([A-Za-zÇĞİÖŞÜçğıöşü])/g,'$1$2');
    s=s.replace(new RegExp('([.!?…\\"”’])\\s+('+SPEAKERS+')\\s*:', 'gi'), function(_,p,sp){return p+'\n\n'+speakerName(sp)+': ';});

    s=s.replace(/([.!?…])\s+(DEFNE|ARAS|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\s+BİRDEN|IKISI\s+BIRDEN|BOTH)\s+(?=[A-ZÇĞİÖŞÜİ"“])/g,function(_,p,sp){return p+'\n\n'+speakerName(sp)+': ';});
    s=s.replace(/^\s*(DEFNE|ARAS|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\s+BİRDEN|IKISI\s+BIRDEN|BOTH)\s+(?=[A-ZÇĞİÖŞÜİ"“])/gm,function(_,sp){return speakerName(sp)+': ';});
    HEADINGS.forEach(function(h){let esc=h.replace(/[.*+?^$()|[\]\\]/g,'\\$&');s=s.replace(new RegExp('([^\\n])\\s+('+esc+')(?=\\s*[–-]|\\s*$|\\s+["“])','g'),'$1\n\n$2');});

  }
  function paragraphs(raw){return protectStructure(raw).split(/\n\s*\n+/).map(function(p){return p.split(/\n+/).map(oneLine).filter(Boolean).join(' ');}).map(oneLine).filter(Boolean);}
  function sentenceUnits(text){

    let raw=s.split(/(?<=[,;:])\s+/).map(oneLine).filter(Boolean); if(raw.length<2)raw=s.split(/\s+(?=(?:ve|veya|ama|fakat|Bugün|Bu|Birkaç|Plan|Kendini|Örnek|Kısa|Uzun|Seçtiğin|Senden|Başka|Bir)\b)/).map(oneLine).filter(Boolean);
    if(raw.length<2)return [s]; let out=[],buf=''; raw.forEach(function(p){let next=buf?buf+' '+p:p;let nvo=typeof estimateVO==='function'?estimateVO(next):0;if(buf&&nvo>target){out.push(oneLine(buf));buf=p;}else buf=next;}); if(buf)out.push(oneLine(buf)); return out;

      function push(txt){txt=oneLine(txt); if(txt)scenes.push((speaker?speaker+': ':'')+txt);}
      units.forEach(function(u){let next=buf?buf+' '+u:u;let vo=typeof estimateVO==='function'?estimateVO(next):0;if(buf&&vo>target){push(buf);buf=u;}else buf=next;});
      if(buf)push(buf);
    });
    return scenes.map(oneLine).filter(Boolean);
  }
  function stripForAudit(s){let m=speakerMatch(s);return oneLine(m.body||'');}
  function normRaw(raw){return paragraphs(raw).map(stripForAudit).filter(Boolean).join(' ').replace(/\s+/g,' ').trim();}
  function normScenes(scenes){return (scenes||[]).map(stripForAudit).filter(Boolean).join(' ').replace(/\s+/g,' ').trim();}
  function audit(raw,scenes){let source=normRaw(raw),parsed=normScenes(scenes),ok=source===parsed,missing='';if(!ok){let a=source.split(' '),b=parsed.split(' '),i=0,j=0,miss=[];while(i<a.length&&miss.length<24){if(a[i]===b[j]){i++;j++;}else{miss.push(a[i]);i++;}}missing=miss.join(' ');}return {ok:ok,sourceChars:source.length,parsedChars:parsed.length,missing:missing};}
  function commit(raw,reason){let scenes=parseScenes(raw),cov=audit(raw,scenes);try{if(typeof snapshot==='function')snapshot(reason||'v367 lossless parse')}catch(e){} production.sceneRawSource=raw;production.sceneParsedClean=true;production.sceneCoverage=cov;production.autoSplitReview={count:0,before:0,after:scenes.length,reason:'v367 paragraph-safe lossless parser',at:new Date().toISOString()};production.scenes=scenes.join('\n\n');production.finalConfirmed=false;try{save();render();toast(cov.ok?'VO birebir korundu · '+scenes.length+' sahne':'DİKKAT: metin coverage farkı var')}catch(e){} return scenes;}
  window.mamilasParseLosslessScenes=parseScenes;
  window.splitScenes=function(raw){let text=String(raw||'').trim();if(!text)return[];if(production&&production.sceneParsedClean&&text===(production.scenes||'').trim())return text.split(/\n\s*\n+/).map(oneLine).filter(Boolean);return parseScenes(text);};
  window.saveRawScenes=function(){return commit(document.getElementById('rawScenes')?.value??'','v367 raw save');};
  window.reSplitNow=function(){let raw=production.sceneRawSource||production.scenes||'';if(raw)return commit(raw,'v367 resplit');};

  window.setScenes=function(a,reason){let scenes=(a||[]).map(oneLine).filter(Boolean);let raw=production.sceneRawSource||scenes.join('\n\n');production.sceneCoverage=audit(raw,scenes);production.scenes=scenes.join('\n\n');production.sceneParsedClean=true;production.finalConfirmed=false;try{save();render();if(reason&&window.toast)toast('Sahneler güncellendi')}catch(e){}};

<script id="mamilas-v368-warning-reference-final">
(function(){
  'use strict';
  function warnIndices(){
    let blocks=[];try{blocks=sceneBlocks()}catch(e){}
    return blocks.map(function(b,i){return {b:b,i:i};}).filter(function(x){return x.b&&x.b.warning&&x.b.warning[0]!=='OK'&&x.b.warning[0]!=='-';});
  }
  window.jumpFirstWarning=function(){
    const list=warnIndices();
    if(!list.length){try{toast('Uyarı yok')}catch(e){};return;}
    if(typeof window.__mamilasWarnCursor!=='number')window.__mamilasWarnCursor=0;
    if(window.__mamilasWarnCursor>=list.length)window.__mamilasWarnCursor=0;
    const pos=window.__mamilasWarnCursor;
    const item=list[pos];
    window.__mamilasWarnCursor=(pos+1)%list.length;
    try{jumpScene(item.i)}catch(e){
      let el=document.querySelector('[data-scene="'+item.i+'"]');
      if(el){el.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(function(){try{el.focus()}catch(_e){}},180);}
    }
    try{toast('Uyarı '+(pos+1)+'/'+list.length+' · text#'+item.b.id)}catch(e){}
  };
  function resetWarnCursor(){window.__mamilasWarnCursor=0;}
  const oldSetScenes=window.setScenes;
  if(typeof oldSetScenes==='function')window.setScenes=function(){resetWarnCursor();return oldSetScenes.apply(this,arguments);};
  const oldSaveRaw=window.saveRawScenes;
  if(typeof oldSaveRaw==='function')window.saveRawScenes=function(){resetWarnCursor();return oldSaveRaw.apply(this,arguments);};
  const oldResplit=window.reSplitNow;
  if(typeof oldResplit==='function')window.reSplitNow=function(){resetWarnCursor();return oldResplit.apply(this,arguments);};

  function esc(s){return String(s??'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m];});}

  function refFormula(ref){
    if(!ref)return 'Use the selected reference only as production grammar: camera, light, material, motion rhythm and world logic. Do not copy IP or use lazy “X-inspired” style labels.';
    const name=String(ref.name||'');
    const lower=name.toLowerCase();
    let core='';
    if(lower.includes('one piece')) core='open-horizon adventure anime grammar: sunny sea-air depth, forward travel energy, expressive group-action composition, warm orange/blue contrast, cloth/rope/wood/wind material reactions. Use original education/adventure subjects; avoid straw hats, pirate flags, skull symbols, exact characters, exact ships or logos.';

    else if(lower.includes('naruto')) core='warm heroic training anime grammar: low horizon, team-energy blocking, wind/dust reaction, orange-blue contrast and fast but readable action beats. Use original school/training subjects; avoid headbands, symbols, jutsu names, exact outfits and characters.';
    else if(lower.includes('zootopia')) core='polished animal-city buddy-dynamic grammar: civic scale, mammal-proportion staging, warm urban daylight, clean comedic investigation rhythm. Use original animal-community metaphors; avoid exact rabbit/fox character designs, badges, logos and copied city landmarks.';
    else if(lower.includes('kung fu panda')) core='panda-valley training grammar: jade-gold nature, rounded martial-comedy timing, bamboo/stone/material contrast, low playful training camera. Use original panda/training subject category safely; avoid exact characters, outfits, logos and copied locations.';
    else core=[ref.cameraGrammar,ref.lightingGrammar,ref.materialGrammar,ref.motionGrammar].filter(Boolean).join('; ')||String(ref.look||'reference grammar');
    return name+'-inspired safe production grammar: '+core+' Selected palette '+palName()+' controls key light, bounce, shadow temperature, atmosphere and material color response; it must not erase the reference world logic. Use the reference name as an art-direction label, then translate it into concrete original scene grammar. Do not copy exact IP characters, logos, symbols, costumes, frames or branded designs.';
  }
  const oldBuildBrief=window.buildBrief;
  if(typeof oldBuildBrief==='function')window.buildBrief=function(){

      out=out.replace(/\nREFERENCE GRAMMAR\n/,'\n'+block+'\nREFERENCE GRAMMAR\n');

    if(typeof oldRenderDetail==='function')oldRenderDetail.apply(this,arguments);

})();

<script id="mamilas-v369-adaptive-warning-nav">

<script id="mamilas-v370-speaker-continuation-lock">
(function(){
  'use strict';
  const SPEAKER_RE=/^\s*(ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\s+BİRDEN|IKISI\s+BIRDEN|BOTH)\s*:\s*/i;
  function normSpeaker(s){return String(s||'').toUpperCase().replace('OGRETMEN','ÖĞRETMEN').replace('IKISI BIRDEN','İKİSİ BİRDEN').replace('BOTH','İKİSİ BİRDEN').replace(/\s+/g,' ');}
  function explicitSpeaker(s){let m=String(s||'').match(SPEAKER_RE);return m?normSpeaker(m[1]):'';}
  function stripSpeaker(s){return String(s||'').replace(SPEAKER_RE,'').trim();}
  function labelFor(s){return s==='İKİSİ BİRDEN'?'BOTH':s||'MIXED';}
  function collapseRepeatedSpeakerLabels(scenes){
    let active='';
    return (scenes||[]).map(function(raw){
      let s=String(raw||'').trim();
      let sp=explicitSpeaker(s);
      if(!sp)return s;
      let body=stripSpeaker(s);
      if(sp===active && sp!=='İKİSİ BİRDEN')return body;
      active=sp;
      return (sp+': '+body).trim();
    }).filter(Boolean);
  }
  const oldParse=window.mamilasParseLosslessScenes;
  if(typeof oldParse==='function')window.mamilasParseLosslessScenes=function(raw){return collapseRepeatedSpeakerLabels(oldParse(raw));};
  const oldSplit=window.splitScenes;
  window.splitScenes=function(raw){
    let scenes=oldSplit?oldSplit(raw):String(raw||'').split(/\n\s*\n+/).map(x=>x.trim()).filter(Boolean);
    if(production&&production.sceneParsedClean&&String(raw||'').trim()===(production.scenes||'').trim())return scenes;
    return collapseRepeatedSpeakerLabels(scenes);
  };
  window.detectSpeaker=function(s){let sp=explicitSpeaker(s);return labelFor(sp);};
  function inheritedSpeakerAt(scenes,index){
    let active='';
    for(let i=0;i<=index;i++){
      let sp=explicitSpeaker(scenes[i]);
      if(sp)active=sp;
    }
    return active;
  }
  window.sceneBlocks=function(){
    let scenes=splitScenes(production.scenes);
    return scenes.map(function(s,i){
      let id=detectId(s,i);
      let vo=estimateVO(s);
      let clip=clipTarget(vo);
      let tail=clip>0&&vo>0?+(clip-vo).toFixed(1):0;
      let inherited=inheritedSpeakerAt(scenes,i);
      let explicit=explicitSpeaker(s);
      let speaker=labelFor(explicit||inherited);
      let meta=sceneMeta(id);
      return {id:id,rawText:s,speaker:speaker,speakerExplicit:!!explicit,speakerInherited:!explicit&&!!inherited,charDirective:inferCharacterDirective({id:id,speaker:speaker,rawText:s}),metaphorDirective:meta.metaphor||'auto',charCount:s.length,voSecs:vo,clipSecs:clip,tailSecs:tail,seconds:vo,warning:durationWarning(vo),legacyWarning:sceneWarning(s),tags:sceneTags(s)};
    });
  };
  const oldSave=window.saveRawScenes;
  window.saveRawScenes=function(){
    if(oldSave)oldSave.apply(this,arguments);
    let scenes=collapseRepeatedSpeakerLabels((production.scenes||'').split(/\n\s*\n+/).map(x=>x.trim()).filter(Boolean));
    production.scenes=scenes.join('\n\n');
    production.sceneParsedClean=true;
    production.finalConfirmed=false;
    try{save();render();toast('Speaker devamları sadeleştirildi')}catch(e){}
    return scenes;
  };
  const oldResplit=window.reSplitNow;
  window.reSplitNow=function(){
    if(oldResplit)oldResplit.apply(this,arguments);
    let scenes=collapseRepeatedSpeakerLabels((production.scenes||'').split(/\n\s*\n+/).map(x=>x.trim()).filter(Boolean));
    production.scenes=scenes.join('\n\n');
    production.sceneParsedClean=true;
    production.finalConfirmed=false;
    try{save();render()}catch(e){}
  };
  const oldSetScenes=window.setScenes;
  window.setScenes=function(a,reason){
    let scenes=collapseRepeatedSpeakerLabels(a||[]);
    if(oldSetScenes)return oldSetScenes.call(this,scenes,reason);
    production.scenes=scenes.join('\n\n');production.sceneParsedClean=true;production.finalConfirmed=false;try{save();render()}catch(e){}
  };
})();
</script>

  window.buildImageRunCommand=function(){const brief=currentBrief();return clean([

    "```",

    "EXPECTED OUTPUT:",
    "<Kısa Türkçe cümle: Mami görselde somut olarak ne görmeli?>",
    "",
    "PRODUCTION NOTE:",
    "<Kısa Türkçe not: karakter görünürlüğü, kamera/lens, reference-palette davranışı, yazı varsa davranışı, lip-sync ve süre riski.>",
    "",
    "FINAL BRIEF",
    brief
  ].join("\n"));};
  window.buildMotionRunCommand=function(attached){const st=setupLine();return clean([
    attached?"MAMILAS MOTION RUN + ATTACHED APPROVED STILLS":"MAMILAS MOTION BRIEF-ONLY RUN",
    "Current phase: MOTION PHASE.",
    attached?"Use the attached approved stills as visual authority.":"If approved stills are attached, use them as visual authority. Otherwise use the clean source below conservatively.",

    "",
    "MOTION RESPONSE SHAPE",
    "[text#NNN] — Tag: Aras / Defne / Both / No visible character",
    "",
    "Plain text:",
    "```text",
    "ACTUAL ENGLISH "+st.motion+" MOTION PROMPT ONLY. Start from the approved still frame or described start frame. Replace this instruction with the finished motion prompt; never output this sentence, angle brackets, placeholders, labels, bullets, headings, markdown commentary, image prompt language, or new still-frame redesign.",
    "```",
    "",
    "MOTION NOTE:",

    "Motion lock: Never invent, add, or imply any object, character, prop, or environment element not present in the approved still frame. Every animated element requires still-frame authority.",

  window.copyRunCommand=function(kind){
    if(kind==="motion"||kind==="motionOnly"||kind==="motionBrief")return write(buildMotionRunCommand(false),"Motion Brief-only");
    if(kind==="motionAttached"||kind==="motionImages"||kind==="motionVisual")return write(buildMotionRunCommand(true),"Motion + Görsel");

    if(kind==="idea")return write("MAMILAS IDEA BUILDER\nUse the pasted project/request to create scene ideas, visual metaphors, reference options and production route. Do not generate final prompts yet.","Idea Builder");
    return write(buildImageRunCommand(),"Image Run");
  };
  window.mamilasSelfTest=function(){
    let scenes=[];try{scenes=sceneBlocks()}catch(e){}
    let brief="";try{brief=currentBrief()}catch(e){brief="ERR "+e.message}
    let image="";try{image=buildImageRunCommand()}catch(e){image="ERR "+e.message}

    return {scenes:scenes.length,sceneIds:scenes.slice(0,8).map(b=>"text#"+b.id),coverage:coverage,briefImageRun:/OUTPUT FORMAT — IMAGE RUN/.test(brief),briefOldPhase:/OUTPUT FORMAT — IMAGE PHASE/.test(brief),briefDebugLeak:/scene-id\s+\d+\s+health|SCENE INTELLIGENCE MAP|PRODUCTION INTELLIGENCE/i.test(brief),imageSingleCommand:/^MAMILAS IMAGE RUN/.test(image),imageHasFinalBrief:/FINAL BRIEF/.test(image),motionClean:/^MAMILAS MOTION/.test(motion)&&!/IMAGE PHASE|OUTPUT FORMAT — IMAGE RUN|MAMILAS IMAGE RUN/.test(motion),motionHasFence:/Plain text:\n```text/.test(motion),brainChars:brain.length,brainUnder8000:brain.length>1000&&brain.length<=8000,ok:scenes.length>0&&/OUTPUT FORMAT — IMAGE RUN/.test(brief)&&!/OUTPUT FORMAT — IMAGE PHASE/.test(brief)&&!/scene-id\s+\d+\s+health|SCENE INTELLIGENCE MAP|PRODUCTION INTELLIGENCE/i.test(brief)&&/^MAMILAS IMAGE RUN/.test(image)&&/FINAL BRIEF/.test(image)&&/^MAMILAS MOTION/.test(motion)&&!/IMAGE PHASE|OUTPUT FORMAT — IMAGE RUN|MAMILAS IMAGE RUN/.test(motion)&&/Plain text:\n```text/.test(motion)&&brain.length<=8000};
  };

<script id="mamilas-v376-speaker-vocabulary-cleaner">
(function(){
  "use strict";
  const SP="ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\\s+BİRDEN|IKISI\\s+BIRDEN|BOTH";
  const START=new RegExp("^\\s*("+SP+")\\s*:\\s*","i");
  function norm(sp){return String(sp||"").toUpperCase().replace("OGRETMEN","ÖĞRETMEN").replace("MUSTERI","MÜŞTERİ").replace("MÜSTERİ","MÜŞTERİ").replace("CUSTOMER","MÜŞTERİ").replace("CLIENT","MÜŞTERİ").replace("VELI","VELİ").replace("OGRENCI","ÖĞRENCİ").replace("IKISI BIRDEN","İKİSİ BİRDEN").replace("BOTH","İKİSİ BİRDEN").replace(/\s+/g," ");}
  function escRe(x){return String(x).replace(/[\\^$.*+?()[\]{}|]/g,"\\$&");}
  function cleanOne(raw){
    let s=String(raw||"").trim();
    let m=s.match(START); if(!m)return s;
    let sp=norm(m[1]);
    let re=new RegExp("\\s+"+escRe(sp)+"\\s*:\\s*","g");
    s=s.replace(START,sp+": ").replace(re," ");
    return s.replace(/\s+/g," ").trim();
  }
  function cleanList(list){return (list||[]).map(cleanOne).filter(Boolean);}
  const oldParse=window.mamilasParseLosslessScenes;
  if(typeof oldParse==="function")window.mamilasParseLosslessScenes=function(raw){return cleanList(oldParse(raw));};
  const oldSplit=window.splitScenes;
  window.splitScenes=function(raw){return cleanList(oldSplit?oldSplit(raw):String(raw||"").split(/\n\s*\n+/));};
  const oldDetect=window.detectSpeaker;
  window.detectSpeaker=function(s){let m=String(s||"").match(START); if(m){let n=norm(m[1]); return n==="İKİSİ BİRDEN"?"BOTH":n;} return oldDetect?oldDetect(s):"MIXED";};
  const oldSet=window.setScenes;
  window.setScenes=function(a,reason){return oldSet?oldSet.call(this,cleanList(a),reason):(production.scenes=cleanList(a).join("\n\n"));};
  const oldSave=window.saveRawScenes;
  window.saveRawScenes=function(){let r=oldSave?oldSave.apply(this,arguments):null;let scenes=cleanList((production.scenes||"").split(/\n\s*\n+/));production.scenes=scenes.join("\n\n");production.sceneParsedClean=true;try{save();render()}catch(e){}return scenes;};
})();
</script>
<script id="mamilas-v377-screen-text-budget-lock">
(function(){
  "use strict";
  const block=[
    "SCREEN TEXT BUDGET LOCK",
    "Default: no on-screen text. Do not turn normal objects, places, nature, rivers, props, emotions, character names, or narration words into typography.",
    "Use on-screen text only for production-critical moments Mami would otherwise build in After Effects: lesson title, definition, rule, short task, short question/CTA, or tiny concept label.",
    "Keep it short: preferably 1-4 words, max one short line. No long narration sentences, no paragraph text, no small UI walls, no random floating words.",
    "Across a normal lesson, only a minority of scenes should include text. When no screen text is needed, explicitly protect the image prompt with: no on-screen text, no extra typography.",
    "Scene Editor screen-text field overrides this rule: if Mami entered exact text, include that exact text and position only."
  ].join("\n");
  function add(txt){let s=String(txt||"");if(/SCREEN TEXT BUDGET LOCK/.test(s))return s;if(/ON-SCREEN TEXT POLICY/.test(s))return s.replace(/ON-SCREEN TEXT POLICY/,block+"\n\nON-SCREEN TEXT POLICY");if(/IMAGE PROMPT RULES/.test(s))return s.replace(/IMAGE PROMPT RULES/,block+"\n\nIMAGE PROMPT RULES");return s+"\n\n"+block;}
  const oldBrief=window.buildBrief;if(typeof oldBrief==="function")window.buildBrief=function(){return add(oldBrief.apply(this,arguments));};
  const oldBrain=window.buildMamilasBrainInstructions;if(typeof oldBrain==="function")window.buildMamilasBrainInstructions=function(){return add(oldBrain.apply(this,arguments));};
  const oldCurrent=window.mamilasProofLock;if(typeof oldCurrent==="function")window.mamilasProofLock=function(txt){return oldCurrent(add(txt));};
})();
</script>
