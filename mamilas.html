<style>

.logo{padding:22px 18px 16px;border-bottom:1px solid var(--line)}.mark{font-weight:950;font-size:24px;letter-spacing:-1.2px}.mark b{color:var(--gold)}.sub{font:10px var(--mono);color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:6px}
.nav{padding:10px;display:flex;flex-direction:column;gap:2px}.nav button{display:flex;gap:10px;align-items:center;text-align:left;padding:9px 10px;border-radius:var(--r8);color:var(--muted);position:relative}.nav button:hover{background:var(--s3);color:var(--text)}.nav button.on{background:linear-gradient(90deg,#f5c84222,transparent);color:var(--text)}.nav button.on:before{content:'';position:absolute;left:0;top:20%;height:60%;width:2px;background:var(--gold)}.step{width:22px;height:22px;border-radius:5px;background:var(--s3);border:1px solid var(--line2);display:grid;place-items:center;font:800 10px var(--mono);color:var(--muted)}.nav button.on .step{border-color:var(--gold);color:var(--gold);background:var(--goldsoft)}.nav b{font-size:12px}.nav small{display:block;font-size:10px;color:var(--muted)}.sideBottom{padding:14px 12px 16px;border-top:1px solid var(--line)}.bar{height:4px;border-radius:99px;background:var(--s3);overflow:hidden;margin:8px 0 12px}.fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green))}
.btn{background:var(--s3);border:1px solid var(--line2);border-radius:var(--r8);padding:8px 12px;font:800 12px var(--sans);transition:.14s}.btn:hover{background:var(--s4);border-color:var(--line3)}.btn.primary{background:var(--gold);border-color:var(--gold);color:#1a1100}.btn.danger{color:var(--red);background:#f54d6b10}.btn.ghost{background:transparent}.btn.sm{padding:5px 8px;font-size:11px}

input,textarea,select{width:100%;background:var(--s2);border:1px solid var(--line2);border-radius:var(--r8);padding:9px 10px;font-size:12px}textarea{min-height:120px;resize:vertical;font:12px/1.55 var(--mono)}label,.fieldLabel{display:block;font:900 10px var(--mono);color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:8px 0 5px}.fieldGrid{display:grid;gap:10px}.fieldGrid.g3{grid-template-columns:repeat(3,1fr)}.fieldGrid.g2{grid-template-columns:repeat(2,1fr)}.row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.copyBar{background:var(--s1);border:1px solid var(--line2);border-radius:var(--r12);padding:12px;margin-bottom:12px}.finalBox{background:#070809;border:1px solid var(--line2);border-radius:var(--r8);padding:16px;white-space:pre-wrap;max-height:650px;overflow:auto;font:11.5px/1.58 var(--mono);color:var(--text2)}.sw{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin:10px 0}.sw b{height:5px;border-radius:99px}.groupTitle{font:900 11px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:24px 0 10px}
.scene{background:var(--s1);border:1px solid var(--line2);border-radius:var(--r12);padding:14px;margin-bottom:10px}.scene.sourceLocked{border-left:3px solid var(--green)}.scene.warn{border-left:3px solid var(--gold)}.sceneHead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}.sid{font:900 11px var(--mono);color:var(--gold);background:var(--s3);border:1px solid var(--line2);border-radius:5px;padding:3px 7px}.sceneAdvanced{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.sceneAdvanced textarea{min-height:64px}.sourceMini{font:10px var(--mono);color:var(--muted);margin:6px 0;border-top:1px solid var(--line);padding-top:6px}
.section{padding:16px;border-bottom:1px solid var(--line)}.rtitle{font:900 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}.kv{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid var(--line);padding:6px 0}.kv span{font:900 10px var(--mono);color:var(--muted);text-transform:uppercase}.kv b{text-align:right;font-size:11px}.preview{height:246px;position:relative;overflow:hidden;background:radial-gradient(circle at 70% 20%,#ffffff14,transparent 38%),linear-gradient(145deg,#11131d,#050609);border-bottom:1px solid var(--line)}.pvChip{position:absolute;top:12px;left:12px;font:900 10px var(--mono);background:#0009;border:1px solid #fff2;color:#fff;border-radius:6px;padding:4px 8px}.pvPath{position:absolute;top:12px;right:12px;font:900 9px var(--mono);background:var(--gold);color:#1a1100;border-radius:6px;padding:4px 8px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pvLabel{position:absolute;bottom:12px;left:13px;right:13px;color:#fff;text-shadow:0 2px 12px #000;font-size:11px;font-weight:900}.orb{position:absolute;border-radius:50%;box-shadow:inset -12px -16px 30px #0009,0 10px 28px #000b}.line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}.grain:after{content:'';position:absolute;inset:0;opacity:.13;background-image:radial-gradient(#fff 0.5px,transparent 0.5px);background-size:6px 6px;mix-blend-mode:overlay}.halftone:after{content:'';position:absolute;inset:0;opacity:.16;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:9px 9px;mix-blend-mode:overlay}
.qHero{border:1px solid var(--line3);background:radial-gradient(circle at 15% 0%,#f5c84222,transparent 35%),linear-gradient(180deg,var(--s2),var(--s1));border-radius:var(--r16);padding:24px;margin-bottom:18px}.qScore{font:900 64px var(--mono);letter-spacing:-4px;color:var(--gold);line-height:1}.metric{display:grid;grid-template-columns:170px 1fr 52px;gap:10px;align-items:center;border-bottom:1px solid var(--line);padding:9px 0}.meter{height:6px;background:var(--s3);border-radius:99px;overflow:hidden}.meter b{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green));border-radius:99px}.qaResult{border-left:3px solid var(--gold);background:#070809;border-radius:8px;padding:12px;font:11.5px/1.55 var(--mono);white-space:pre-wrap;color:var(--text2)}.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:99px;font-weight:900;z-index:100}
.mob-bar,.mob-nav{display:none}
@media(max-width:1100px){.app{grid-template-columns:220px 1fr 300px}.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.app{display:flex;flex-direction:column}.side{display:none}.main{padding:12px 14px 108px}.right{position:fixed;bottom:60px;left:0;right:0;height:56vh;z-index:50;transform:translateY(110%);transition:.25s;border-top:1px solid var(--line3);border-radius:16px 16px 0 0}.right.open{transform:translateY(0)}.mob-bar{display:flex;position:sticky;top:0;z-index:60;align-items:center;gap:10px;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--line2)}.mob-logo{font-weight:900;font-size:18px}.mob-logo b{color:var(--gold)}.mob-spacer{flex:1}.mob-icon{width:36px;height:36px;display:grid;place-items:center;border:1px solid var(--line2);border-radius:8px;background:var(--s2)}.mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--s1);border-top:1px solid var(--line2);z-index:60;overflow:auto}.mob-nav button{min-width:58px;color:var(--muted);font:900 8px var(--mono);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}.mob-nav button.on{color:var(--gold)}.title{font-size:24px}.g2,.g3,.g4,.fieldGrid.g2,.fieldGrid.g3{grid-template-columns:1fr}.sceneAdvanced{grid-template-columns:1fr}.finalBox{max-height:430px}.card,.box{padding:13px}.metric{grid-template-columns:1fr}}

/* =========================
   MAMILAS QUANTUM RELEASE UI HARD POLISH
   Keeps v18 brain intact; upgrades cockpit feel, preview presence, focus states, mobile touch.
   ========================= */
:root{
  --bg:#030407;
  --s1:#080a0f;
  --s2:#0d1018;
  --s3:#151927;
  --s4:#202637;
  --line:#ffffff10;
  --line2:#ffffff1c;
  --line3:#ffffff34;
  --gold:#f7c948;
  --gold2:#d99a2b;
  --goldsoft:#f7c94814;
  --cinema-red:#9f1d2f;
  --glass:rgba(255,255,255,.045);
  --glass2:rgba(255,255,255,.075);
}
html{background:#030407}
body{
  background:
    radial-gradient(circle at 15% -10%, rgba(245,200,66,.11), transparent 34%),
    radial-gradient(circle at 85% 10%, rgba(91,159,255,.075), transparent 34%),
    radial-gradient(circle at 50% 115%, rgba(168,125,255,.08), transparent 40%),
    linear-gradient(180deg,#030407,#07080d 42%,#030407);
}
body:before{
  content:"";
  position:fixed; inset:0; pointer-events:none; z-index:-1;
  background-image:
    linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(circle at 50% 25%, black, transparent 78%);
}
.app{isolation:isolate}
.side,.right{
  background:
    linear-gradient(180deg,rgba(255,255,255,.035),transparent 18%),
    linear-gradient(180deg,#090b10,#050609);
  box-shadow:0 0 70px rgba(0,0,0,.48);
}
.logo{
  background:
    radial-gradient(circle at 18% 0%, rgba(245,200,66,.18), transparent 42%),
    linear-gradient(180deg,rgba(255,255,255,.03),transparent);
}
.mark{
  text-shadow:0 0 24px rgba(245,200,66,.13);
}
.sub:after{
  content:" · CINEMA COMMAND";
  color:var(--gold);
}
.nav button{
  border:1px solid transparent;
}
.nav button:hover{
  border-color:var(--line2);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
}
.nav button.on{
  border-color:rgba(245,200,66,.24);
  box-shadow:0 0 24px rgba(245,200,66,.055), inset 0 0 18px rgba(245,200,66,.035);
}
.main{
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.025), transparent 42%),
    linear-gradient(180deg,rgba(255,255,255,.012),transparent 30%);
}
.pageHead{
  padding:4px 0 2px;
}
.eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  padding:5px 9px;
  border:1px solid rgba(245,200,66,.28);
  border-radius:999px;
  background:rgba(245,200,66,.06);
}
.eyebrow:before{
  content:"";
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 14px var(--green);
}
.title{
  max-width:980px;
  text-shadow:0 18px 70px rgba(0,0,0,.75);
}
.desc{
  max-width:850px;
}
.card,.box,.copyBar,.scene{
  background:
    linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018)),
    linear-gradient(180deg,#0b0d13,#07080c);
  box-shadow:0 18px 70px rgba(0,0,0,.24);
  backdrop-filter: blur(10px);
}
.card:hover{
  box-shadow:0 22px 90px rgba(0,0,0,.36),0 0 36px rgba(245,200,66,.035);
}
.card.sel{
  background:
    radial-gradient(circle at 20% 0%, rgba(245,200,66,.18), transparent 44%),
    linear-gradient(180deg,#111018,#090a0f);
  box-shadow:
    0 0 0 1px rgba(245,200,66,.85),
    0 0 42px rgba(245,200,66,.10),
    inset 0 0 30px rgba(245,200,66,.035);
}
.btn{
  min-height:35px;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}
.btn.primary{
  background:linear-gradient(180deg,#ffe27a,#f5c842 46%,#c98c23);
  box-shadow:0 10px 36px rgba(245,200,66,.18);
}
.btn:active{transform:translateY(1px)}
input:focus,textarea:focus,select:focus{
  outline:none;
  border-color:rgba(245,200,66,.62);
  box-shadow:0 0 0 3px rgba(245,200,66,.10);
}
.finalBox,.qaResult{
  background:
    linear-gradient(180deg,rgba(255,255,255,.028),rgba(255,255,255,.01)),
    #050609;
  border-color:rgba(245,200,66,.18);
  box-shadow:inset 0 0 28px rgba(0,0,0,.42);
}
.preview{
  height:292px;
  background:
    radial-gradient(circle at 55% 18%, rgba(255,255,255,.16), transparent 25%),
    radial-gradient(circle at 26% 72%, rgba(245,200,66,.13), transparent 32%),
    linear-gradient(145deg,#151927 0%,#07090f 48%,#030407 100%);
}
.preview:before{
  content:"";
  position:absolute; inset:0; pointer-events:none;
  background:
    linear-gradient(90deg,transparent 0%,rgba(255,255,255,.08) 49%,transparent 52%),
    radial-gradient(circle at 50% 50%, transparent 44%,rgba(0,0,0,.56) 100%);
  opacity:.55;
}
.preview:after{
  content:"";
  position:absolute; inset:0; pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px);
  background-size:100% 8px;
  mix-blend-mode:overlay;
  opacity:.23;
}
.preview.grain:before{
  background:
    radial-gradient(circle at 68% 24%,rgba(245,164,66,.20),transparent 28%),
    radial-gradient(circle at 25% 70%,rgba(91,111,138,.18),transparent 36%),
    linear-gradient(135deg,rgba(0,0,0,.62),transparent 52%);
}
.preview.halftone:after{
  opacity:.22;
  background-image:radial-gradient(#fff 1px,transparent 1.2px);
  background-size:10px 10px;
}
.orb{
  filter:saturate(1.05) contrast(1.06);
}
.preview.grain .orb{
  border-radius:36% 64% 55% 45%;
  filter:contrast(1.18) saturate(.92);
}
.preview.halftone .orb{
  box-shadow:inset -12px -16px 30px #0009,0 10px 28px #000b, 8px 0 rgba(91,159,255,.15), -8px 0 rgba(245,77,107,.12);
}
.pvChip,.pvPath{
  z-index:2;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
}
.pvLabel{
  z-index:2;
  padding:8px 10px;
  border:1px solid rgba(255,255,255,.13);
  background:rgba(0,0,0,.34);
  backdrop-filter:blur(8px);
  border-radius:8px;
}
.qHero{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 14% 0%,rgba(245,200,66,.22),transparent 34%),
    radial-gradient(circle at 88% 18%,rgba(91,159,255,.12),transparent 32%),
    linear-gradient(180deg,#111522,#080a10);
  box-shadow:0 24px 110px rgba(0,0,0,.34), inset 0 0 0 1px rgba(255,255,255,.04);
}
.qHero:after{
  content:"";
  position:absolute; inset:auto -10% -40% -10%; height:60%;
  background:radial-gradient(ellipse at center, rgba(245,200,66,.09), transparent 70%);
  pointer-events:none;
}
.qScore{
  text-shadow:0 0 42px rgba(245,200,66,.22);
}
.metric{
  grid-template-columns:180px 1fr 58px;
}
.meter{
  background:rgba(255,255,255,.08);
  box-shadow:inset 0 0 10px rgba(0,0,0,.34);
}
.meter b{
  box-shadow:0 0 18px rgba(245,200,66,.15);
}
.scene.sourceLocked{
  box-shadow:0 18px 70px rgba(0,0,0,.22), inset 3px 0 0 rgba(77,245,160,.72);
}
.scene.warn{
  box-shadow:0 18px 70px rgba(0,0,0,.22), inset 3px 0 0 rgba(245,200,66,.72);
}
.sourceMini{
  background:rgba(255,255,255,.03);
  padding:7px 8px;
  border-radius:7px;
}
.toast{
  box-shadow:0 12px 44px rgba(0,0,0,.4);
}
.mob-bar{
  backdrop-filter:blur(14px);
}
@media(max-width:768px){
  .preview{height:220px}
  .main{background:linear-gradient(180deg,rgba(255,255,255,.018),transparent)}
  .btn{min-height:40px}
  input,textarea,select{font-size:16px}
}


/* =========================
   MAMILAS QUANTUM DIRECTOR OS
   10/10 category audit, command deck, denser hierarchy, director-grade readability.
   ========================= */
.auditGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px}
.auditCard{position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.052),rgba(255,255,255,.018)),#07090d;border:1px solid var(--line2);border-radius:16px;padding:16px;box-shadow:0 18px 75px rgba(0,0,0,.28)}
.auditCard:before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:linear-gradient(180deg,var(--gold),transparent)}
.auditHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
.auditHead h3{font-size:15px;margin:0}.auditScore{font:900 26px var(--mono);color:var(--gold);letter-spacing:-1px}
.auditCard p{color:var(--text2);font-size:12px}.auditCard ul{margin:10px 0 0 16px;color:var(--text2);font-size:12px}.auditCard li{margin:4px 0}
.commandDeck{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-bottom:18px}
.commandHero{background:radial-gradient(circle at 0% 0%,rgba(245,200,66,.19),transparent 35%),linear-gradient(180deg,#121724,#07090d);border:1px solid rgba(245,200,66,.26);border-radius:18px;padding:20px;box-shadow:0 24px 90px rgba(0,0,0,.35)}
.commandHero h2{font-size:26px;letter-spacing:-.7px;margin-bottom:8px}
.commandHero .micro{font:800 10px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.statusStack{display:grid;gap:8px}.statusLine{display:flex;justify-content:space-between;align-items:center;gap:10px;background:rgba(255,255,255,.035);border:1px solid var(--line2);border-radius:10px;padding:9px 10px}.statusLine span{font:800 10px var(--mono);color:var(--muted);text-transform:uppercase}.statusLine b{font-size:12px;text-align:right}
.roadmap{display:grid;gap:8px}.roadmap div{background:rgba(255,255,255,.035);border:1px solid var(--line2);border-radius:10px;padding:10px}.roadmap b{color:var(--gold)}
.finalBox{font-size:12px;line-height:1.62}
.scene textarea:nth-of-type(2){border-color:rgba(77,245,160,.28)}
.pvLabel:before{content:"PATH · ";color:var(--gold)}
.card h3{letter-spacing:-.15px}.card p{line-height:1.5}

function buildBrief(mode='full'){let a=active(), real=isRealPath(S.productionPath), integ=sourceIntegrity();let refs=(S.refMix||[S.reference]).map(id=>by(DATA.refs,id).name).join(' + ');return `MAMILAS PRODUCTION BRIEF\n\nCINEMATIC IDENTITY\nThis is not a prompt sheet. This is the production constitution for a path-aware AI video pipeline.\n\nACTIVE SETUP\nProject: ${a.project.name}\nClient / Brand: ${S.client||'-'}\nBrand / Product: ${S.brand||'-'}\nObjective: ${S.objective||'-'}\nAudience: ${S.audience||'-'}\nFormat: ${S.format||'Video'}\nDuration: ${S.duration||'-'}\nPlatform: ${S.platform||'-'}\nProduction Path: ${a.path.name} / ${S.productionPath}\nRealism / Stylization Level: ${real?'PHOTOREAL / LIVE ACTION / COMMERCIAL':'STYLIZED / ANIMATION / EDUCATION'}\nTone: ${a.project.tone}\nImage Engine: Nano Banana 2 / Gemini Image\nMotion Engine: Kling 3.0\nMusic Engine: Suno v5.5\n\nSOURCE INTEGRITY LAW\nRaw Source Characters: ${integ.rawChars}\nScene Source Characters: ${integ.sceneChars}\nRaw Hash: ${integ.rawHash}\nScene Hash: ${integ.reconHash}\nCoverage: ${integ.coverage}%\nRule: every submitted character must remain traceable through scene source locks. If coverage is below 100%, Proof must FAIL before production.\n\nPATH LOCK\nRequired Look: ${a.path.required}\nForbidden Look: ${a.path.forbidden}\nStylized Override / Hybrid Mode: ${S.hybridMode?'HYBRID OVERRIDE ACTIVE — stylized treatment intentionally selected.':'OFF'}\nPath Conflict Rule: Production Path is supreme. If a downstream prompt contradicts this path, Proof must FAIL it.\n\nWORLD / ENVIRONMENT\nWorld: ${a.world.name}\nWorld Formula: ${a.world.formula}\nRender Lock: ${a.world.render}\nMotion Behavior: ${a.world.motion}\nBest For: ${a.world.best}\nAvoid: ${a.world.avoid}\n\nREFERENCE DNA\nReference Mix: ${refs}\nPrimary Reference Category: ${a.ref.cat}\nUse: camera/light/staging/texture/rhythm/composition grammar only.\nAvoid: ${a.ref.avoid}\nDNA: ${a.ref.dna}\nTranslation: ${a.ref.use}\n\nPALETTE AS LIGHT PHYSICS\nPalette: ${a.palette.name}\nC0 Key Light: ${a.palette.c0}\nC1 Fill/Bounce: ${a.palette.c1}\nC2 Shadow/Depth: ${a.palette.c2}\nC3 Accent/Material Response: ${a.palette.c3}\nLighting Note: palette is light/material behavior, not decoration.\n\nCHARACTER / TAG POLICY\n${S.chars||'No fixed character lock unless user supplies @tag references.'}\n@aras / @defne / @logo / @mekan / @style / @kız / @erkek / custom @tag: visual authorities. Never rename, replace, redesign, or reinterpret tagged assets.\n\nTEXT / LOGO POLICY\n${textPolicy()}\n\nPATH-SPECIFIC QUALITY GATE\n${a.path.gate.map(x=>'- '+x).join('\n')}\n\nIMAGE PHASE CONSTITUTION\nImage agent reads Production Path before World.\n${real?'Real path: photoreal/live-action/commercial start frames with camera/lens, practical/studio light, real material/surface, product/human fidelity, location authenticity, brand role. No Pixar/clay/diorama language.':'Animation/Stylized path: obey selected path. Animation Education uses tactile metaphor, dominant lesson-object and world-explains; Stylized Premium uses IP-safe composition, silhouette, value separation, painterly/graphic texture and original staging.'}\nEach image prompt must preserve scene source intent, @tags, text/logo state, and motion hook.\n\nMOTION PHASE CONSTITUTION\nKling 3.0 i2v receives the approved Nano Banana 2 start frame; default unit is a short 5-6s visual beat, with split/Custom Multi-Shot for risky longer coverage.\n${real?'Real path: restrained filmic camera, dolly, rack focus, handheld micro-drift, parallax, product reflection pass, natural human action, edit-friendly hold.':'Animation path: world physics, material response, object life, controlled reveal, safe character movement.'}\nEvery motion prompt must finish the main action before a stable final hold.\n\nSOUND / MUSIC CONSTITUTION\n${real?'Suno v5.5: restrained documentary/commercial score, narration-safe, Custom Mode style layers, no vocals unless requested.':'Suno v5.5: warm educational motif or stylized cinematic bed, narration-safe, Custom Mode style layers, no vocals unless requested.'}\nInstrumentation & Structure: ${sunoDirective()}\n\nSCENE INTELLIGENCE MATRIX\n${sceneLines()}\n\nPROOFCHECK FAIL CONDITIONS\n${proofFailLines()}\n\nREVISION VOCABULARY\nAI video gibi = physical causality + motivated camera + stable final.\nplastik = material/skin/product surface failure.\ngerçek film gibi = lens/light/surface/context missing.\nreklam gibi = product/brand desire + surface fidelity.\nçok safe = stronger camera/scale/composition, not more random objects.\naynı olmuş = change archetype/lens/movement/transition.\nshow yap = controlled spectacle through camera/light/material.\nmorphing oldu = reduce moving elements and add exact negative.\nyazı bozuldu = freeze text/logo; move only light/camera.\ndrone gibi uçmuyor = add parallax, foreground pass, orbit, low tracking, not zoom.\n`}
function agentPacket(id){let a=active();let base=`MAMILAS ${id.toUpperCase()} DIRECTOR \nProduction Path is supreme: ${a.path.name} / ${S.productionPath}.\nScene Source Integrity is law: every [text#] carries source hash, char range, and Kling-safe beat adaptation.\nPreserve scene IDs, @tags, identity, logo, text, output order, and path lock.\nForbidden Look: ${a.path.forbidden}.\nQuality Gate: ${a.path.gate.join(', ')}.\n`;let map={idea:'You are the creative strategy brain. Decode weak client briefs, choose Production Path before scenario, produce 3 routes, recommend one, write scene architecture and MAMILAS handoff. Reject generic agency ideas.',master:'You are the final brief architect. Build a strict path-aware Final Brief with Source Integrity, Render Lock, Path Lock, World, Reference DNA, Palette Physics, Tags, Scene Matrix, Image/Motion rules and Proof fail lines.',image:'You are the image director. Read Production Path before World. Copy Render Lock verbatim. Real path = photoreal/commercial/live-action frames. Animation Education = tactile metaphor, lesson-object and motion-ready start frame. Stylized Premium = IP-safe composition, pose, silhouette, value separation, painterly/graphic texture, original staging. Output one block per [text#].',motion:'You are the Kling 3.0 motion director. Pure motion only. Short 5-6s visual beat aware; split 6s+ risky coverage. Real path = restrained filmic motion. Animation = material/world physics. Camera first 5 words. Finish main action before tail. Explicit stable final frame.',proof:'You are the strict QA gate. Return PASS/FIX/FAIL. Fail source loss, path contamination, skipped IDs, @tag replacement, weak render lock, text/logo morph risk, no stable final frame, generic AI-video smell.',suno:'You are the music director. Create narration-safe Suno v5.5 Custom Mode style direction by Production Path. Use modular style layers, no vocals unless requested, VO-safe mix.',client:'You are the client pitch wrapper. Convert the brief into sellable client-facing concept rationale, route summary, scene overview and approval text without exposing prompt mechanics.'};return base+'\n'+(map[id]||'Path-aware production agent.')+'\n\nFINAL BRIEF CONTEXT\n'+buildBrief()}
function fallbackCopy(txt){let t=document.createElement('textarea');t.value=txt;t.setAttribute('readonly','');t.style.position='fixed';t.style.left='-9999px';document.body.appendChild(t);t.select();try{document.execCommand('copy');toast('Copied')}catch(e){toast('Copy manually')}document.body.removeChild(t)}function copy(txt){try{if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(()=>toast('Copied')).catch(()=>fallbackCopy(txt))}else fallbackCopy(txt)}catch(e){fallbackCopy(txt)}}function download(name,txt,type='text/plain'){try{let a=document.createElement('a');let url=URL.createObjectURL(new Blob([txt],{type}));a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},500);toast('Export ready')}catch(e){copy(txt)}}
function qaScore(txt){txt=(txt||'');let score=55,notes=[];let lower=txt.toLowerCase();if(lower.includes('production path')||lower.includes('render lock'))score+=8;else notes.push('No Production Path / Render Lock signal.');if(/35mm|50mm|85mm|100mm|macro|lens|dolly|rack focus|handheld|orbit|tracking/i.test(txt))score+=8;else notes.push('Lens/camera language weak.');if(/practical light|studio light|key light|fill|rim|shadow|window light/i.test(txt))score+=8;else notes.push('Lighting not concrete.');if(/surface|texture|skin|fabric|geometry|reflection|material|condensation|viscosity/i.test(txt))score+=8;else notes.push('Material/surface fidelity weak.');if(/final frame|stable|hold|settle|tail/i.test(txt))score+=6;else notes.push('No stable final frame / tail hold.');if(isRealPath(S.productionPath)&&/pixar|clay|diorama|cartoon|toy-world/i.test(txt)){score-=20;notes.push('Real path contamination: stylized/Pixar language detected.')}if(/dynamic|cinematic|beautiful|engaging|vibrant/g.test(lower)){score-=5;notes.push('Empty adjectives detected.')}score=Math.max(0,Math.min(100,score));return {score,notes}}
function repairText(){let t=S.repairType||'AI video gibi';let real=isRealPath(S.productionPath);let fixes={'AI video gibi':'Replace generic zoom/glow with physical cause-effect, motivated camera, material response, and explicit stable final frame.','plastik':'Add matte/real material texture, natural skin/product surface fidelity, remove glossy CGI sheen.','gerçek değil':'Add lens, practical/studio light, authentic location/surface, human/product physics.','reklam gibi değil':'Add brand role, desire, product geometry/surface, reflection, clean negative space.','çok safe':'Increase camera path and scale/composition; do not add random objects.','aynı olmuş':'Change archetype, lens, camera direction, transition and motion beat; preserve identity.','morphing oldu':'Reduce moving elements to one; freeze text/logo/product/face; add exact negatives.','yazı bozuldu':'Freeze text/logo; allow only camera/light/reflection movement.','drone gibi uçmuyor':'Use parallax travel, foreground pass, orbit, low tracking, or object POV; not digital zoom.','source kaybı':'Return to Scene Ingest, use raw vault, verify coverage 100%, then regenerate scene IDs.'};return `REPAIR PATCH — ${t}\nPath: ${active().path.name}\nFix: ${fixes[t]||fixes['AI video gibi']}\nMode: ${real?'real/commercial filmic repair':'animation/stylized tactile repair'}\nCopy into agent: Revise the current output using this repair while preserving scene IDs, source lock, @tags, identity, logo/text, approved still, and Production Path.`}
function qSceneScore(s){let score=40;if((s.function||'').length>4)score+=8;if((s.visual||'').length>25)score+=12;if((s.risk||'').length>12)score+=8;if((s.vo||'').length>20)score+=8;if((s.sourceHash||'').length)score+=12;if(estimateSec(s.vo)<=KLING_WARN_SEC)score+=7;else score-=10;if((s.tags||s.logo||s.character||'').length>3)score+=5;return Math.min(100,Math.max(0,score))}function quantumMetrics(){let integ=sourceIntegrity();let scenes=S.scenes.map(qSceneScore),avg=scenes.reduce((x,y)=>x+y,0)/Math.max(1,scenes.length);let path=90;if(conflict())path-=30;if(isRealPath(S.productionPath)&&isStylizedWorld(S.world))path-=40;let agent=95;let data=70+(S.client?5:0)+(S.objective?10:0)+(S.audience?5:0)+(S.brand?5:0);let brief=70+(S.scenes.length>=3?8:0)+(avg>80?8:0)+(S.rawVault?7:0);let source=integ.ok?100:Math.max(0,integ.coverage-20);let risk=isRealPath(S.productionPath)?(S.productionPath==='PRODUCT_HERO'&&!S.brand?72:90):88;if(S.scenes.some(s=>estimateSec(s.vo)>KLING_HARD_SEC))risk-=12;return [['Path Fidelity',path],['Scene Intelligence',Math.round(avg)],['Source Integrity',source],['Client Data',Math.min(100,data)],['Brief Completeness',brief],['Agent Alignment',agent],['Production Risk Control',Math.max(0,risk)]]}function quantumScore(){let m=quantumMetrics();return Math.round(m.reduce((a,b)=>a+b[1],0)/m.length)}function quantumReportText(){let integ=sourceIntegrity();return `MAMILAS QUANTUM REPORT\nScore: ${quantumScore()}\nPath: ${active().path.name}\nProject: ${active().project.name}\nWorld: ${active().world.name}\nReference: ${active().ref.name}\nPalette: ${active().palette.name}\nSource Coverage: ${integ.coverage}%\nRaw Hash: ${integ.rawHash}\nScene Hash: ${integ.reconHash}\n\nMetrics:\n${quantumMetrics().map(x=>'- '+x[0]+': '+x[1]).join('\n')}\n\nNext Actions:\n${nextActions().map(x=>'- '+x).join('\n')}`}function nextActions(){let a=[];let integ=sourceIntegrity();if(!integ.ok)a.push('Fix source integrity: coverage must be 100%.');if(conflict())a.push('Resolve path/world conflict or enable hybrid intentionally.');if(!S.objective)a.push('Fill Objective for better brief.');if(!S.audience)a.push('Fill Audience for client-ready output.');if(S.scenes.some(s=>estimateSec(s.vo)>KLING_WARN_SEC))a.push('Split long VO into 5-6s visual beats before Kling.');if(S.scenes.some(s=>qSceneScore(s)<82))a.push('Run Shot Rhythm or Quantum Autofill for weak scenes.');if(S.productionPath==='PRODUCT_HERO'&&!S.brand)a.push('Enter product/brand name for Product Hero fidelity.');if(a.length===0)a.push('Export Final Brief and run Image/Motion agents.');return a}function quantumAutofill(){S.scenes=S.scenes.map((s,i)=>Object.assign(s,{function:s.function&&s.function!=='Build / Proof'?s.function:['Opening Hook','Rule Reveal','Proof Beat','Scale / Detail','Emotional Turn','Signature'][i]||'Production Beat',visual:s.visual&&s.visual.length>30?s.visual:(isRealPath(S.productionPath)?'A path-specific real-film visual event proving the idea through lens, light, surface, human/product/place behavior.':'A tactile world-explains event with one dominant lesson-object and one clear motion hook.'),risk:s.risk&&s.risk.length>15?s.risk:riskDefault(),estimatedSec:estimateSec(s.vo||s.source||''),clipPlan:planClip(estimateSec(s.vo||s.source||''))}));save();toast('Quantum Autofill applied');render()}

  window.renderRight=function(){let a=active(),integ=sourceIntegrity(),g=goldTarget(),rp=refPathRecs().map(id=>(safeBy(DATA.paths,id)||{}).name||id),rc=refPaletteRecs().map(id=>(safeBy(DATA.palettes,id)||{}).name||id);return `<aside class="right"><div class="preview ${previewClass()}" style="--pv0:${a.palette.colors[0]}44;--pv1:${a.palette.colors[1]}44;--pv2:${a.palette.colors[2]};--pv3:${a.palette.colors[3]}55"><div class="pvChip">MAMILAS</div><div class="pvPath">${a.path.name}</div><div class="orb" style="left:36px;top:72px;width:86px;height:86px;background:radial-gradient(circle at 35% 25%,${a.palette.colors[0]},${a.palette.colors[1]} 45%,#000 100%)"></div><div class="orb" style="right:38px;top:54px;width:120px;height:120px;background:radial-gradient(circle at 35% 25%,${a.palette.colors[2]},${a.palette.colors[3]} 55%,#000 100%)"></div><div class="line" style="left:30px;right:30px;bottom:52px"></div><div class="pvLabel">${a.project.name} · ${a.world.name}</div></div><div class="section"><div class="rtitle">Active Setup</div><div class="kv"><span>Project</span><b>${a.project.name}</b></div><div class="kv"><span>Path</span><b>${a.path.name}</b></div><div class="kv"><span>World</span><b>${a.world.name}</b></div><div class="kv"><span>Ref</span><b>${a.ref.name}</b></div><div class="kv"><span>Palette</span><b>${a.palette.name}</b></div><div class="kv"><span>Golden</span><b>${g?g.name:'-'}</b></div><div class="kv"><span>Q Score</span><b>${quantumScore()}</b></div><div class="kv"><span>Source</span><b>${integ.coverage}%</b></div></div><div class="section"><div class="rtitle">Connected DNA</div><p class="desc"><b>Ref → Paths:</b> ${rp.join(', ')||'-'}<br><b>Ref → Palettes:</b> ${rc.join(', ')||'-'}<br><b>Golden Match:</b> ${g?goldMatchScore(g):0}%</p></div><div class="section"><div class="rtitle">Quality Gate</div><p class="desc">${a.path.gate.join(', ')}</p></div><div class="section"><div class="rtitle">Forbidden</div><p class="desc">${a.path.forbidden}</p></div></aside>`};
  const oldBuildBrief=window.buildBrief;
  window.buildBrief=function(mode='full'){let a=active(),integ=sourceIntegrity(),g=goldTarget(),real=isRealPath(S.productionPath);let _f=(k,v)=>{v=(v==null?"":(""+v)).trim();return (!v||/^(-|n\/a|na|null|undefined)$/i.test(v))?"":k+": "+v+"\n";};let _cb=real?"":"CHARACTER DIRECTION (animation/education)\nThe world is the default; Aras/Defne are the exception, used only for curiosity, silent reaction, scale or emotional anchoring; closed-mouth safe; never both in every scene. Character budget for THIS episode is set by the director in the brief (e.g. \"Defne in scenes 1 and 6 only\"); if unset, keep characters minimal and let the world explain.\n\n";return `MAMILAS STRICT PRODUCTION BRIEF — CONNECTED QUALITY OS\n\nACTIVE SETUP\nProject: ${a.project.name}\n${_f("Client / Brand",S.client)}${_f("Objective",S.objective)}Production Path: ${a.path.name} / ${S.productionPath}\nWorld: ${a.world.name}\nReference Mix: ${selectedRefs().map(r=>r.name).join(' + ')}\nPalette: ${a.palette.name}\nGolden Target: ${g?g.name:'-'}\nWhy Gold: ${g?g.why_gold:'-'}\nGolden QA: ${g?(g.qa||[]).join(', '):'-'}\nReference → Best Paths: ${refPathRecs().join(', ')||'-'}\nReference → Best Palettes: ${refPaletteRecs().join(', ')||'-'}\n\nSOURCE INTEGRITY\nCoverage: ${integ.coverage}%\nRaw Hash: ${integ.rawHash}\nScene Hash: ${integ.reconHash}\nRule: path, references, palette and golden example must reinforce each other. If they conflict, Proof FAILS.\n\nWORLD / RENDER LOCK\n${a.world.render}\n\nPATH LOCK\nRequired: ${a.path.required}\nForbidden: ${a.path.forbidden}\n\nPALETTE AS LIGHT PHYSICS\nC0 Key: ${a.palette.c0}\nC1 Fill/Bounce: ${a.palette.c1}\nC2 Shadow/Depth: ${a.palette.c2}\nC3 Accent/Material Response: ${a.palette.c3}\n\n${_cb}IMAGE PHASE\n${real?'Real path: photoreal/live-action/commercial start frames with camera/lens, practical/studio light, real material, product/human fidelity.':'Animation/Stylized path: obey selected path. Animation Education uses tactile metaphor, dominant lesson-object and world-explains; Stylized Premium uses IP-safe composition, silhouette, value separation, painterly/graphic texture and original staging. Motion-ready start frame required.'}\nPrompt construction: state what the frame is ABOUT in one line, then build only what serves it — name the lens and why, the key light source/direction/hardness and what it carves, how the actual surface answers that light, and one element primed to move. No empty adjectives; every effect carries its physical cause.\n\nMOTION PHASE\nKling 3.0 i2v receives the approved Nano Banana 2 start frame; default unit is a short 5-6s visual beat. 6s+ is risk, 8s+ should be split or handled as Custom Multi-Shot. Main action finishes before final hold. Lock subject/element identity; prevent text/logo/face morphing.\n\nSOUND / MUSIC\nSuno: use Custom/Advanced style structure, section tags where relevant, narration-safe mix, no vocals unless explicitly requested.\n\nSCENE MATRIX\n${sceneLines()}\n\nPROOF FAIL CONDITIONS\n${proofFailLines()}\n`};
  window.agentPacket=function(id){let a=active(),g=goldTarget();let core=`MAMILAS ${id.toUpperCase()} DIRECTOR —  CREATIVE ENGINE\nYou are a working director with taste and authority on a real ${a.path.name} production. Your output is final-grade — it goes straight to Nano Banana / Kling / Suno with nobody fixing it after you. Decide what each shot is ABOUT before how it looks. A prompt that fills every field but has no idea is a failure; so is a clever idea that breaks a lock.\n\nSEE LIKE A DIRECTOR\n- One shot = one idea + one feeling. Name it, build only what serves it, cut the rest.\n- Specificity is the job. "Cinematic light" means you did not decide. Decide: which source, which direction, how hard, what it does to this surface.\n- Cause before effect. Light has a source, motion has a force, a reflection has something reflecting. Cannot name the cause? Delete the effect.\n- Restraint reads as money. One deliberate move beats five. Busy is amateur; certain is premium.\n- Build on one contrast per shot: light/dark, sharp/soft, still/moving, near/far, warm/cool.\n\nGENERATE THE NON-OBVIOUS — creative method, run it before you write\nMost prompts die at the first obvious image. Push past it with at least one move, motivated by the idea:\n- VANTAGE: refuse the default eye-level master. Where is the camera nobody expects but that reveals the idea — inside the object, beneath it, from what is being acted upon, too close, too far?\n- INVERSION: show the thing through its consequence, not itself. Hide the hero until it is earned. Reveal by absence.\n- LITERAL METAPHOR: take the abstract benefit and make it one physical object or event you can actually film.\n- MICRO-TRUTH: find the one small real human gesture that carries more feeling than any grand statement.\n- WITHHOLD: decide what you do not show, and how long you make them wait. The slow burn is a choice.\nTaste rule: surprising but inevitable. Bold but unmotivated = noise, kill it. Safe enough that anyone could have made it = push again.\n\nELEVATION MANDATE — good idea, perfect it; weak idea, rebuild it\nYou are not a typist for a weak brief. If the briefed visual is generic, deliver the elevated version that hits the same scene meaning, same @tags, same source text, same locks, and flag it in one line: "ELEVATED: what you upgraded and why". If the brief is already strong, sharpen it to perfection. Never downgrade identity, source integrity, text/logo, or the path.\n\nSELF-PROOF BEFORE YOU EMIT — you carry your own QA, no separate proof pass\nSilently run every block against this gate, fix, then output. Never show the checking.\n- Banned-word scan: cinematic, dynamic, beautiful, stunning, epic, vibrant, dramatic lighting, glowing particles, magical, 4K, ultra-detailed, masterpiece, immersive, breathtaking. Each hit -> the concrete thing it was hiding. (The banned list applies ONLY to generated prompt prose, never to fixed system, path, palette, reference or @tag names, or quoted brief metadata.)\n- Every effect names its cause. Every shot states one idea. One motivated move, not five.\n- Locks intact: scene IDs, @tags, identity, logo, exact text, output order, Kling-safe beat adaptation.\n- Path purity: zero forbidden-look words for ${a.path.name}. Stable final frame wherever motion applies.\nIf a block cannot pass, it is not done — fix it before it leaves you.\n\nCOHERENCE — you also hold the brief together, no separate master pass\nConfirm your output reinforces Production Path + World Render Lock + Palette-as-light + the Golden Standard. If the brief contradicts itself (real path but stylized world, etc.), do not ship mud: state the conflict in one line at the top, resolve toward the Production Path (it is supreme), and proceed.\n\nPRODUCTION LAWS (apply the ones that fit the active path; full bodies in KNOWLEDGE_07)\n- EPISODE ARC: before scene 1, read ALL scenes as one mini-film (opening curiosity -> concept -> build -> main comparison/transformation -> climax of understanding -> final teaching frame). Vary each scene's shot logic, scale and energy from the one before; never write isolated prompts.\n- TEACHING PATHS (ANIMATION_EDU / stylized education): the WORLD teaches, not talk and not text labels. Every scene carries a dominant OBJECT + a visible EVENT + a TRANSFORMATION or comparison, and answers: what should the child notice, which object carries the idea, what changes. Characters (Aras/Defne) are the EXCEPTION not the default -- use them only to anchor emotion, spark curiosity, react silently, close a beat or give scale; never decorative, never both in every scene; OBEY the character budget stated in the brief; closed-mouth safe.\n- PATH DOMINANCE: each path explains through its own grammar -- EDU: the world; ULTRAREAL_COMMERCIAL: the product (geometry/material/reflection/negative space); PRODUCT_HERO: the object as celebrity; ANIME/STYLIZED: composition (pose/silhouette/graphic rhythm/depth); DOCUMENTARY/CORPORATE: environment + observational restraint. Path overrides generic beauty.\n- REFERENCES = DNA, not copying: take staging, material logic, light behaviour, colour rhythm, camera grammar, emotional temperature, composition hierarchy; never copy protected characters, designs, logos or signature shots.\n- NULL FIELDS: never echo an empty field as content (no "Object: -", "Client: -"). Omit it, infer only if safe, or convert to a neutral instruction.\n\nNON-NEGOTIABLE LOCKS\nProduction Path is supreme: ${a.path.name} / ${S.productionPath}.\nRequired: ${a.path.required}\nForbidden: ${a.path.forbidden}\nQuality gate: ${a.path.gate.join(', ')}.\nSource Integrity is law: every [text#] keeps its source hash, char range, Kling-safe beat adaptation. @tags are visual authorities — never rename, redesign, or reinterpret.\n\nOUTPUT DISCIPLINE\nZero preamble, no "Sure, here is", no brief-restating. Straight onto the work, one clean block per [text#], in order. Think harder only on a risky beat, and never narrate the thinking.`;let persona={image:`ROLE — IMAGE DIRECTOR (Nano Banana 2 / Gemini start frames)\nYou author the still the motion is born from — the single frame that decides everything downstream. For EVERY [text#], think, then write in this order:\n1) IDEA (one line): what this frame is about, the one feeling, and the creative-method move you took to escape the obvious.\n2) FRAME + LENS: focal length with a reason (wide = scale/context, 35-50mm = honest presence, 85-100mm macro = intimacy/product), shot size, subject placement, and what sits in foreground AND background — depth is built; flat frames are the amateur tell.\n3) LIGHT AS PHYSICS: key source + direction + hardness + colour temperature + what it CARVES; then fill/bounce; then shadow shape. Light is the emotion — motivate every source.\n4) MATERIAL TRUTH: how this exact surface answers that light — pores, weave, condensation, aramid fibre, brushed metal, viscosity. Real lives here; plastic dies here.\n5) MOTION SEED: prime ONE element to move so Kling gets a clean hook, while the frame itself stays settled and stable.\n6) LOCKS + NEGATIVES: @tag identity held, logo/text frozen and legible, the path forbidden-look explicitly negated.\nREAL paths: a frame a DP shot on set — real lens, practical/studio light, true location, product/human fidelity. Never the words Pixar, clay, diorama. STYLIZED paths: IP-safe style grammar only — composition, pose, silhouette, value separation, painterly texture, graphic rhythm, depth and staging. Do not apply education/world-teaches/lesson-object logic unless the brief explicitly says stylized education. Never copy characters, costumes, logos, exact shots, or signature designs.\nTHE BAR — weak: "A cinematic shot of a premium phone case, dramatic lighting, ultra realistic, 4K." strong: "100mm macro, case upright on black velvet; one hard key from upper-left rakes the aramid weave so every fibre throws its own micro-shadow; a cool rim from behind peels the edge off the black; a single warm bounce keeps the logo plane legible; focus falls away past the side button; real micro-scratches catch the key — frozen, primed for a slow reflection pass."\n\nNANO BANANA 2 NATIVE RULES (Gemini 3.1 Flash Image)\nThis model builds ONE image from a described SCENE in natural language, follows instructions, and renders legible text well. It is NOT a tag/keyword model: semicolon spec-dumps and meta-labels hurt it. Identity comes from the attached @tag REFERENCE images, so describe the new scene, pose and light and do NOT re-describe a known character's face.\nRENDER-READY OUTPUT CONTRACT (this is exactly what the user pastes into Nano Banana 2)\nThink through idea, lens, motivated light, material, depth and locks INTERNALLY, and self-score against the image rubric silently. Then EMIT ONLY:\n1) One coherent natural-language paragraph: subject + lens (and why it serves the shot) + motivated light (source, direction, quality, temperature, what it carves) + real material texture + foreground/background depth + any on-screen text written in "quotes" exactly. State the photographic intent plainly, as if briefing a stills photographer.\n2) If useful, one short closing clause of what to avoid (no plastic skin, no cartoon, etc.).\nNEVER print the rubric labels (IDEA / LIGHT / SEED / LOCKS) or the self-score in the output. You MAY add ONE final line beginning "-- rationale:" with a single sentence for the human. Nothing else.\n\nON TEACHING PATHS: lead with the dominant lesson-object and the world, not a commercial hero shot -- the frame must make the child notice the one thing that carries the idea, and prime the EVENT the motion will complete. Characters only per the brief's budget, never decorative.`,motion:`ROLE — MOTION DIRECTOR (Kling 3.0, image-to-video)\nThe start frame already fixed identity, world and light. Your only job is what changes in time. Re-describing subject, environment or lighting makes Kling 3.0 re-render the anchor and morph it — so write pure motion and physical reaction, nothing else. The move IS the idea, not decoration. For EVERY [text#]:\n- CAMERA first: ONE motivated move that REVEALS the idea -- prefer inside-object, object POV, child-eye POV, consequence-to-cause, reverse reveal, scale reveal, hidden-mechanism reveal, over-the-lesson-object, or tactile macro-to-wide; a deliberate static/locked frame is valid. Classical moves (dolly, orbit, push-in, rack focus, tracking) are allowed ONLY when they reveal the idea, never as decoration. Never "dynamic camera".\n- THE ONE ACTION: one force, one thing it moves, then the chain of reaction (cause -> effect -> settle). Weight, momentum, gravity obeyed.\n- REVEAL TIMING: decide what arrives late. The withheld beat — a reflection that completes, a face that turns, the hero finally entering frame — is where the shot earns its life.\n- MATERIAL / LIGHT RESPONSE: surfaces and light answer the move — a highlight travelling the product, fabric settling, dust stirred in a rim. This is what sells real.\n- NEGATIVES: freeze what must not move — text, logo, face geometry, product shape, @tag identity — named so they hold.\n- LANDING: finish the main action, then an explicit stable final-frame hold that settles. Edit-friendly, never frozen mid-gesture.\nREAL paths: restrained filmic camera, natural human/product behaviour — restraint is the money. STYLIZED paths: world physics, object life, controlled reveal, safe character/lip movement.\nBanned moves: "camera moves dynamically", "things start glowing", "particles swirl", five moves at once.\nTHE BAR — weak: "Camera slowly zooms in, glowing particles appear, cinematic, dynamic." strong: "Slow dolly in along the case; as it nears, the upper-left key sweeps one bright reflection down the aramid weave, left to right; loose fibre dust lifts in the rim, stirred by the move; logo, text and product shape locked; the reflection lands on the logo as the camera settles; stable final hold."\n\nKLING 3.0 NATIVE RULES (image-to-video)\nThe start frame is a 3D anchor. Re-describing identity, world or light makes Kling re-render and MORPH it. A short i2v clip fractures if you stack many simultaneous events. So: ONE dominant motion, pure motion only, and a camera move that agrees with the subject's motion rather than fighting it.\nRENDER-READY OUTPUT CONTRACT (this is exactly what the user pastes into Kling 3.0)\nThink through camera, the single action and its physics, reveal timing, surface response, freezes and the settle INTERNALLY, and self-score against the motion rubric silently. Then EMIT ONLY:\n1) MOTION: one clean natural-language line — the camera move + the single dominant action + its physical settle, describing ONLY what changes in time. No re-description of subject, set or lighting.\n2) NEGATIVE: a short freeze/avoid list for Kling's negative-prompt field (morphing, warping text, changing face, changing logo, changing product shape, extra limbs, flicker).\nNEVER print the rubric labels (CAMERA / ACTION / REVEAL / TAIL) or the self-score. You MAY add ONE "-- rationale:" line. Nothing else.\n\nMOTION EVENT LAW: every motion prompt needs ONE primary physical EVENT -- the lesson/hero object must visibly change (liquid rises to a mark, paper unfolds into a map, blocks align, a hidden line is revealed, particles gather into a concept, a value snaps from guess to exact). Camera that moves while the object does nothing is a WEAK prompt. Finish the main event before the final hold.\nCREATIVE CAMERA: do NOT default to slow dolly / orbit / push-in / horizontal slide / light sweep. Prefer camera that reveals the idea: inside-object, object-POV, child-eye POV, consequence-to-cause, reverse reveal, scale reveal, hidden-mechanism reveal, macro-to-wide. (On commercial/product paths a restrained classical move is allowed when it serves the product.)`,suno:`ROLE — MUSIC DIRECTOR (Suno v5.5, Custom Mode)\nScore the feeling the picture already carries — never wallpaper over it. Decide the ONE emotional job of the music for this path, then find the non-obvious way to do it: sometimes near-silence and a single instrument, sometimes tempo deliberately against the cut, sometimes one motif that only pays off at the end. Build from modular Custom Mode layers: genre/era, named instrumentation, tempo + groove, texture/space, and an arc that breathes with the edit and earns its peak.\nAlways narration-safe: keep a clear midrange pocket for VO, duck under dialogue, no lyrics or vocals unless explicitly requested.\nName real instruments and playing styles, not moods: "felted upright piano, one sustained cello, brushed kit at 78 bpm, wide room reverb" — never "emotional uplifting music".\nREAL paths: restrained, confident documentary/commercial beds with real space. STYLIZED / EDU paths: a warm motif a child could hum, or a stylized cinematic bed with character.\nDeliver: a tight Style prompt, the section structure (intro / build / peak / resolve mapped to the scenes), and an exclude list (no vocals, no percussion clipping the VO, no genre drift).\nTHE BAR — weak: "Uplifting emotional cinematic background music." strong: "Solo felted piano, single line, 70 bpm, wide room; a low cello swell enters only at the product reveal; no drums until the final third, then a soft brushed kit; midrange left open for VO; resolve on one held piano note. Exclude: vocals, synth pads, busy percussion."\n\nSUNO v5.5 NATIVE RULES (Custom Mode)\nSuno wants a Style line and a Structure, not an essay. Name real instruments and playing styles, a bpm and groove, and the space; keep a midrange pocket for VO.\nRENDER-READY OUTPUT CONTRACT (this is exactly what the user pastes into Suno)\nDecide the one emotional job and self-score against the suno rubric INTERNALLY and silently. Then EMIT ONLY:\n1) STYLE: genre/era, named instruments + playing style, bpm + groove, texture/space — as one clean line for the Style box.\n2) STRUCTURE: intro / build / peak / resolve mapped to the scene beats.\n3) EXCLUDE: the negative styles (no vocals unless requested, no busy percussion clipping the VO, no genre drift).\nNEVER print "EMOTIONAL JOB" or the self-score in the output. You MAY add ONE "-- rationale:" line. Nothing else.`,idea:`ROLE — IDEA GENERATOR / CREATIVE STRATEGY DIRECTOR (brief-to-masterpiece)\nYou exist for serial production: the user hands you a fragment — one line, a topic, a product name, a date like "23 Nisan video", sometimes less — and you return a finished, masterpiece-grade creative concept with zero follow-up questions. Thin input is not a limitation; it is your license to author. You never reply "tell me more"; you decide, and you make the decision excellent.\n\nSTEP 1 — READ THE FRAGMENT, INFER THE REST\nFrom the fragment plus the active Production Path, Project, Audience and Tone in the brief, infer the real objective, the real audience feeling, and the single message. State your read in one line: "READ: <who this is for, what it must make them feel, the one message>". If you invented something the fragment did not say, that is correct — flag it: "ASSUMED: <x>". Never stall on missing data.\n\nSTEP 2 — FIND THE INSIGHT (not the topic)\nThe topic is what it is about; the insight is the human truth that makes anyone care. Dig one level under the obvious: what does the audience already feel that this can hook into? One sentence. A concept without an insight is decoration.\n\nSTEP 3 — GENERATE 3 REAL BETS (use the creative method)\nRun VANTAGE / INVERSION / LITERAL METAPHOR / MICRO-TRUTH / WITHHOLD against the insight and produce 3 genuinely different concepts — not 3 flavours of one safe idea:\n  A) EMOTIONAL route — the feeling-first concept.\n  B) CRAFT / SPECTACLE route — the concept that shows off image+motion+sound.\n  C) PROVOCATIVE / UNEXPECTED route — the concept a competitor would never dare.\nFor each: a one-line LOGLINE, the FEELING, and the single SIGNATURE SHOT that could only belong to that concept. Each must pass the test: could a competitor have pitched this? If yes, kill and regenerate.\n\nSTEP 4 — RECOMMEND ONE, DEFEND IT\nPick the strongest for this path and audience and defend it in 2-3 lines like a director in the room — why it wins, what it makes them feel, why it is right for serial output (memorable, repeatable, on-brand). Surprising but inevitable.\n\nSTEP 5 — BUILD THE SCENE ARCHITECTURE (this is what makes it production-ready)\nTurn the chosen concept into a beat-mapped sequence the maker agents can shoot directly. For each scene: a function (Hook / Rule-Reveal / Proof / Scale-Detail / Emotional Turn / Signature), a one-line VISUAL idea written with a real point of view (vantage, contrast, what is revealed vs withheld), the MOTION hook, the SOUND feeling, and the @tag/text/logo state. Respect every lock: Production Path, @tags, source text, identity. Map it into short 5-6s Kling-safe visual beats; split long VO instead of stretching one start frame.\n\nSTEP 6 — MAMILAS HANDOFF\nClose with a clean handoff block the Image, Motion and Suno directors consume verbatim: the concept in one line, the look in one line, the sound in one line, the locks. No prompt mechanics here — that is their job; you hand them an idea so strong they cannot make it generic.\n\nTHE BAR — input: "süt dişi düşmesi, çocuklara, eğitim". weak: "A fun educational video about losing baby teeth for kids." masterpiece: "INSIGHT: a lost tooth is a child's first proof that growing up is something happening inside their own body. CONCEPT (withhold + literal metaphor): we never show a dentist or a diagram; we stay at the scale of the tooth itself. Open inside the warm dark of the mouth as the milk tooth finally lets go and the new tooth, already waiting below, pushes up into the empty light — the whole film is one small brave handover, told from the tooth's point of view, ending on the child's grin in the mirror, one gap proudly missing."\n\nSelf-score this concept against the idea rubric (READ / INSIGHT / 3 distinct routes / recommendation / scene architecture / handoff) INTERNALLY and silently; regenerate anything weak. Your structured output (READ, INSIGHT, ROUTES, RECOMMEND, SCENE ARCHITECTURE, HANDOFF) is read by humans and the maker agents, so keep it — but never print a numeric self-score.\n\nEPISODE ARC OWNERSHIP: author the batch as ONE episode. Map opening curiosity -> concept -> build -> main transformation -> climax of understanding -> final teaching frame, and distribute across scenes: character appearances (per the brief's character budget; the world is the default), wide/medium/close rhythm, colour intensity, object scale and emotional peaks. Hand the makers a scene map where each scene knows what came before and after. Before writing, SILENTLY map the full batch: total scene count, allowed character-scene count (from the brief budget), world-explains count, repeated-camera and repeated-object risks, the visual escalation, and the final teaching frame; use it to prevent repetition. Never reveal this map unless asked.`,master:`ROLE — FINAL BRIEF ARCHITECT / SHOWRUNNER\nTurn the chosen route into one coherent constitution every other director obeys. Be ruthless about coherence: one path, one world, one palette logic, one rhythm — no committee compromise, no muddy middle. Resolve every path/world conflict before handoff; if it will not resolve, FAIL it loudly rather than ship mud. Protect Source Integrity, Render Lock, scene IDs and @tags as law. For each scene hand the makers exactly what they need to be specific: the idea of the shot, the one contrast it lives on, the one motion hook, the text/logo state. A complete brief with no point of view is a failure. Your real job: make the makers physically unable to be generic.`,proof:`ROLE — PROOF DIRECTOR (dedicated full-strength gate)\nWhen run alone, you are the room hardest critic. Return PASS / FIX / FAIL per block with a one-line reason, and on FIX the exact rewrite. FAIL: source loss or coverage under 100%, path contamination (stylized words in a real path or the reverse), skipped or renamed scene IDs, @tag replacement, weak render lock, text/logo morph risk, no stable final frame, and above all the generic AI-video smell. Smell test: scan for banned vocabulary (cinematic, dynamic, beautiful, glowing particles, dramatic lighting, epic, 4K, stunning, vibrant; applies ONLY to generated prose, never to fixed system/path/palette/reference/@tag names or quoted brief metadata) — every hit is an automatic FIX with the concrete replacement named. Also fail any shot where light has no named source, motion has no named force, or you cannot say in one line what it is ABOUT. Specific and unsentimental: name the failing words, give the fix, move on. A polite PASS on weak work is the worst thing you can do.\n\nPRODUCTION QUALITY GATE -- also FAIL a prompt that is: pretty but instructionally empty; dominant object unclear; character used decoratively; motion with camera but no physical event; generic path grammar; reference DNA not visible; final frame with no teaching value; the same shot logic as a previous scene; any empty placeholder; or identity re-described in the motion phase.`,client:`ROLE — CLIENT PITCH DIRECTOR\nSell the idea, never the machinery. Translate the brief into language a marketing director feels in the gut: the insight, why it wins, what the audience will feel, and a clean scene-by-scene walkthrough in plain images — zero prompt mechanics, no lens/render/path jargon. Lead with the one-line concept that makes them lean in. Then the route summary, the scene overview as a story they can picture, and a confident approval ask. Tone: a director who knows the work is good and respects the client time — warm, certain, brief. Never expose @tags, render locks, or pipeline terms.`};let gold=`GOLDEN STANDARD FOR THIS PATH\nGolden Standard: ${g?g.name:'-'}.\nWhy Gold: ${g?g.why_gold:'-'}.\nGolden QA: ${g?(g.qa||[]).join(', '):'-'}.\nLinked References: ${g?(g.refs||[]).map(id=>(safeBy(DATA.refs,id)||{}).n /* ==== MAMILAS v31.1 SPLIT QA PATCH · speaker labels and micro-headings ==== */
(function(){
  if(typeof window.ingestRaw!=='function') return;
  function _txt(raw,r){return String(raw||'').slice(r.start,r.end);}

    const seed=children.find(s=>!_speakerLabelOnly(s.source||s.vo)&&!_microHeading(s.source||s.vo)) || children[children.length-1] || children[0] || {};
    const source=_txt(raw,r), sec=_est(source);
    const s=Object.assign({},seed);

    s.sourceHash=typeof hash32==='function'?hash32(source):String(source.length);

    s.speaker=r.speaker || (seed&&seed.speaker) || (typeof sceneSpeaker==='function'?sceneSpeaker(source,'VO'):'VO');
    s.clipPlan=typeof window.planClip==='function'?window.planClip(sec):(sec<=6.2?'SAFE: 5-6s single Kling 3.0 i2v beat · one physical event':'SPLIT / Multi-Shot');

    var r=_ing?_ing.apply(this,arguments):undefined;
    (S.scenes||[]).forEach(function(s){
      var generic=!s.visual||/one clear visual beat|one dominant object, one idea/i.test(s.visual);
      if((s.onText||'')==='Görev' && generic){
        s.visual='Interactive task hold: the dominant lesson object presents two or three EMPTY physical answer slots that glow as tactile invitations; nothing fills them — the frame withholds the answer so the child responds. One small motion hook on the empty slots, stable final hold; characters off-screen or as silent closed-mouth pointers only.';
      }
    });
    applyStyleEngine(); save();
    try{ render(); }catch(e){}
    return r;
  };
  try{ ingestRaw=window.ingestRaw; }catch(e){}

  /* ---- Batch ingest (=== separated multi-script) ---- */
  window.batchIngest=function(){
    var raw=S.briefRaw||'';
    var parts=raw.split(/^\s*={3,}.*$/m).map(function(x){return x.trim()}).filter(Boolean);
    if(parts.length<2){ if(typeof toast==='function') toast('Batch: en az 2 script gerekir (=== ile ayır)'); return; }
    var snap=JSON.stringify({b:S.briefRaw,sc:S.scenes,ir:S.ingestReport});
    var out=[];
    parts.forEach(function(p,i){ S.briefRaw=p; try{ window.ingestRaw(); }catch(e){} out.push('################  VIDEO '+(i+1)+' / '+parts.length+'  ################\n\n'+window.buildBrief()); });
    try{ var o=JSON.parse(snap); S.briefRaw=o.b; S.scenes=o.sc; S.ingestReport=o.ir; save(); }catch(e){}
    if(typeof download==='function') download('mamilas_batch_'+parts.length+'_videos.txt', out.join('\n\n\n'));
    render();
  };

  /* ---- Premiere CSV: add on_screen_text column (scope-safe append) ---- */
  var _csv=window.v31PremiereCSV;
  if(typeof _csv==='function'){
    window.v31PremiereCSV=function(){
      var out=_csv.apply(this,arguments); if(typeof out!=='string'||!out) return out;
      var lines=out.split('\n'); var sc=S.scenes||[];
      if(lines.length!==sc.length+1) return out;
      return lines.map(function(ln,i){ if(i===0) return ln+',on_screen_text'; var s=sc[i-1]; var tg=(s&&s.onText&&s.onText!=='-')?s.onText:''; return ln+',"'+String(tg).replace(/"/g,'""')+'"'; }).join('\n');
    };
    try{ v31PremiereCSV=window.v31PremiereCSV; }catch(e){}
  }

  /* ---- razor brief + doctor->pharmacist handshake + style block ---- */
  var _bb=window.buildBrief;
  window.buildBrief=function(){
    try{ applyStyleEngine(); }catch(e){}
    var out=_bb?_bb.apply(this,arguments):'';
    if(typeof out!=='string') return out;
    var e=eng();
    var styleLine='VISUAL STYLE ENGINE\nStyle: '+e.label+' — '+e.outer+'.\nGrain: '+e.grain+'.\nIP-SAFE: '+e.forbid+'. Reference is grammar only; never copy characters, logos, costumes or signature shots.\n\n';
    var hs='\nAGENT HANDSHAKE (doctor -> pharmacist: each stage consumes the previous output verbatim)\n'
      +'IMAGE -> MOTION: Motion animates ONLY what changes; it must not re-describe identity, world, light or text (re-description causes morphing). It carries scene id, integrated on-image text and all locks unchanged.\n'
      +'IMAGE/MOTION -> SUNO: Suno scores the cut only; it invents no visuals or text and keeps a VO midrange pocket.\n'
      +'ALL -> VOICE/EDIT: ElevenLabs receives speaker routing (names are VO only, never forced on-screen); Premiere receives scene order, durations, on-screen text and final holds.\n'
      +'PRESCRIPTION RULE: every downstream prompt must run with zero questions. If a field is ambiguous, the UPSTREAM agent failed and rewrites it; the downstream agent never guesses.\n';
    if(out.indexOf('ACTIVE SETUP\n')>-1) out=out.replace('ACTIVE SETUP\n', styleLine+'ACTIVE SETUP\n');
    else out=styleLine+out;
    if(out.indexOf('PROOF FAIL CONDITIONS')>-1) out=out.replace('PROOF FAIL CONDITIONS', hs+'\nPROOF FAIL CONDITIONS');
    else out=out+hs;
    return out;
  };
  try{ buildBrief=window.buildBrief; }catch(e){}

  /* ---- live: re-apply style every render so picking a reference swaps the look ---- */
  var _rnd=window.render;
  if(typeof _rnd==='function'){
    window.render=function(){ try{ applyStyleEngine(); }catch(e){} return _rnd.apply(this,arguments); };
    try{ render=window.render; }catch(e){}
  }

  /* ---- UI: Style Engine selector on Reference page ---- */
  var _pr=window.pageReference;
  if(typeof _pr==='function'){
    window.pageReference=function(){
      var cur=window.activeStyleEngine();
      var chips=Object.keys(ENGINES).map(function(k){ return '<button class="btn sm '+(S.styleEngine===k?'primary':'')+'" onclick="setStyleEngine(\''+k+'\')">'+ENGINES[k].label+'</button>'; }).join(' ');
      var panel='<div class="box"><h3>🎨 Visual Style Engine</h3><p class="desc">Pixar yerine Arcane / Spider-Verse / anime / claymation seç — render lock, image ve motion prompt o stile döner, IP-safe kalır. Auto = seçtiğin referanstan türetir.</p><div class="row"><button class="btn sm '+(S.styleEngine?'':'primary')+'" onclick="setStyleEngine(\'auto\')">Auto (referanstan)</button> '+chips+'</div><p class="desc">Aktif stil: <b>'+eng().label+'</b></p></div>';
      return panel+_pr.apply(this,arguments);
    };
    try{ pageReference=window.pageReference; }catch(e){}
  }

  /* ---- UI: Series DNA + Batch on Final page ---- */
  var _pf=window.pageFinal;
  if(typeof _pf==='function'){
    window.pageFinal=function(){
      var L=S.seriesLock;
      var status= L ? ('KİLİTLİ → '+((by(DATA.projects,L.project)||{}).name||L.project)+' · '+((ENGINES[L.styleEngine]||{label:L.styleEngine||'auto'}).label)) : 'yok';
      var box='<div class="box"><h3>🔒 Series DNA Lock + Batch</h3><p class="desc">Series Lock: karakter, world, palet, <b>stil</b> ve süreyi dondurur; sonraki her scriptte otomatik uygular (3000 video için marka tutarlılığı). Batch: <b>===</b> ile ayrılmış çok scripti tek seferde işleyip tek dosya indirir.</p><div class="row"><button class="btn sm primary" onclick="saveSeriesLock()">Lock current as Series</button><button class="btn sm" onclick="clearSeriesLock()">Clear lock</button><button class="btn sm" onclick="batchIngest()">Batch ingest (===)</button></div><p class="desc">Durum: <b>'+status+'</b></p></div>';
      return box+_pf.apply(this,arguments);
    };
    try{ pageFinal=window.pageFinal; }catch(e){}
  }
})();

(function(){
  var prev=window.buildBrief; if(typeof prev!=='function') return;
  window.buildBrief=function(){
    var out=prev.apply(this,arguments);
    if(typeof out!=='string') return out;
    out=out.replace(/^[^\n:]{1,52}:[ \t]*-[ \t]*$/gm,'');
    out=out.replace(/\n{3,}/g,'\n\n');
    return out;
  };
  try{ buildBrief=window.buildBrief; }catch(e){}
})();

showLocalModeWarning();
render();
</script>
</body>
</html>
