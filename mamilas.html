<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MAMILAS v316 Production Brain 100</title><style>
:root{
--bg:#060709;--s1:#0b0c11;--s2:#0e1018;--s3:#13161f;
--line:#ffffff0f;--line2:#ffffff18;--line3:#ffffff28;
--text:#eeeaf8;--muted:#5e5c6e;--dim:#3a3845;
--gold:#f5c842;--gold2:#e8a820;--goldglow:#f5c84222;
--green:#4df5a0;--red:#f54d6b;--blue:#5b9fff;
--a:#f5c842;--b:#5b9fff;--c:#0a0c14;
--mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
--sans:-apple-system,'Inter',system-ui,sans-serif;
--r4:4px;--r8:8px;--r12:12px;--r16:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;font-size:13px;-webkit-font-smoothing:antialiased}

/* LAYOUT */
.app{display:grid;grid-template-columns:220px minmax(0,1fr) 300px;min-height:100vh}
.side{position:sticky;top:0;height:100vh;overflow:auto;background:var(--s1);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:0}
.right{position:sticky;top:0;height:100vh;overflow:auto;background:var(--s1);border-left:1px solid var(--line);padding:0}
.main{padding:36px 40px 100px;background:var(--bg)}
.main-inner{max-width:1100px}

/* SIDEBAR LOGO */
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--line)}
.logo-mark{display:flex;align-items:baseline;gap:0;line-height:1}
.logo-mark .m{font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--gold)}
.logo-mark .rest{font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--text);opacity:.85}
.logo-sub{font:10px/1 var(--mono);color:var(--muted);letter-spacing:.1em;margin-top:5px;text-transform:uppercase}

/* NAV */
.nav{flex:1;padding:10px 10px 0;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r8);cursor:pointer;border:0;background:transparent;color:var(--muted);text-align:left;width:100%;transition:background .12s,color .12s;position:relative}
.nav-item:hover{background:var(--s3);color:var(--text)}
.nav-item.on{background:linear-gradient(90deg,var(--goldglow),transparent);color:var(--text)}
.nav-item.on::before{content:'';position:absolute;left:0;top:20%;height:60%;width:2px;background:var(--gold);border-radius:0 2px 2px 0}
.nav-step{width:22px;height:22px;border-radius:var(--r4);background:var(--s3);border:1px solid var(--line2);display:grid;place-items:center;font:700 10px var(--mono);color:var(--muted);flex-shrink:0;transition:all .12s}
.nav-item.on .nav-step{background:var(--goldglow);border-color:var(--gold);color:var(--gold)}
.nav-item.done .nav-step{background:#4df5a015;border-color:#4df5a040;color:var(--green)}
.nav-label{flex:1;min-width:0}
.nav-label b{display:block;font-size:12px;font-weight:600;line-height:1.2}
.nav-label small{font-size:10px;color:var(--muted);display:block;margin-top:1px}
.nav-divider{height:1px;background:var(--line);margin:8px 10px}

/* SIDEBAR BOTTOM */
.side-bottom{padding:12px 10px 14px;border-top:1px solid var(--line)}
.readiness-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.readiness-label span{font:10px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.readiness-label strong{font:700 13px var(--mono);color:var(--text)}
.bar-track{height:3px;background:var(--s3);border-radius:99px;overflow:hidden;margin-bottom:8px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green));border-radius:99px;width:0;transition:width .3s}
.hint-text{font:11px var(--sans);color:var(--muted);margin-bottom:10px;min-height:16px}

/* STATUS CHIPS */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.status-chip{background:var(--s2);border:1px solid var(--line2);border-radius:var(--r8);padding:7px 9px;cursor:pointer;transition:border-color .12s}
.status-chip:hover{border-color:var(--line3)}
.status-chip-label{font:9px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px}
.status-chip-val{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.status-chip-val.empty{color:var(--dim)}

/* CTA BUTTONS IN SIDEBAR */
.side-actions{display:flex;flex-direction:column;gap:5px}
.btn-final{background:var(--gold);color:#1a1100;border:0;border-radius:var(--r8);padding:9px 14px;font:700 12px var(--sans);cursor:pointer;width:100%;letter-spacing:-.01em;transition:opacity .12s}
.btn-final:hover{opacity:.88}
.btn-reset{background:transparent;color:var(--muted);border:1px solid var(--line2);border-radius:var(--r8);padding:7px 14px;font:600 11px var(--sans);cursor:pointer;width:100%;transition:color .12s,border-color .12s}
.btn-reset:hover{color:var(--red);border-color:#f54d6b44}

/* RIGHT PANEL */
.rpanel-section{border-bottom:1px solid var(--line);padding:14px 16px}
.rpanel-section:last-child{border-bottom:0}
.rpanel-title{font:600 10px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.bigPreview{height:220px;position:relative;overflow:hidden;background:radial-gradient(circle at 73% 18%,var(--b),transparent 28%),linear-gradient(145deg,var(--a),var(--b) 50%,var(--c))}
.bigPreview:after{content:'';position:absolute;inset:0;background-image:radial-gradient(#fff6 1px,transparent 1px);background-size:18px 18px;opacity:.06;mix-blend-mode:screen;pointer-events:none}
.fx-deep{box-shadow:inset 0 0 100px #000c}
.fx-window:before{content:'';position:absolute;left:0;top:0;width:40%;height:100%;background:linear-gradient(108deg,#fff4,transparent 55%);mix-blend-mode:screen;pointer-events:none}
.fx-spot:before{content:'';position:absolute;left:-5%;top:-10%;width:70%;height:110%;background:radial-gradient(ellipse at 30% 30%,#f5c84266,transparent 45%);mix-blend-mode:screen;pointer-events:none}
.fx-cosmic:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 65%,#5b9fff33,transparent 15%),radial-gradient(#fff 1px,transparent 1px);background-size:auto,28px 28px;opacity:.4;pointer-events:none}
.previewLabel{position:absolute;bottom:10px;left:12px;z-index:5;font:700 11px var(--sans);color:rgba(255,255,255,.9);text-shadow:0 1px 8px #000}
.previewChip{position:absolute;top:10px;right:10px;z-index:5;font:700 9px var(--mono);background:#f5c842ee;color:#1a1100;border-radius:var(--r4);padding:3px 7px;letter-spacing:.04em;text-transform:uppercase}
.previewEngine{position:absolute;top:10px;left:10px;z-index:5;font:600 9px var(--mono);background:#00000088;color:rgba(255,255,255,.7);border-radius:var(--r4);padding:3px 7px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.previewPalChip{position:absolute;bottom:10px;right:10px;z-index:5;font:700 9px var(--mono);background:#00000088;color:rgba(255,255,255,.75);border-radius:var(--r4);padding:3px 7px;letter-spacing:.04em;max-width:46%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.bigPreview svg{background:var(--c)}


/* DETAIL ROWS */
.detail-row{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid var(--line)}
.detail-row:last-child{border-bottom:0}
.detail-row .dk{font:10px var(--mono);color:var(--muted);flex-shrink:0;padding-top:1px;text-transform:uppercase;letter-spacing:.06em}
.detail-row .dv{font-size:11px;font-weight:600;color:var(--text);text-align:right;line-height:1.4}
.detail-block{padding:8px 0;border-bottom:1px solid var(--line)}
.detail-block:last-child{border-bottom:0}
.detail-block-label{font:9px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.detail-block-val{font-size:11px;color:var(--text);line-height:1.45}

/* EVAL ITEMS */
.eval-item{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line)}
.eval-item:last-child{border-bottom:0}
.eval-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.eval-dot.ok{background:var(--green)}
.eval-dot.warn{background:var(--gold)}
.eval-dot.err{background:var(--red)}
.eval-item-inner .ev-title{font:600 11px var(--sans);color:var(--text);line-height:1.2}
.eval-item-inner .ev-sub{font-size:10px;color:var(--muted);margin-top:1px}

/* MAIN CONTENT */
.page-header{padding-bottom:24px;margin-bottom:28px;border-bottom:1px solid var(--line)}
.page-eyebrow{font:600 10px var(--mono);color:var(--gold);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px}
.page-title{font-size:32px;font-weight:800;letter-spacing:-1.2px;line-height:1.05;color:var(--text)}
.page-desc{font-size:13px;color:var(--muted);margin-top:8px;max-width:540px;line-height:1.6}

/* SECTION BOXES */
.box{border:1px solid var(--line2);background:var(--s1);border-radius:var(--r12);padding:16px;margin-bottom:12px}
.box h2{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;letter-spacing:-.02em}
.panel{margin-bottom:0}

/* CARDS */
.card{position:relative;border:1px solid var(--line2);background:var(--s1);border-radius:var(--r12);padding:14px;cursor:pointer;transition:border-color .14s,background .14s;min-height:100px;overflow:hidden}
.card:hover{border-color:var(--line3);background:var(--s2)}
.card.sel{border-color:var(--gold);background:linear-gradient(145deg,#f5c84210,var(--s1))}
.card.sel::after{content:'✓';position:absolute;right:10px;top:10px;background:var(--gold);color:#1a1100;border-radius:var(--r4);font:800 9px var(--mono);padding:2px 6px}
.card h3{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:4px;letter-spacing:-.01em}
.card p{font-size:11px;color:var(--muted);line-height:1.5}
.card em{font-style:normal;font-size:10px;color:var(--dim);display:block;margin-top:7px;font-family:var(--mono)}

/* SWATCHES */
.sw{display:flex;gap:3px;margin:7px 0}
.sw i{height:6px;flex:1;border-radius:2px}

/* BUTTONS */
.btn{border:1px solid var(--line2);background:var(--s2);color:var(--text);border-radius:var(--r8);padding:7px 12px;font:600 12px var(--sans);cursor:pointer;transition:border-color .12s,color .12s}
.btn:hover{border-color:var(--line3);color:var(--text)}
.btn.primary{background:var(--gold);color:#1a1100;border-color:transparent;font-weight:700}
.btn.primary:hover{opacity:.88}
.btn.danger{color:var(--red);border-color:transparent;background:transparent}
.btn.danger:hover{border-color:#f54d6b33;background:#f54d6b0a}
.btn.sm{padding:5px 9px;font-size:11px}
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* PILLS / TABS */
.pill,.tab{display:inline-flex;border:1px solid var(--line2);background:transparent;color:var(--muted);border-radius:var(--r4);padding:5px 10px;font:600 11px var(--sans);cursor:pointer;margin:0 4px 5px 0;transition:all .1s}
.pill.sel,.tab.sel{border-color:var(--gold);color:var(--gold);background:var(--goldglow)}
.pill:hover,.tab:hover{border-color:var(--line3);color:var(--text)}
.tabs{margin:10px 0;display:flex;flex-wrap:wrap;gap:0}

/* INPUTS */
input,textarea{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--text);border-radius:var(--r8);padding:10px 12px;outline:0;resize:vertical;font:13px/1.55 var(--sans)}
textarea:focus,input:focus{border-color:var(--gold)}

/* ADVISOR / STATUS BARS */
.advisor,.ok,.warn{border-radius:var(--r8);padding:9px 12px;margin:8px 0;font-size:11px;line-height:1.5}
.advisor,.ok{border:1px solid #4df5a028;background:#4df5a008;color:#a0f5cc}
.warn{border:1px solid #f5c84230;background:#f5c84208;color:#f5d980}

/* MINI PREVIEW */
.miniPrev{height:72px;border-radius:var(--r8);margin-bottom:10px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--a),var(--b) 50%,var(--c))}
.miniPrev .mp-glow,.miniPrev .mp-light{position:absolute;pointer-events:none}
/* SOFT 3D - warm key + bounce */
.mp-soft3d .mp-glow{inset:0;background:radial-gradient(circle at 70% 35%,#fff9 0,transparent 32%);mix-blend-mode:screen}
.mp-soft3d .mp-light{left:0;top:0;width:55%;height:100%;background:linear-gradient(115deg,#fff3,transparent 65%);mix-blend-mode:screen}
/* BAROQUE - single hot spot in deep dark */
.mp-baroque{background:linear-gradient(135deg,#0b0704,#1a0d05 55%,#2a1608)}
.mp-baroque .mp-glow{left:20%;top:-30%;width:55%;height:160%;background:radial-gradient(ellipse at 50% 50%,#f5c842dd 0,#c18a4288 22%,transparent 55%);mix-blend-mode:screen}
/* HISTORICAL - sepia haze + ground */
.mp-historical{background:linear-gradient(135deg,#3b2617,#5c3d20 50%,#c79a56)}
.mp-historical .mp-glow{inset:0;background:radial-gradient(circle at 60% 35%,#ece0c866 0,transparent 50%);mix-blend-mode:screen}
.mp-historical .mp-light{inset:0;background:linear-gradient(180deg,transparent 55%,#000a)}
/* ANIME - saturated sky + rim flare */
.mp-anime{background:linear-gradient(180deg,#6cb6ff 0%,#ff8fab 65%,#2d3561)}
.mp-anime .mp-glow{right:-5%;top:0;width:55%;height:100%;background:radial-gradient(ellipse at 75% 50%,#fff8 0,transparent 45%);mix-blend-mode:screen}
.mp-anime .mp-light{left:35%;top:10%;width:1px;height:80%;background:#fff;box-shadow:0 0 8px #fff,0 0 18px var(--a);opacity:.85}
/* GHIBLI - sky + meadow */
.mp-ghibli{background:linear-gradient(180deg,#8ec8ff 0%,#d8f0a0 60%,#9bd982)}
.mp-ghibli .mp-glow{inset:0;background:radial-gradient(circle at 50% 25%,#fffd 0,transparent 22%);mix-blend-mode:screen;opacity:.7}
/* CINEMA REAL - desaturated practical */
.mp-cinema{background:linear-gradient(135deg,#151820,#3a3f4a 50%,#66717a)}
.mp-cinema .mp-light{left:0;top:0;width:45%;height:100%;background:linear-gradient(110deg,#fff2,transparent 60%);mix-blend-mode:screen}
/* LUXURY - black gold elegance */
.mp-luxury{background:linear-gradient(135deg,#050505,#1a1308 55%,#3a2810)}
.mp-luxury .mp-glow{right:-15%;top:-30%;width:65%;height:160%;background:radial-gradient(ellipse at 30% 50%,#ffd27cbb 0,transparent 50%);mix-blend-mode:screen}
.mp-luxury .mp-light{left:0;top:50%;width:100%;height:1px;background:linear-gradient(90deg,transparent,#ffd27c66 50%,transparent)}
/* NEON NOIR - magenta/cyan haze + scanlines */
.mp-neon{background:linear-gradient(135deg,#0a0a18,#1a1430 50%,#2d1545)}
.mp-neon .mp-glow{inset:0;background:radial-gradient(circle at 22% 75%,#ff2d9577,transparent 38%),radial-gradient(circle at 78% 25%,#00d4ff66,transparent 38%);mix-blend-mode:screen}
.mp-neon .mp-light{inset:0;background:repeating-linear-gradient(90deg,transparent 0 13px,#fff1 13px 14px);opacity:.4}
/* COSMIC - starfield */
.mp-cosmic{background:radial-gradient(ellipse at 50% 90%,#2c65a8 0,#060914 70%)}
.mp-cosmic .mp-glow{inset:0;background:radial-gradient(circle at 50% 60%,#d9f1ff55,transparent 18%);mix-blend-mode:screen}
.mp-cosmic .mp-light{inset:0;background-image:radial-gradient(#fff 0.5px,transparent 1px);background-size:11px 9px;opacity:.75}
/* FANTASY - mythic golden mist */
.mp-fantasy{background:linear-gradient(180deg,#1a0f04,#3d2510 50%,#5a3a18)}
.mp-fantasy .mp-glow{left:30%;top:-30%;width:40%;height:160%;background:radial-gradient(ellipse,#ffd27c88 0,transparent 55%);mix-blend-mode:screen}
.mp-fantasy .mp-light{inset:0;background:linear-gradient(180deg,transparent 45%,#0009)}
/* ARCHITECTURE - clean window light */
.mp-arch{background:linear-gradient(135deg,#0e1118,#2a2f3a 60%,#3a3f4a)}
.mp-arch .mp-glow{left:55%;top:0;width:32%;height:100%;background:linear-gradient(180deg,#d7dce2cc,#d7dce266 55%,transparent);mix-blend-mode:screen}
.mp-arch .mp-light{left:0;bottom:0;width:100%;height:1px;background:#d7dce244}
/* EXPLAINER - clean diagram bg */
.mp-explainer{background:linear-gradient(135deg,#0f1830,#1a2540 60%,#2c3e60)}
.mp-explainer .mp-glow{left:30%;top:30%;width:40%;height:40%;background:radial-gradient(circle,#f9731677 0,transparent 55%);mix-blend-mode:screen}
.mp-explainer .mp-light{right:20%;top:20%;width:30%;height:60%;background:radial-gradient(circle,#60a5fa66 0,transparent 60%);mix-blend-mode:screen}
/* COMMERCIAL - premium gold studio */
.mp-commercial{background:linear-gradient(135deg,#1a1408,#2a200d 50%,#3a2810)}
.mp-commercial .mp-glow{left:50%;top:0;width:50%;height:100%;background:radial-gradient(ellipse at 60% 50%,#fff4d6cc 0,#ffd27c66 30%,transparent 60%);mix-blend-mode:screen}
.mp-commercial .mp-light{left:0;bottom:20%;width:100%;height:1px;background:#fff4d633}
/* NATURAL DOCUMENTARY - overcast */
.mp-natural{background:linear-gradient(180deg,#9ba89a 0%,#6f766f 55%,#3a3f3a)}
.mp-natural .mp-glow{inset:0;background:radial-gradient(circle at 50% 20%,#d6c7a366 0,transparent 45%);mix-blend-mode:screen}

/* TAGS */
.badgeTag,.tag{font:10px var(--mono);display:inline-flex;border:1px solid var(--line);border-radius:var(--r4);color:var(--muted);padding:2px 6px;margin:4px 3px 0 0}
.tag.red{color:var(--red);border-color:#f54d6b44}
.tag.gold{color:var(--gold);border-color:#f5c84244}
.tag.green{color:var(--green);border-color:#4df5a044}

/* SCENE WORKSPACE */
.sceneWS{display:grid;grid-template-columns:minmax(360px,1fr) minmax(480px,1fr);gap:12px}
.sceneList{display:flex;flex-direction:column;gap:8px;max-height:680px;overflow:auto}
.sceneItem{border:1px solid var(--line2);background:var(--bg);border-radius:var(--r12);padding:12px;transition:border-color .12s}
.sceneItem:hover{border-color:var(--line3)}
.sceneHead{display:flex;justify-content:space-between;gap:8px;margin-bottom:7px}
.sid{font:600 10px var(--mono);color:var(--gold);letter-spacing:.04em}
.sceneActions{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.sceneActions button{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:var(--r4);padding:4px 8px;font:600 10px var(--sans);cursor:pointer;transition:all .1s}
.sceneActions button:hover{border-color:var(--line3);color:var(--text)}

/* BRIEF / FINAL */
.final{min-height:560px;font-family:var(--mono);font-size:11.5px;line-height:1.68;background:var(--bg)}
.sysout{min-height:220px;font-family:var(--mono);font-size:11px;background:var(--bg)}

/* TIP CARDS */
.tip{border:1px solid var(--line);border-radius:var(--r8);background:var(--bg);padding:9px 11px;margin-bottom:7px}
.tip b{display:block;color:var(--text);font-size:11px;font-weight:700;margin-bottom:2px}
.tip p{color:var(--muted);font-size:11px;line-height:1.5}

/* SETUP ROW */
.setupRow{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid var(--line);font-size:11px}
.setupRow:last-child{border-bottom:0}
.setupRow span:first-child{color:var(--muted);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;padding-top:1px}
.setupRow span:last-child{font-weight:700;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}

/* TOAST */
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:9999;background:var(--s3);border:1px solid var(--line3);border-radius:var(--r8);padding:8px 16px;font:600 12px var(--sans);color:var(--text);box-shadow:0 8px 32px #000a}

/* SVG KIDS */


/* RESPONSIVE */
@media(max-width:1280px){.app{grid-template-columns:200px 1fr}.right{display:none}.g4{grid-template-columns:repeat(3,1fr)}.sceneWS{grid-template-columns:1fr}}



/* === PROJECT CARD === */
.project-card{padding:16px;min-height:160px}
.project-card .proj-tag{font:600 9px var(--mono);color:var(--gold);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;background:var(--goldglow);display:inline-block;padding:3px 7px;border-radius:var(--r4)}
.project-card h3{font-size:14px;margin-bottom:6px;color:var(--text)}
.project-card p{font-size:11.5px;line-height:1.55;margin-bottom:10px}
.project-card .sw{margin:8px 0 10px}
.project-card .sw i{height:7px;border-radius:2px}
.proj-meta{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.proj-engine{font:600 9px var(--mono);color:var(--muted);background:var(--bg);border:1px solid var(--line2);border-radius:var(--r4);padding:3px 7px;letter-spacing:.04em}
.project-card.sel .proj-tag{background:var(--gold);color:#1a1100}

/* === PALETTE CARD === */
.pal-card{padding:14px;min-height:150px}
.pal-card .pal-swatch{display:flex;gap:0;border-radius:var(--r8);overflow:hidden;height:36px;margin-bottom:10px;border:1px solid var(--line2)}

.pal-card em{font-size:10px;color:var(--muted);font-style:normal;display:block;line-height:1.4}
.pal-card.sel{border-color:var(--gold)}
.pal-card.sel .pal-swatch{border-color:var(--gold)}

/* === SECTION HEADER === */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line)}

/* === REFERENCE TOOLBAR === */

.ref-search{flex:1;background:var(--bg);border:1px solid var(--line2);border-radius:var(--r8);padding:8px 12px;color:var(--text);font:13px var(--sans);outline:0}
.ref-search:focus{border-color:var(--gold)}
.ref-counter{font:700 12px var(--mono);color:var(--muted);padding:8px 12px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--r8);min-width:80px;text-align:center;flex-shrink:0}

/* === CATEGORY BAR === */
.cat-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;padding:10px;background:var(--s1);border:1px solid var(--line2);border-radius:var(--r12)}
.cat-pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);background:var(--bg);color:var(--muted);border-radius:var(--r4);padding:6px 10px;font:600 11px var(--sans);cursor:pointer;transition:all .12s}
.cat-pill:hover{border-color:var(--line3);color:var(--text)}
.cat-pill.sel{border-color:var(--gold);color:var(--gold);background:var(--goldglow)}
.cat-count{font:600 9px var(--mono);background:var(--s3);color:var(--muted);border-radius:var(--r4);padding:1px 5px;min-width:18px;text-align:center}
.cat-pill.sel .cat-count{background:var(--gold);color:#1a1100}

/* === REFERENCE CARD === */
.ref-card{padding:0;overflow:hidden;min-height:200px}
.ref-card .miniPrev{margin-bottom:0;border-radius:var(--r12) var(--r12) 0 0;height:80px}
.ref-card h3{padding:10px 12px 4px;margin-bottom:0;font-size:12.5px;color:var(--text)}
.ref-card p{padding:0 12px 8px;font-size:11px;line-height:1.5;color:var(--muted)}
.ref-card .ref-meta{padding:0 10px 10px;display:flex;gap:3px;flex-wrap:wrap}
.ref-card .badgeTag{margin:0;font-size:9px;padding:2px 5px}
.ref-card .badgeTag.mode-character{color:#ff8fab;border-color:#ff8fab33}
.ref-card .badgeTag.mode-atmosphere{color:#5b9fff;border-color:#5b9fff33}
.ref-card.sel{border-color:var(--gold)}
.ref-card.sel::after{top:8px;right:8px}
.ref-card:hover .miniPrev{filter:brightness(1.05)}

/* === SECTION HEAD inside palette page === */
.section-head + .grid{margin-bottom:0}


/* === ACADEMY === */
.academy-tip{border:1px solid var(--line2);background:var(--s1);border-radius:var(--r12);padding:14px 16px;transition:border-color .12s}
.academy-tip:hover{border-color:var(--line3)}
.academy-tip b{display:block;color:var(--gold);font:700 12px var(--sans);margin-bottom:6px;letter-spacing:-.01em}
.academy-tip p{color:var(--text);font-size:12px;line-height:1.6;opacity:.85}

/* Better grid spacing on main content */
.grid.g3,.grid.g2{gap:12px}
.grid.g4{gap:10px}

/* Better hint text */
.hint{color:var(--muted);font-size:12px;line-height:1.55}

/* Subtle shadow on hover for cards */
.card{transition:border-color .14s,background .14s,transform .12s,box-shadow .14s}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 16px #0006}
.card.sel{transform:translateY(0)}

/* Fix box hover */
.box{transition:border-color .12s}

/* Scene item polish */
.sceneItem .sid{background:var(--goldglow);padding:2px 7px;border-radius:var(--r4);letter-spacing:.06em}


/* === MAIN BG TEXTURE === */
.main{background:radial-gradient(ellipse at top right,#1a1f3015 0,transparent 50%),var(--bg)}

/* === BIGPREVIEW POLISH === */
.bigPreview{height:200px}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--line3)}

/* === FOCUS STATES === */
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--gold);outline-offset:1px}

/* === LOGO HOVER === */
.logo{cursor:default}

/* === DARKER NAV ACTIVE INDICATOR === */
.nav-item.on{background:linear-gradient(90deg,#f5c84218,transparent 80%)}

/* === REF SEARCH PLACEHOLDER STYLING === */
input::placeholder,textarea::placeholder{color:var(--dim)}

/* === SUBTLE ANIMATION === */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.main{animation:fadeIn .25s ease}

/* === BETTER ROW SPACING === */
.row{gap:8px}
.row .btn{flex-shrink:0}


/* === ACCORDION (Reference Brain) === */
.acc-section{margin-bottom:6px;border:1px solid var(--line2);border-radius:var(--r12);overflow:hidden;background:var(--s1)}
.acc-head{display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;background:transparent;border:0;color:var(--text);cursor:pointer;text-align:left;transition:background .12s}
.acc-head:hover{background:var(--s2)}
.acc-head.open{background:linear-gradient(90deg,#f5c84210,transparent 70%);border-bottom:1px solid var(--line2)}

.acc-title{flex:1;font:600 13px var(--sans);letter-spacing:-.01em}
.acc-count{font:700 10px var(--mono);color:var(--muted);background:var(--s3);border:1px solid var(--line2);border-radius:var(--r4);padding:2px 7px;min-width:26px;text-align:center}
.acc-head.open .acc-count{background:var(--goldglow);border-color:var(--gold);color:var(--gold)}
.acc-chevron{font-size:9px;color:var(--muted);flex-shrink:0;margin-left:4px}
.acc-body{padding:12px}
.acc-body .grid{margin-bottom:0}

/* ref-clear button */
.ref-clear{background:transparent;border:1px solid var(--line2);border-radius:var(--r8);color:var(--muted);padding:8px 10px;font:600 11px var(--sans);cursor:pointer;flex-shrink:0;transition:all .1s}
.ref-clear:hover{border-color:var(--red);color:var(--red)}

/* Applied ref toast - subtle auto-navigate hint */
.ref-card:hover::before{content:'Seç →';position:absolute;inset:0;background:#f5c84212;display:flex;align-items:center;justify-content:center;font:700 13px var(--sans);color:var(--gold);border-radius:var(--r12);opacity:0;transition:opacity .15s;z-index:4;pointer-events:none}
.ref-card:hover::before{opacity:1}
.ref-card.sel::after{z-index:6}

/* Selected reference strip - also visible on mobile when right preview panel is hidden */
.selected-ref-strip{display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:stretch;margin-bottom:12px;border:1px solid var(--line2);background:var(--s1);border-radius:var(--r12);padding:10px}
.selected-ref-strip .miniPrev{height:92px;margin:0;border-radius:var(--r8)}
.selected-ref-kicker{font:600 9px var(--mono);color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.selected-ref-title{font:800 15px var(--sans);letter-spacing:-.02em;color:var(--text);margin-bottom:3px}
.selected-ref-copy{font-size:11px;color:var(--muted);line-height:1.5}
.selected-ref-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}



/* === DURATION INFO BAR === */
.duration-info{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:10px 14px;margin-bottom:14px;background:var(--s1);border:1px solid var(--line2);border-radius:var(--r12);font-size:11.5px;color:var(--text)}
.di-item{font:500 11.5px var(--sans)}
.di-item b{color:var(--gold);font-weight:700;margin-right:4px}
.di-sep{color:var(--dim);margin:0 4px;font-family:var(--mono)}

/* === SCENE TAGS - duration aware === */
.sceneItem .tag.red{color:#fff;background:var(--red);border-color:var(--red)}
.sceneItem .tag.gold{color:#1a1100;background:var(--gold);border-color:var(--gold)}
.sceneItem .tag.green{color:var(--green)}
.sceneItem .tag.dim{color:var(--dim)}

/* === Scene action buttons polish === */
.sceneActions button{transition:all .12s}
.sceneActions button:hover{border-color:var(--gold);color:var(--gold);background:var(--goldglow)}


/* === SPLIT CONTROLS === */
.split-controls{display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px;padding:14px 16px;margin-bottom:14px;background:var(--s1);border:1px solid var(--line2);border-radius:var(--r12)}
.split-ctrl-item{display:flex;flex-direction:column;gap:5px}
.split-ctrl-item label{font:600 10px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.split-ctrl-item input[type=number]{background:var(--bg);border:1px solid var(--line2);border-radius:var(--r8);padding:7px 10px;color:var(--text);font:600 13px var(--mono);width:110px;outline:0}
.split-ctrl-item input[type=number]:focus{border-color:var(--gold)}
.toggle-row{display:flex;gap:0;border:1px solid var(--line2);border-radius:var(--r8);overflow:hidden;background:var(--bg)}
.toggle{background:transparent;border:0;color:var(--muted);font:600 12px var(--sans);padding:7px 14px;cursor:pointer;transition:all .12s}
.toggle.on{background:var(--gold);color:#1a1100}
.toggle:not(.on):hover{color:var(--text)}
.split-ctrl-help{flex:1;min-width:200px;font:11px var(--sans);color:var(--muted);align-self:center;padding-bottom:4px}


/* === PROFILE SWITCHER === */
.profile-switcher{padding:12px 14px 14px;border-bottom:1px solid var(--line)}
.prof-label{font:600 9px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px}
.prof-grid{display:flex;flex-direction:column;gap:4px}
.prof-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--r8);color:var(--muted);cursor:pointer;text-align:left;transition:all .14s}
.prof-btn:hover{border-color:var(--line3);color:var(--text)}
.prof-btn.on{background:linear-gradient(90deg,var(--goldglow),transparent 80%);border-color:var(--gold);color:var(--text)}
.prof-emoji{font-size:14px;line-height:1;flex-shrink:0}
.prof-name{font:600 11.5px var(--sans);letter-spacing:-.01em}
.prof-btn.on .prof-name{color:var(--gold)}


/* === SYSTEM PROMPT EXPORT === */
.sys-export{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}

emarked styling.\n\n'+p.masterAddon+'\n\nTÜRKİYE CONTEXT LOCK\nEnglish prompts, Turkish visual world. Avoid foreign defaults, unintended English on-screen text, ethnic drift, generic Western look, random cultural props. Prefer Turkish / Mediterranean / Anatolian visual logic.\n\nIMAGE PHASE RULES\nFor each [text#NNN], write one image prompt.\n  - Start frame, not finished action. The frame must feel alive, dimensional, ready for motion.\n  - One scene = one idea = one focal path.\n  - Show, don\'t tell. No clutter, no random UI, no flat cardboard, no plastic skin, no generic AI look, no style clash.\n\nSHOT DIRECTOR\nPick camera by scene meaning:\n  wide       - scale and world reveal\n  medium     - interaction, dialogue\n  close-up   - emotion\n  macro      - small detail, focus pull\n  overhead   - systems, maps, patterns\n  low angle  - power, dignity\n  push-in    - discovery, slow realization\n  dolly zoom - shock, perspective break\n  rack focus - attention shift\n  orbit      - transformation\n  static     - history, prestige, dignity\n\nMOTION PHASE RULES (only after IMAGE ONAY)\nRespect each scene\'s CLIP TARGET and TAIL exactly.\nTwo dominant motion elements maximum. Stable identity. Engine-aware.\nOn-screen text only when short, large, clean, readable, intentional. Avoid long sentences, small typography, dense UI text, complex text deformation.\n\nENGINE BEHAVIOR\n  Flux         - photorealism, PBR materials, realistic lens, natural imperfection, cinematic light, skin/material realism.\n  Nano Banana  - premium 3D feature animation quality, clean staging, vibrant controlled palette, readable composition, expressive but stable child characters.\n  Kling motion - controlled start-frame motion, approach -> pause -> break/change -> reaction -> stabilize. Two dominant moving elements max.\n  Runway motion- concise subject-action-camera-lighting language, stable background unless intended, moderate motion intensity.\n  Luma motion  - spatial continuity, cinematic camera path, atmosphere, environment persistence, graceful movement, stable scene identity.\n\nOUTPUT FORMAT\nFor each scene Mami sends:\n[text#NNN]\nVO DURATION / CLIP TARGET / TAIL - echo exactly from the brief\nIMAGE PROMPT:\n<English image prompt, start frame ready for motion, alive but not finished>\n\nPRODUCTION NOTE:\n<short Turkish note: shot type, light intent, duration concern if any, context lock if any>\n\nDo not output motion prompts during IMAGE PHASE. Do not explain the system to Mami. Preserve all [text#NNN] labels exactly.\n\nSUNO / MUSIC (when useful)\nProvide narration-friendly instrumental Suno prompts: genre, instrumentation, BPM, mood, energy curve, arrangement, cinematic texture, mixing note, avoid list, negative prompt. No vocals unless explicitly requested.\n\nINTERACTION STYLE WITH MAMI\nConcise, direct, non-emotive. No emojis, no filler, no padding. Maximum two sentences before action. Push back on weak ideas. Maintain high standards.';
}

function sentenceSplit(text){
  // Returns array of sentences with .!? as boundaries, preserving punctuation
  let clean=String(text||'').replace(/\s+/g,' ').trim();
  if(!clean)return[];
  // Split on .!? but keep them with the previous sentence; handle ... and !?
  let raw=clean.match(/[^.!?]+[.!?]+(?=\s|$)|[^.!?]+$/g)||[clean];

function commaSplit(sentence){

function autoSplitText(raw){
  // Strategy: split into sentences, then pack consecutive sentences into a 
  // single scene as long as combined VO stays under engine usable.
  // If single sentence exceeds usable, fallback to comma split, else mark as overflow.
  if(!raw||!raw.trim())return[];
  let lim=getEngineLimits();
  let usable=lim.usable||8.5;
  // First, detect explicit speaker/scene markers - preserve them as boundaries
  let preBlocks=raw.replace(/\r/g,'').split(/\n\s*\n+/).map(b=>b.trim()).filter(Boolean);
  let allScenes=[];
  preBlocks.forEach(block=>{
    // Extract speaker prefix if present
    let speakerMatch=block.match(/^((?:ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO)\s*:\s*)/i);
    let speaker=speakerMatch?speakerMatch[1].trim():'';
    let body=speakerMatch?block.slice(speakerMatch[0].length).trim():block;
    let sentences=sentenceSplit(body);
    if(!sentences.length)return;
    let buffer='';
    let bufferVO=0;
    sentences.forEach(sent=>{
      let sentVO=estimateVO(sent);
      // Single sentence too long? Try comma split
      if(sentVO>usable){
        if(buffer){allScenes.push(speaker?speaker+' '+buffer:buffer);buffer='';bufferVO=0}
        let parts=commaSplit(sent);
        if(parts.length>1){
          let pBuf='',pVO=0;
          parts.forEach((p,pi)=>{
            let pV=estimateVO(p);
            if(pV>usable){if(pBuf){allScenes.push(speaker?speaker+' '+pBuf:pBuf);pBuf='';pVO=0}allScenes.push(speaker?speaker+' '+p:p)}
            else if(pVO+pV>usable){if(pBuf)allScenes.push(speaker?speaker+' '+pBuf:pBuf);pBuf=p;pVO=pV}
            else{pBuf=pBuf?pBuf+', '+p:p;pVO+=pV}
          });
          if(pBuf)allScenes.push(speaker?speaker+' '+pBuf:pBuf);
        }else{
          // No comma to split on - push as overflow scene
          allScenes.push(speaker?speaker+' '+sent:sent);
        }
        return;
      }
      // Normal sentence - pack into buffer if fits
      if(bufferVO+sentVO>usable){
        if(buffer)allScenes.push(speaker?speaker+' '+buffer:buffer);
        buffer=sent;bufferVO=sentVO;
      }else{
        buffer=buffer?buffer+' '+sent:sent;
        bufferVO+=sentVO;
      }
    });
    if(buffer)allScenes.push(speaker?speaker+' '+buffer:buffer);
  });
  return allScenes;
}

 class="sceneWS"><div class="box"><div class="section-head" style="margin-bottom:10px;padding-bottom:6px"><h2>Raw Scene Text</h2><span class="section-sub">${totalChars} krk · ${blocks.length} sahne</span></div><p class="hint" style="margin-bottom:10px">${autoOn?'Metni yapıştır - otomatik cümle bölme aktif.':'Boş satır, ARAS / DEFNE veya text# marker destekli.'}</p><textarea id="rawScenes" style="min-height:440px" placeholder="Voice-over metnini yapıştır...">${safe(production.scenes)}</textarea><div class="row" style="margin-top:10px"><button class="btn primary" onclick="saveRawScenes()">Kaydet · Böl</button><button class="btn" onclick="if(confirm('Tüm sahneler silinecek. Emin misin?')){production.scenes='';production.finalConfirmed=false;save();render()}">Temizle</button></div></div><div class="box"><div class="section-head" style="margin-bottom:10px;padding-bottom:6px"><h2>Scene Editor</h2><span class="section-sub">${blocks.length} sahne${redCount?` · <span style="color:var(--red)">${redCount} bölünmeli</span>`:warnCount?` · ${warnCount} uyarı`:''}</span></div><p class="hint" style="margin-bottom:10px">Editler Final Brief'e <b>Editleri Uygula</b> ile gider.${redCount?' Kırmızı sahneler engine usable\'ı aştı - site otomatik bölemedi, manuel müdahale gerekiyor.':''}</p><div class="row" style="margin-bottom:10px"><button class="btn sm" onclick="addScene()">+ Sahne</button><button class="btn sm primary" onclick="applySceneEditor()">Editleri Uygula</button>${autoOn?'<button class="btn sm" onclick="reSplitNow()">↻ Yeniden Böl</button>':''}</div><div class="sceneList">${blocks.length?blocks.map((b,i)=>sceneItem(b,i)).join(''):'<div class="hint" style="padding:30px 0;text-align:center">Henüz sahne yok. Sol panele metin yapıştır.</div>'}</div></div></div>`}function reSplitNow(){if(!production.scenes)return;let split=autoSplitText(production.scenes);production.scenes=split.join('\n\n');production.finalConfirmed=false;save();render();toast('Yeniden bölündü: '+split.length+' sahne')}function sceneItem(b,i){let lim=getEngineLimits();let eng=production.motionEngine||'Kling';let durLabel=b.voSecs>0?`VO ~${b.voSecs}s · CLIP ${b.clipSecs}s · TAIL ${b.tailSecs}s`:`${b.charCount} krk`;return `<div class="sceneItem"><div class="sceneHead"><span class="sid">[text#${b.id}]</span><span><span class="tag">${b.speaker}</span><span class="tag ${b.warning[1]}">${b.warning[0]}</span><span class="tag" title="${eng} max ${lim.max}s · usable ${lim.usable}s">${durLabel}</span></span></div><div>${b.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><textarea data-scene="${i}" style="min-height:96px;margin-top:8px">${safe(b.rawText)}</textarea><div class="sceneActions"><button onclick="moveScene(${i},-1)">↑ Yukarı</button><button onclick="moveScene(${i},1)">↓ Aşağı</button><button onclick="mergePrev(${i})">⇈ Birleş</button><button onclick="splitAtCursor(${i})">⎘ İmleçten böl</button><button onclick="duplicateScene(${i})">⧉ Duplicate</button><button onclick="deleteScene(${i})">✕ Sil</button></div></div>`}function saveRawScenes(){let raw=$('rawScenes').value.trim();if(production.autoSplit!==false&&raw){let split=autoSplitText(raw);production.scenes=split.join('\n\n');production.finalConfirmed=false;save();render();toast('Auto-split: '+split.length+' sahne')}else{production.scenes=raw;production.finalConfirmed=false;save();render();toast('Scenes parsed')}}function draftScenes(){let a=splitScenes(production.scenes);let nodes=document.querySelectorAll('[data-scene]');if(nodes.length!==a.length){toast('⚠ Editor/raw desync - raw kullanıldı');return a.filter(Boolean)}nodes.forEach(n=>a[+n.dataset.scene]=n.value.trim());return a.filter(Boolean)}function setScenes(a){production.scenes=a.join('\n\n');production.finalConfirmed=false;save();render()}function applySceneEditor(){setScenes(draftScenes());toast('Scene editleri uygulandı')}function addScene(){let a=draftScenes();a.push('Yeni sahne metni...');setScenes(a)}function moveScene(i,d){let a=draftScenes(),j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];setScenes(a)}function mergePrev(i){let a=draftScenes();if(i<=0)return;a[i-1]=(a[i-1]+'\n'+a[i]).trim();a.splice(i,1);setScenes(a)}function splitAtCursor(i){let n=document.querySelector(`[data-scene="${i}"]`),a=draftScenes();if(!n)return;let p=n.selectionStart||Math.floor(n.value.length/2),x=n.value.slice(0,p).trim(),y=n.value.slice(p).trim();if(!x||!y){toast('İmleci metnin ortasına koy');return}a.splice(i,1,x,y);setScenes(a)}function duplicateScene(i){let a=draftScenes();a.splice(i+1,0,a[i]);setScenes(a)}function deleteScene(i){let a=draftScenes();a.splice(i,1);setScenes(a)}
function resolve(){let proj=findProject(),pal=findPalette(),ref=findRef();return{project:proj?.name||'General cinematic education video',world:production.world||proj?.world||'Premium Pixar Education',imageEngine:production.imageEngine||proj?.imageEngine||'Nano Banana',motionEngine:production.motionEngine||proj?.motionEngine||'Kling',palette:pal?.name||proj?.recommendedPalettes?.[0]||'Vibrant Clean Education',paletteBehavior:pal?.behavior||'project-appropriate clean cinematic color separation',lightBias:pal?.lightBias||'scene-appropriate cinematic light',shadowBias:pal?.shadowBias||'clean readable shadow behavior',paletteAvoid:pal?.avoid||'muddy color and clutter',reference:ref?.name||'Infer from selected palette, project type, and scene context',referenceLook:ref?.look||'No single reference locked; infer visual grammar from production setup.',refBrain:production.referenceBrain||null,characterMode:production.characterMode||proj?.characterMode||'Aras + Defne Locked, scene-adaptive visibility',costumeLogic:production.costumeLogic||proj?.costumeLogic||'scene-context adaptive costume logic',tone:production.tone||proj?.tone||'warm, clear, cinematic, production-quality',scenes:sceneBlocks().map(b=>{let durLine=b.voSecs>0?`VO DURATION: ~${b.voSecs}s · CLIP TARGET: ${b.clipSecs}s · TAIL: ${b.tailSecs}s`:'';return `[text#${b.id}]${durLine?'\n'+durLine:''}\n${b.rawText}`}).join('\n\n')||'Scene text will be provided separately by Mami.'}}function engineRules(img,mot){let imgRule=img==='Flux'?'For Flux image prompts: prioritize photorealism, PBR materials, realistic lens behavior, natural imperfections, cinematic light, skin/material realism.':img==='Nano Banana'?'For Nano Banana image prompts: prioritize premium 3D animated feature quality, clean staging, vibrant controlled palette, readable composition, expressive but stable child characters, material clarity, and cinematic depth.':'For selected image engine: prioritize clarity, composition, light, material, scene readability.';let motRule=mot==='Kling'?'For Kling motion prompts after IMAGE ONAY: use start-frame based controlled motion, approach → pause → break/change → reaction → stabilize, max two dominant moving elements, and clear environmental reaction.':mot==='Runway'?'For Runway motion prompts after IMAGE ONAY: use concise subject-action-camera-lighting language, stable background unless intended, moderate motion intensity, no over-complex transformations.':mot==='Luma'?'For Luma motion prompts after IMAGE ONAY: prioritize spatial continuity, cinematic camera path, atmosphere, environment persistence, graceful movement, and stable scene identity.':'For selected motion engine: use controlled, engine-aware motion and preserve scene identity.';return imgRule+'\n'+motRule}function buildBrief(mode='claude'){let d=resolve();let rb=d.refBrain?`Camera grammar: ${d.refBrain.cameraGrammar}\nLighting grammar: ${d.refBrain.lightingGrammar}\nMaterial grammar: ${d.refBrain.materialGrammar}\nMotion grammar: ${d.refBrain.motionGrammar}\nBest for: ${d.refBrain.bestFor}\nAvoid: ${d.refBrain.avoid}`:(production.reference?`Reference selected: ${production.reference}\nReference look: ${production.referenceLook||'See reference name for grammar guidance.'}\nNote: Full grammar available in MAMILAS app.`:'No single reference locked. Infer visual grammar from project type, selected palette, and scene context. Do not copy IP.');let core=`MAMILAS PRODUCTION BIBLE - ${getProfile().emoji} ${getProfile().name}\n\nROLE + LANGUAGE\nYou are MAMILAS, Mami's cinematic AI production brain. Speak to Mami in Turkish. Write image prompts, motion prompts, and Suno prompts in English unless requested otherwise.\n\nPIPELINE LOCK\nCurrent phase: IMAGE PHASE. Write IMAGE PHASE prompts first. Do not write MOTION PHASE prompts until Mami says IMAGE ONAY, Motion Phase, or explicitly asks for motion. Preserve all [text#NNN] labels exactly. Do not skip scenes. Do not merge scenes unless Mami asks.\n\nACTIVE PROFILE\n${getProfile().emoji} ${getProfile().name} - ${getProfile().desc}\n\nSELECTED PRODUCTION SETUP\nProject type: ${d.project}\nWorld: ${d.world}\nImage engine: ${d.imageEngine}\nMotion engine: ${d.motionEngine}\nPalette: ${d.palette}\nReference: ${d.reference}\nReference look: ${d.referenceLook}\nTone: ${d.tone}\nCharacter mode: ${d.characterMode}\nCostume logic: ${d.costumeLogic}\n\nREFERENCE BRAIN\nUse selected reference only as production grammar, not copy target.\n${rb}\n\nPALETTE BEHAVIOR\nSelected palette: ${d.palette}\nBehavior: ${d.paletteBehavior}\nLighting bias: ${d.lightBias}\nShadow behavior: ${d.shadowBias}\nAvoid: ${d.paletteAvoid}\n\nTURKIYE CONTEXT LOCK\nEnglish prompts, Turkish visual world when relevant. Avoid foreign school defaults, unintended English on-screen text, random ethnicity drift, generic Western classroom look, and random cultural props. Prefer Turkish / Mediterranean / Anatolian visual logic, premium Turkish private school atmosphere when educational, and respectful Turkish historical context when historical.\n\n${getProfile().masterAddon}\n\nIMAGE PHASE RULES\nFor each [text#NNN], write one image prompt. Each image prompt must describe a start frame, not completed final action. The frame must feel alive, cinematic, dimensional, and ready for motion. One scene = one idea. Show, do not tell. Avoid clutter, random UI, flat cardboard, generic AI look, plastic skin, and style clash.\n\nSHOT DIRECTOR\nChoose camera by scene idea: wide for scale, medium for interaction, close-up for emotion, macro for small details, overhead for systems/maps/patterns, low angle for power, slow push-in for discovery, dolly zoom for realization/shock/perspective break, rack focus for attention shift, orbit for transformation, static locked-off for dignity/history.\n\nDURATION + VOICE-OVER DISCIPLINE\nEvery scene includes VO DURATION (estimated voice-over length), CLIP TARGET (final video length), and TAIL (silent buffer at end).\n- Voice-over is always equal to or shorter than the video clip. The clip can never end before the voice-over.\n- Engine usable limits: Kling 8.5s safe (10s max with morph risk in last 1.5s), Runway 14.5s safe (16s max), Luma 8s safe (9s max). Plan motion to complete before VO ends.\n- TAIL = silent space after VO ends. Do not start new action in tail - use it for hold, slow drift, atmospheric settle, or stabilization. This protects the clip from morph artifacts in the unsafe end zone.\n- If a scene is marked BÖLEMEZSİN (uncuttable / over engine usable limit), the scene was kept on purpose; mention this in PRODUCTION NOTE so Mami can split it manually if needed.\n\nMOTION PHASE RULES\nDo not write motion prompts now unless Mami explicitly requests Motion Phase. When motion is requested, write motion prompts that respect each scene's CLIP TARGET and TAIL. Text may appear or animate only when short, large, clean, readable, and intentionally designed for AI video. Avoid long sentences, small typography, dense UI text, and complex text deformation.\n\nENGINE BEHAVIOR\n${engineRules(d.imageEngine,d.motionEngine)}\n\nSUNO / MUSIC\nIf useful, provide narration-friendly instrumental Suno prompt with genre, instrumentation, BPM, mood, energy curve, arrangement, cinematic texture, mixing note, avoid list, negative prompt.\n\nSCENES\n${d.scenes}\n\nOUTPUT FORMAT\nFor each scene:\n[text#NNN]\nVO DURATION / CLIP TARGET / TAIL: (echo the values from the scene block exactly)\nIMAGE PROMPT:\n<English image prompt - start frame ready for motion, alive but not finished>\n\nPRODUCTION NOTE:\n<Turkish short note: shot type, light intent, any duration concern, any context lock>\n\nDo not output motion prompts yet. Do not explain the system. Preserve all text#NNN labels exactly. Each scene maps to one Freepik / image-generator slot keyed by that text number.`;if(mode==='gpt'){let blocks=sceneBlocks();let gptScenes=blocks.slice(0,8).map(b=>{let dur=b.voSecs>0?` (VO ~${b.voSecs}s · CLIP ${b.clipSecs}s)`:'';return `[text#${b.id}]${dur}\n${b.rawText.slice(0,140)}${b.rawText.length>140?'...':''}`}).join('\n\n')+(blocks.length>8?`\n\n...(+${blocks.length-8} more scenes - paste remainder separately)`:'');return core.replace(/SCENES\n[\s\S]*?\nOUTPUT FORMAT/,'SCENES\n'+gptScenes+'\n\nOUTPUT FORMAT')}return core}
function renderFinal(){let charCount=(production.finalEdit||buildBrief(ui.briefMode)).length;return `<div class="box"><div class="section-head" style="margin-bottom:10px;padding-bottom:6px"><h2>Brief Mode</h2><span class="section-sub">${charCount} krk</span></div><div class="row"><span class="pill ${ui.briefMode==='claude'?'sel':''}" onclick="ui.briefMode='claude';save();render()">Claude Sonnet</span><span class="pill ${ui.briefMode==='gpt'?'sel':''}" onclick="ui.briefMode='gpt';save();render()">GPT Compact / 8000</span></div><div class="row" style="margin-top:12px;gap:6px"><button class="btn primary" onclick="refreshBrief()">↻ Yenile</button><button class="btn" onclick="copyBrief()">⧉ Kopyala</button><button class="btn" onclick="copyProofChecklist()">⌕ Proof Checklist</button><button class="btn" onclick="downloadText('mamilas_final_brief.txt',$('finalBrief').value)">↓ İndir</button><button class="btn" onclick="production.finalConfirmed=true;save();render();toast('Final onaylandı')">✓ Onayla</button></div></div><textarea id="finalBrief" class="final">${safe(production.finalEdit||buildBrief(ui.briefMode))}</textarea><div class="box" style="margin-top:14px"><div class="section-head" style="margin-bottom:8px;padding-bottom:6px"><h2>System Prompt Export</h2><span class="section-sub">Kalıcı agent talimatı</span></div><p class="hint" style="margin-bottom:10px">Site state'i içermez. Claude Project / Custom GPT için.</p><div class="sys-export"><div class="sys-row"><span class="sys-label">Profil seç:</span><div class="row" style="gap:4px;flex-wrap:wrap">${Object.values(PROFILES).map(p=>`<button class="btn sm ${(ui.sysProfile||'aras-defne')===p.id?'primary':''}" onclick="ui.sysProfile='${p.id}';save();render()">${p.emoji} ${p.short}</button>`).join('')}</div></div><div class="sys-row"><span class="sys-label">Hedef:</span><div class="row" style="gap:4px;flex-wrap:wrap"><button class="btn sm" onclick="$('sysOut').value=buildSystemPrompt(ui.sysProfile||'aras-defne','master')">Master</button><button class="btn sm" onclick="$('sysOut').value=buildSystemPrompt(ui.sysProfile||'aras-defne','claude')">Claude Project</button><button class="btn sm" onclick="$('sysOut').value=buildSystemPrompt(ui.sysProfile||'aras-defne','gpt')">Custom GPT</button><button class="btn sm primary" onclick="navigator.clipboard.writeText($('sysOut').value);toast('Talimat kopyalandı')">⧉ Kopyala</button></div></div></div><textarea id="sysOut" class="sysout" readonly placeholder="Master / Claude / Custom GPT seç..."></textarea></div>`}function refreshBrief(){production.finalEdit=buildBrief(ui.briefMode);production.finalConfirmed=false;save();render();toast('Brief yenilendi')}function copyBrief(){let t=$('finalBrief')?.value||buildBrief(ui.briefMode);navigator.clipboard.writeText(t);toast('Brief kopyalandı')}function copyProofChecklist(){navigator.clipboard.writeText(PROOF_CHECKLIST);toast('Proof checklist kopyalandı - Claude\'a yapıştır')}function downloadText(fn,txt){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download=fn;a.click()}
function renderAcademy(){let cats=Object.keys(ACADEMY),cat=ui.academyCategory,tips=ACADEMY[cat]||[];return `<div class="cat-bar">${cats.map(c=>{let n=(ACADEMY[c]||[]).length;return `<button class="cat-pill ${cat===c?'sel':''}" onclick="ui.academyCategory='${c}';save();render()">${c}<span class="cat-count">${n}</span></button>`}).join('')}</div><div class="section-head"><h2>${cat}</h2><span class="section-sub">${tips.length} tip</span></div><div class="grid g2">${tips.map(t=>`<div class="academy-tip"><b>${t[0]}</b><p>${t[1]}</p></div>`).join('')}</div>`}
function previewClass(ref){let st=ref?.previewStyle||'';let cls='';if(/baroque|rembrandt|historical|prestige|dark|desert|commercial-dark|fantasy|fantasy-myth|game-cine|cinema-real|luxury|neon-noir|anime-sharp/.test(st))cls+=' fx-deep';if(/vermeer|window|arrival|tech-doc|architecture|natural-real/.test(st))cls+=' fx-window';if(/caravaggio|spot|commercial-dark|commercial-clean|explainer/.test(st))cls+=' fx-spot';if(/cosmic|space|cosmic-scale|ghibli|soft-3d/.test(st))cls+=' fx-cosmic';return cls}function getPreviewTheme(ref){

  if(n.includes('naruto'))return{root:'skin-naruto',label:'ninja training',anime:true};

  if(n.includes('jujutsu'))return{root:'skin-jujutsu',label:'curse energy',anime:true};

  if(n.includes('haikyuu'))return{root:'skin-haikyuu',label:'volleyball vibe',anime:true};
  // Ghibli exact
  if(n.includes('spirited away')||n.includes('totoro')||n.includes('ponyo')||n.includes('arrietty')||n.includes('porco'))return{root:'skin-ghibli',label:'soft wonder',anime:false};
  if(n.includes('princess mononoke'))return{root:'skin-mononoke',label:'forest spirit',anime:false};

  if(n.includes('wind rises')||n.includes('whisper')||n.includes('only yesterday'))return{root:'skin-ghibli',label:'painterly calm',anime:false};
  // 3D Animation
  if(n.includes('coco'))return{root:'skin-coco',label:'marigold glow',anime:false};
  if(n.includes('encanto'))return{root:'skin-encanto',label:'magical family',anime:false};
  if(n.includes('soul')||n.includes('piper')||n.includes('luca')||n.includes('inside out')||n.includes('ratatouille')||n.includes('wall-e')||n.includes('up ')||n.includes('toy story')||n.includes('elemental')||n.includes('monsters'))return{root:'skin-soft3d',label:'3D world',anime:false};
  // Sci-fi / space
  if(n.includes('interstellar')||n.includes('gravity')||n.includes('ad astra')||n.includes('2001')||n.includes('nasa')||n.includes('cosmos'))return{root:'skin-space',label:'cosmic scale',anime:false};
  if(n.includes('arrival'))return{root:'skin-arrival',label:'quiet mystery',anime:false};
  if(n.includes('blade runner')||n.includes('tron')||n.includes('cyberpunk')||n.includes('neon'))return{root:'skin-jujutsu',label:'cyber dark',anime:false};

  if(c.includes('historical')||n.includes('atatürk')||n.includes('republic')||n.includes('cumhuriyet')||n.includes('ottoman')||n.includes('canakkale')||n.includes('samsun'))return{root:'skin-history',label:'archive prestige',anime:false};

  // Documentary
  if(c.includes('documentary')||n.includes('planet earth')||n.includes('free solo')||n.includes('chef')||n.includes('veritasium'))return{root:'skin-documentary',label:'grounded real',anime:false};
  // Art history / painterly
  if(c.includes('art history')||n.includes('caravaggio')||n.includes('rembrandt')||n.includes('vermeer')||n.includes('monet')||n.includes('hopper'))return{root:'skin-painterly',label:'painterly light',anime:false};
  // Architecture
  if(c.includes('architecture'))return{root:'skin-architecture',label:'spatial lines',anime:false};
  // Explainer / Education
  if(c.includes('explainer')||n.includes('kurzgesagt')||n.includes('ted ed'))return{root:'skin-soft3d',label:'diagram world',anime:false};
  // Fantasy / Game
  if(c.includes('fantasy')||c.includes('game')||n.includes('elden')||n.includes('god of war')||n.includes('witcher'))return{root:'skin-mononoke',label:'mythic world',anime:false};
  // Real People / Commercial profiles
  if(prof==='real-people')return{root:'skin-flux-real',label:'cinematic real',anime:false};
  if(prof==='commercial')return{root:'skin-commercial',label:'premium hero',anime:false};
  // Category fallbacks
  if(c.includes('anime'))return{root:'skin-naruto',label:'anime energy',anime:true};

  if(c.includes('sci-fi'))return{root:'skin-space',label:'future scale',anime:false};
  if(c.includes('luxury'))return{root:'skin-commercial',label:'luxury frame',anime:false};
  return{root:'skin-soft3d',label:'production brain',anime:false};
}

function getWorldKey(ref){

  if(n.includes('ted ed')||n.includes('ted-ed')) return 'ted-ed';

  if(n.includes('akira')||n.includes('evangelion')||n.includes('ghost in the shell')||n.includes('cowboy bebop')) return 'sci-anime';
  if(n.includes('cars')||n.includes('incredibles')||n.includes('finding nemo')||n.includes('moana')||n.includes('brave')||n.includes('tangled')||n.includes('zootopia')||n.includes('frozen')||n.includes('big hero')) return 'soft-feature';

  if(n.includes('van gogh')) return 'art-van-gogh';
  if(n.includes('monet')) return 'art-monet';

  if(n.includes('klimt')) return 'art-klimt';
  if(n.includes('hopper')) return 'art-hopper';
  if(n.includes('bosch')) return 'art-bosch';
  if(n.includes('hokusai')) return 'art-hokusai';
  if(n.includes('rothko')) return 'art-rothko';
  if(n.includes('kandinsky')) return 'art-kandinsky';
  if(n.includes('dali')) return 'art-dali';
  if(n.includes('picasso')) return 'art-picasso';
  if(n.includes('matisse')) return 'art-matisse';
  if(n.includes('degas')) return 'art-degas';
  if(n.includes('goya')) return 'art-goya';
  if(n.includes('turner')) return 'art-turner';
  if(n.includes('cezanne')) return 'art-cezanne';
  if(n.includes('botticelli')) return 'art-botticelli';
  if(n.includes('delacroix')) return 'art-delacroix';
  if(n.includes('durer')||n.includes('dürer')) return 'art-durer';
  if(n.includes('bruegel')) return 'art-bruegel';
  if(n.includes('caravaggio')||n.includes('baroque')) return 'baroque';
  if(n.includes('vermeer')) return 'vermeer-world';
  if(n.includes('rembrandt')) return 'rembrandt-world';
  if(n.includes('atatürk')||n.includes('republic')||n.includes('samsun')||n.includes('ankara assembly')) return 'turkish-history';

  if(n.includes('finding nemo')) return 'finding-nemo';
  if(n.includes('the incredibles')) return 'incredibles';
  if(n.includes('moana')||n.includes('brave')||n.includes('tangled')||n.includes('zootopia')||n.includes('frozen')||n.includes('big hero')) return 'soft-feature';

  if(n.includes('godfather')) return 'rembrandt-world';
  if(n.includes('leonardo')) return 'renaissance';
  if(n.includes('magritte')) return 'art-surreal';
  return null;
}


function paletteDataForPreview(pal){
  return pal?{name:pal.name,c0:pal.colors[0]||'#ffd36b',c1:pal.colors[1]||'#79bdff',c2:pal.colors[2]||'#101525'}:{name:'Default',c0:'#ffd36b',c1:'#79bdff',c2:'#101525'};
}

function paletteGradeSVG(p,ref){
  let c0=p.c0||'#ffd36b', c1=p.c1||'#79bdff', c2=p.c2||'#101525';
  let cat=(ref&&ref.category)||'';
  let isAnime=/Anime/i.test(cat), isHist=/Historical|Art History|Turkish/i.test(cat), isLux=/Commercial|Luxury/i.test(cat), isSci=/Sci|Explainer/i.test(cat);
  let mid=isAnime?0.30:isHist?0.24:isLux?0.22:isSci?0.26:0.20;
  let wash=isAnime?0.22:isHist?0.18:isLux?0.16:0.14;
  let base=isHist?0.28:isLux?0.30:0.20;
  return `
    <defs>
      <linearGradient id="palwash" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${c0}" stop-opacity="${wash}"/>
        <stop offset="48%" stop-color="${c1}" stop-opacity="${mid}"/>
        <stop offset="100%" stop-color="${c2}" stop-opacity="${base}"/>
      </linearGradient>
      <radialGradient id="palrim" cx="72%" cy="24%" r="58%">
        <stop offset="0%" stop-color="${c0}" stop-opacity=".50"/>
        <stop offset="45%" stop-color="${c1}" stop-opacity=".16"/>
        <stop offset="100%" stop-color="${c2}" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="palground" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${c2}" stop-opacity="0"/>
        <stop offset="100%" stop-color="${c2}" stop-opacity=".52"/>
      </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#palwash)" style="mix-blend-mode:soft-light"/>
    <rect width="100%" height="100%" fill="url(#palrim)" style="mix-blend-mode:screen"/>
    <rect y="55%" width="100%" height="45%" fill="url(#palground)"/>
    <g opacity=".92">
      <circle cx="344" cy="66" r="26" fill="${c0}" opacity=".18"/>
      <circle cx="344" cy="66" r="42" fill="${c0}" opacity=".10"/>
      <path d="M0,222 Q110,210 205,222 T400,216 L400,260 L0,260 Z" fill="${c2}" opacity=".30"/>
      <path d="M0,224 Q90,212 190,224 T400,218" stroke="${c1}" stroke-width="1.4" opacity=".20" fill="none"/>
    </g>`;
}

function renderPreview(){
  let ref=findRef(),pal=findPalette();
  let preview=document.getElementById('preview');
  if(!preview)return;
  let worldKey=getWorldKey(ref);
  let palData=paletteDataForPreview(pal);
  let svg='';
  if(worldKey && WORLDS[worldKey]){
    svg=WORLDS[worldKey](palData);
  }else if(ref && CATEGORY_WORLDS[ref.category]){
    svg=CATEGORY_WORLDS[ref.category](palData);
  }else if(production.activeProfile==='real-people'){
    svg=CATEGORY_WORLDS['Live Action Cinema'](palData);
  }else if(production.activeProfile==='commercial'){
    svg=CATEGORY_WORLDS['Commercial'](palData);
  }else{
    svg=CATEGORY_WORLDS['3D Animation'](palData);
  }
  let palOverlay=paletteGradeSVG(palData,ref);
  preview.style.setProperty('--a',palData.c0);
  preview.style.setProperty('--b',palData.c1);
  preview.style.setProperty('--c',palData.c2);
  preview.innerHTML=`<svg viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" style="display:block">${svg}${palOverlay}</svg>
    <div class="previewLabel">${safe(ref?.name||pal?.name||'MAMILAS')}</div>
    ${ref?`<div class="previewChip">${safe(ref.category||'')}</div>`:''}
    <div class="previewPalChip">${safe(palData.name||'Palette')}</div>
    ${(production.imageEngine||production.motionEngine)?`<div class="previewEngine">${safe((production.imageEngine||'')+' · '+(production.motionEngine||''))}</div>`:''}`;
  preview.className='bigPreview';
  preview.dataset.refCount=String(REFERENCES.length);
}
