<style>

.logo{padding:22px 18px 16px;border-bottom:1px solid var(--line)}.mark{font-weight:950;font-size:24px;letter-spacing:-1.2px}.mark b{color:var(--gold)}.sub{font:10px var(--mono);color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:6px}
.nav{padding:10px;display:flex;flex-direction:column;gap:2px}.nav button{display:flex;gap:10px;align-items:center;text-align:left;padding:9px 10px;border-radius:var(--r8);color:var(--muted);position:relative}.nav button:hover{background:var(--s3);color:var(--text)}.nav button.on{background:linear-gradient(90deg,#f5c84222,transparent);color:var(--text)}.nav button.on:before{content:'';position:absolute;left:0;top:20%;height:60%;width:2px;background:var(--gold)}.step{width:22px;height:22px;border-radius:5px;background:var(--s3);border:1px solid var(--line2);display:grid;place-items:center;font:800 10px var(--mono);color:var(--muted)}.nav button.on .step{border-color:var(--gold);color:var(--gold);background:var(--goldsoft)}.nav b{font-size:12px}.nav small{display:block;font-size:10px;color:var(--muted)}.sideBottom{padding:14px 12px 16px;border-top:1px solid var(--line)}.bar{height:4px;border-radius:99px;background:var(--s3);overflow:hidden;margin:8px 0 12px}.fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green))}
.btn{background:var(--s3);border:1px solid var(--line2);border-radius:var(--r8);padding:8px 12px;font:800 12px var(--sans);transition:.14s}.btn:hover{background:var(--s4);border-color:var(--line3)}.btn.primary{background:var(--gold);border-color:var(--gold);color:#1a1100}.btn.danger{color:var(--red);background:#f54d6b10}.btn.ghost{background:transparent}.btn.sm{padding:5px 8px;font-size:11px}

input,textarea,select{width:100%;background:var(--s2);border:1px solid var(--line2);border-radius:var(--r8);padding:9px 10px;font-size:12px}textarea{min-height:120px;resize:vertical;font:12px/1.55 var(--mono)}label,.fieldLabel{display:block;font:900 10px var(--mono);color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:8px 0 5px}.fieldGrid{display:grid;gap:10px}.fieldGrid.g3{grid-template-columns:repeat(3,1fr)}.fieldGrid.g2{grid-template-columns:repeat(2,1fr)}.row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.copyBar{background:var(--s1);border:1px solid var(--line2);border-radius:var(--r12);padding:12px;margin-bottom:12px}.finalBox{background:#070809;border:1px solid var(--line2);border-radius:var(--r8);padding:16px;white-space:pre-wrap;max-height:650px;overflow:auto;font:11.5px/1.58 var(--mono);color:var(--text2)}.sw{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin:10px 0}.sw b{height:5px;border-radius:99px}.groupTitle{font:900 11px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:24px 0 10px}
.scene{background:var(--s1);border:1px solid var(--line2);border-radius:var(--r12);padding:14px;margin-bottom:10px}.scene.sourceLocked{border-left:3px solid var(--green)}.scene.warn{border-left:3px solid var(--gold)}.sceneHead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}.sid{font:900 11px var(--mono);color:var(--gold);background:var(--s3);border:1px solid var(--line2);border-radius:5px;padding:3px 7px}.sceneAdvanced{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.sceneAdvanced textarea{min-height:64px}.sourceMini{font:10px var(--mono);color:var(--muted);margin:6px 0;border-top:1px solid var(--line);padding-top:6px}
.section{padding:16px;border-bottom:1px solid var(--line)}.rtitle{font:900 10px var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}.kv{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid var(--line);padding:6px 0}.kv span{font:900 10px var(--mono);color:var(--muted);text-transform:uppercase}.kv b{text-align:right;font-size:11px}.preview{height:246px;position:relative;overflow:hidden;background:radial-gradient(circle at 70% 20%,#ffffff14,transparent 38%),linear-gradient(145deg,#11131d,#050609);border-bottom:1px solid var(--line)}.pvChip{position:absolute;top:12px;left:12px;font:900 10px var(--mono);background:#0009;border:1px solid #fff2;color:#fff;border-radius:6px;padding:4px 8px}.pvPath{position:absolute;top:12px;right:12px;font:900 9px var(--mono);background:var(--gold);color:#1a1100;border-radius:6px;padding:4px 8px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pvLabel{position:absolute;bottom:12px;left:13px;right:13px;color:#fff;text-shadow:0 2px 12px #000;font-size:11px;font-weight:900}.orb{position:absolute;border-radius:50%;box-shadow:inset -12px -16px 30px #0009,0 10px 28px #000b}.line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}.grain:after{content:'';position:absolute;inset:0;opacity:.13;background-image:radial-gradient(#fff 0.5px,transparent 0.5px);background-size:6px 6px;mix-blend-mode:overlay}.halftone:after{content:'';position:absolute;inset:0;opacity:.16;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:9px 9px;mix-blend-mode:overlay}
.qHero{border:1px solid var(--line3);background:radial-gradient(circle at 15% 0%,#f5c84222,transparent 35%),linear-gradient(180deg,var(--s2),var(--s1));border-radius:var(--r16);padding:24px;margin-bottom:18px}.qScore{font:900 64px var(--mono);letter-spacing:-4px;color:var(--gold);line-height:1}.metric{display:grid;grid-template-columns:170px 1fr 52px;gap:10px;align-items:center;border-bottom:1px solid var(--line);padding:9px 0}.meter{height:6px;background:var(--s3);border-radius:99px;overflow:hidden}.meter b{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green));border-radius:99px}.qaResult{border-left:3px solid var(--gold);background:#070809;border-radius:8px;padding:12px;font:11.5px/1.55 var(--mono);white-space:pre-wrap;color:var(--text2)}.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:99px;font-weight:900;z-index:100}
.mob-bar,.mob-nav{display:none}
@media(max-width:1100px){.app{grid-template-columns:220px 1fr 300px}.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.app{display:flex;flex-direction:column}.side{display:none}.main{padding:12px 14px 82px}.right{position:fixed;bottom:60px;left:0;right:0;height:56vh;z-index:50;transform:translateY(110%);transition:.25s;border-top:1px solid var(--line3);border-radius:16px 16px 0 0}.right.open{transform:translateY(0)}.mob-bar{display:flex;position:sticky;top:0;z-index:60;align-items:center;gap:10px;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--line2)}.mob-logo{font-weight:900;font-size:18px}.mob-logo b{color:var(--gold)}.mob-spacer{flex:1}.mob-icon{width:36px;height:36px;display:grid;place-items:center;border:1px solid var(--line2);border-radius:8px;background:var(--s2)}.mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--s1);border-top:1px solid var(--line2);z-index:60;overflow:auto}.mob-nav button{min-width:58px;color:var(--muted);font:900 8px var(--mono);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}.mob-nav button.on{color:var(--gold)}.title{font-size:24px}.g2,.g3,.g4,.fieldGrid.g2,.fieldGrid.g3{grid-template-columns:1fr}.sceneAdvanced{grid-template-columns:1fr}.finalBox{max-height:430px}.card,.box{padding:13px}.metric{grid-template-columns:1fr}}

/* =========================
   MAMILAS QUANTUM RELEASE UI HARD POLISH
   Keeps v18 brain intact; upgrades cockpit feel, preview presence, focus states, mobile touch.
   ========================= */
:root{
  --bg:#030407;
  --s1:#080a0f;
  --s2:#0d1018;
  --s3:#151927;
  --s4:#202637;
  --line:#ffffff10;
  --line2:#ffffff1c;
  --line3:#ffffff34;
  --gold:#f7c948;
  --gold2:#d99a2b;
  --goldsoft:#f7c94814;
  --cinema-red:#9f1d2f;
  --glass:rgba(255,255,255,.045);
  --glass2:rgba(255,255,255,.075);
}
html{background:#030407}
body{
  background:
    radial-gradient(circle at 15% -10%, rgba(245,200,66,.11), transparent 34%),
    radial-gradient(circle at 85% 10%, rgba(91,159,255,.075), transparent 34%),
    radial-gradient(circle at 50% 115%, rgba(168,125,255,.08), transparent 40%),
    linear-gradient(180deg,#030407,#07080d 42%,#030407);
}
body:before{
  content:"";
  position:fixed; inset:0; pointer-events:none; z-index:-1;
  background-image:
    linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(circle at 50% 25%, black, transparent 78%);
}
.app{isolation:isolate}
.side,.right{
  background:
    linear-gradient(180deg,rgba(255,255,255,.035),transparent 18%),
    linear-gradient(180deg,#090b10,#050609);
  box-shadow:0 0 70px rgba(0,0,0,.48);
}
.logo{
  background:
    radial-gradient(circle at 18% 0%, rgba(245,200,66,.18), transparent 42%),
    linear-gradient(180deg,rgba(255,255,255,.03),transparent);
}
.mark{
  text-shadow:0 0 24px rgba(245,200,66,.13);
}
.sub:after{
  content:" · CINEMA COMMAND";
  color:var(--gold);
}
.nav button{
  border:1px solid transparent;
}
.nav button:hover{
  border-color:var(--line2);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
}
.nav button.on{
  border-color:rgba(245,200,66,.24);
  box-shadow:0 0 24px rgba(245,200,66,.055), inset 0 0 18px rgba(245,200,66,.035);
}
.main{
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.025), transparent 42%),
    linear-gradient(180deg,rgba(255,255,255,.012),transparent 30%);
}
.pageHead{
  padding:4px 0 2px;
}
.eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  padding:5px 9px;
  border:1px solid rgba(245,200,66,.28);
  border-radius:999px;
  background:rgba(245,200,66,.06);
}
.eyebrow:before{
  content:"";
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 14px var(--green);
}
.title{
  max-width:980px;
  text-shadow:0 18px 70px rgba(0,0,0,.75);
}
.desc{
  max-width:850px;
}
.card,.box,.copyBar,.scene{
  background:
    linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018)),
    linear-gradient(180deg,#0b0d13,#07080c);
  box-shadow:0 18px 70px rgba(0,0,0,.24);
  backdrop-filter: blur(10px);
}
.card:hover{
  box-shadow:0 22px 90px rgba(0,0,0,.36),0 0 36px rgba(245,200,66,.035);
}
.card.sel{
  background:
    radial-gradient(circle at 20% 0%, rgba(245,200,66,.18), transparent 44%),
    linear-gradient(180deg,#111018,#090a0f);
  box-shadow:
    0 0 0 1px rgba(245,200,66,.85),
    0 0 42px rgba(245,200,66,.10),
    inset 0 0 30px rgba(245,200,66,.035);
}
.btn{
  min-height:35px;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
}
.btn.primary{
  background:linear-gradient(180deg,#ffe27a,#f5c842 46%,#c98c23);
  box-shadow:0 10px 36px rgba(245,200,66,.18);
}
.btn:active{transform:translateY(1px)}
input:focus,textarea:focus,select:focus{
  outline:none;
  border-color:rgba(245,200,66,.62);
  box-shadow:0 0 0 3px rgba(245,200,66,.10);
}
.finalBox,.qaResult{
  background:
    linear-gradient(180deg,rgba(255,255,255,.028),rgba(255,255,255,.01)),
    #050609;
  border-color:rgba(245,200,66,.18);
  box-shadow:inset 0 0 28px rgba(0,0,0,.42);
}
.preview{
  height:292px;
  background:
    radial-gradient(circle at 55% 18%, rgba(255,255,255,.16), transparent 25%),
    radial-gradient(circle at 26% 72%, rgba(245,200,66,.13), transparent 32%),
    linear-gradient(145deg,#151927 0%,#07090f 48%,#030407 100%);
}
.preview:before{
  content:"";
  position:absolute; inset:0; pointer-events:none;
  background:
    linear-gradient(90deg,transparent 0%,rgba(255,255,255,.08) 49%,transparent 52%),
    radial-gradient(circle at 50% 50%, transparent 44%,rgba(0,0,0,.56) 100%);
  opacity:.55;
}
.preview:after{
  content:"";
  position:absolute; inset:0; pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px);
  background-size:100% 8px;
  mix-blend-mode:overlay;
  opacity:.23;
}
.preview.grain:before{
  background:
    radial-gradient(circle at 68% 24%,rgba(245,164,66,.20),transparent 28%),
    radial-gradient(circle at 25% 70%,rgba(91,111,138,.18),transparent 36%),
    linear-gradient(135deg,rgba(0,0,0,.62),transparent 52%);
}
.preview.halftone:after{
  opacity:.22;
  background-image:radial-gradient(#fff 1px,transparent 1.2px);
  background-size:10px 10px;
}
.orb{
  filter:saturate(1.05) contrast(1.06);
}
.preview.grain .orb{
  border-radius:36% 64% 55% 45%;
  filter:contrast(1.18) saturate(.92);
}
.preview.halftone .orb{
  box-shadow:inset -12px -16px 30px #0009,0 10px 28px #000b, 8px 0 rgba(91,159,255,.15), -8px 0 rgba(245,77,107,.12);
}
.pvChip,.pvPath{
  z-index:2;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
}
.pvLabel{
  z-index:2;
  padding:8px 10px;
  border:1px solid rgba(255,255,255,.13);
  background:rgba(0,0,0,.34);
  backdrop-filter:blur(8px);
  border-radius:8px;
}
.qHero{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 14% 0%,rgba(245,200,66,.22),transparent 34%),
    radial-gradient(circle at 88% 18%,rgba(91,159,255,.12),transparent 32%),
    linear-gradient(180deg,#111522,#080a10);
  box-shadow:0 24px 110px rgba(0,0,0,.34), inset 0 0 0 1px rgba(255,255,255,.04);
}
.qHero:after{
  content:"";
  position:absolute; inset:auto -10% -40% -10%; height:60%;
  background:radial-gradient(ellipse at center, rgba(245,200,66,.09), transparent 70%);
  pointer-events:none;
}
.qScore{
  text-shadow:0 0 42px rgba(245,200,66,.22);
}
.metric{
  grid-template-columns:180px 1fr 58px;
}
.meter{
  background:rgba(255,255,255,.08);
  box-shadow:inset 0 0 10px rgba(0,0,0,.34);
}
.meter b{
  box-shadow:0 0 18px rgba(245,200,66,.15);
}
.scene.sourceLocked{
  box-shadow:0 18px 70px rgba(0,0,0,.22), inset 3px 0 0 rgba(77,245,160,.72);
}
.scene.warn{
  box-shadow:0 18px 70px rgba(0,0,0,.22), inset 3px 0 0 rgba(245,200,66,.72);
}
.sourceMini{
  background:rgba(255,255,255,.03);
  padding:7px 8px;
  border-radius:7px;
}
.toast{
  box-shadow:0 12px 44px rgba(0,0,0,.4);
}
.mob-bar{
  backdrop-filter:blur(14px);
}
@media(max-width:768px){
  .preview{height:220px}
  .main{background:linear-gradient(180deg,rgba(255,255,255,.018),transparent)}
  .btn{min-height:40px}
  input,textarea,select{font-size:16px}
}


/* =========================
   MAMILAS QUANTUM DIRECTOR OS
   10/10 category audit, command deck, denser hierarchy, director-grade readability.
   ========================= */
.auditGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px}
.auditCard{position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.052),rgba(255,255,255,.018)),#07090d;border:1px solid var(--line2);border-radius:16px;padding:16px;box-shadow:0 18px 75px rgba(0,0,0,.28)}
.auditCard:before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:linear-gradient(180deg,var(--gold),transparent)}
.auditHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
.auditHead h3{font-size:15px;margin:0}.auditScore{font:900 26px var(--mono);color:var(--gold);letter-spacing:-1px}
.auditCard p{color:var(--text2);font-size:12px}.auditCard ul{margin:10px 0 0 16px;color:var(--text2);font-size:12px}.auditCard li{margin:4px 0}
.commandDeck{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-bottom:18px}
.commandHero{background:radial-gradient(circle at 0% 0%,rgba(245,200,66,.19),transparent 35%),linear-gradient(180deg,#121724,#07090d);border:1px solid rgba(245,200,66,.26);border-radius:18px;padding:20px;box-shadow:0 24px 90px rgba(0,0,0,.35)}
.commandHero h2{font-size:26px;letter-spacing:-.7px;margin-bottom:8px}
.commandHero .micro{font:800 10px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.statusStack{display:grid;gap:8px}.statusLine{display:flex;justify-content:space-between;align-items:center;gap:10px;background:rgba(255,255,255,.035);border:1px solid var(--line2);border-radius:10px;padding:9px 10px}.statusLine span{font:800 10px var(--mono);color:var(--muted);text-transform:uppercase}.statusLine b{font-size:12px;text-align:right}
.roadmap{display:grid;gap:8px}.roadmap div{background:rgba(255,255,255,.035);border:1px solid var(--line2);border-radius:10px;padding:10px}.roadmap b{color:var(--gold)}
.finalBox{font-size:12px;line-height:1.62}
.scene textarea:nth-of-type(2){border-color:rgba(77,245,160,.28)}
.pvLabel:before{content:"PATH · ";color:var(--gold)}
.card h3{letter-spacing:-.15px}.card p{line-height:1.5}

function agentPacket(id){let a=active();let base=`MAMILAS ${id.toUpperCase()} DIRECTOR v21\nProduction Path is supreme: ${a.path.name} / ${S.productionPath}.\nScene Source Integrity is law: every [text#] carries source hash, char range, and 15s adaptation.\nPreserve scene IDs, @tags, identity, logo, text, output order, and path lock.\nForbidden Look: ${a.path.forbidden}.\nQuality Gate: ${a.path.gate.join(', ')}.\n`;let map={idea:'You are the creative strategy brain. Decode weak client briefs, choose Production Path before scenario, produce 3 routes, recommend one, write scene architecture and MAMILAS handoff. Reject generic agency ideas.',master:'You are the final brief architect. Build a strict path-aware Final Brief with Source Integrity, Render Lock, Path Lock, World, Reference DNA, Palette Physics, Tags, Scene Matrix, Image/Motion rules and Proof fail lines.',image:'You are the image director. Read Production Path before World. Copy Render Lock verbatim. Real path = photoreal/commercial/live-action frames. Animation path = tactile metaphor and motion-ready start frame. Output one block per [text#].',motion:'You are the Kling 3.0 motion director. Pure motion only. 15s/flexible duration aware. Real path = restrained filmic motion. Animation = material/world physics. Camera first 5 words. Finish main action before tail. Explicit stable final frame.',proof:'You are the strict QA gate. Return PASS/FIX/FAIL. Fail source loss, path contamination, skipped IDs, @tag replacement, weak render lock, text/logo morph risk, no stable final frame, generic AI-video smell.',suno:'You are the music director. Create narration-safe Suno v5.5 Custom Mode style direction by Production Path. Use modular style layers, no vocals unless requested, VO-safe mix.',client:'You are the client pitch wrapper. Convert the brief into sellable client-facing concept rationale, route summary, scene overview and approval text without exposing prompt mechanics.'};return base+'\n'+(map[id]||'Path-aware function fallbackCopy(txt){let t=document.createElement('textarea');t.value=txt;t.setAttribute('readonly','');t.style.position='fixed';t.style.left='-9999px';document.body.appendChild(t);t.select();try{document.execCommand('copy');toast('Copied')}catch(e){toast('Copy manually')}document.body.removeChild(t)}function copy(txt){try{if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(txt).then(()=>toast('Copied')).catch(()=>fallbackCopy(txt))}else fallbackCopy(txt)}catch(e){fallbackCopy(txt)}}function download(name,txt,type='text/plain'){try{let a=document.createElement('a');let url=URL.createObjectURL(new Blob([txt],{type}));a.href=url;a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},500);toast('Export ready')}catch(e){copy(txt)}}
function qaScore(txt){txt=(txt||'');let score=55,notes=[];let lower=txt.toLowerCase();if(lower.includes('production path')||lower.includes('render lock'))score+=8;else notes.push('No Production Path / Render Lock signal.');if(/35mm|50mm|85mm|100mm|macro|lens|dolly|rack focus|handheld|orbit|tracking/i.test(txt))score+=8;else notes.push('Lens/camera language weak.');if(/practical light|studio light|key light|fill|rim|shadow|window light/i.test(txt))score+=8;else notes.push('Lighting not concrete.');if(/surface|texture|skin|fabric|geometry|reflection|material|condensation|viscosity/i.test(txt))score+=8;else notes.push('Material/surface fidelity weak.');if(/final frame|stable|hold|settle|tail/i.test(txt))score+=6;else notes.push('No stable final frame / tail hold.');if(isRealPath(S.productionPath)&&/pixar|clay|diorama|cartoon|toy-world/i.test(txt)){score-=20;notes.push('Real path contamination: stylized/Pixar language detected.')}if(/dynamic|cinematic|beautiful|engaging|vibrant/g.test(lower)){score-=5;notes.push('Empty adjectives detected.')}score=Math.max(0,Math.min(100,score));return {score,notes}}
function repairText(){let t=S.repairType||'AI video gibi';let real=isRealPath(S.productionPath);let fixes={'AI video gibi':'Replace generic zoom/glow with physical cause-effect, motivated camera, material response, and explicit stable final frame.','plastik':'Add matte/real material texture, natural skin/product surface fidelity, remove glossy CGI sheen.','gerçek değil':'Add lens, practical/studio light, authentic location/surface, human/product physics.','reklam gibi değil':'Add brand role, desire, product geometry/surface, reflection, clean negative space.','çok safe':'Increase camera path and scale/composition; do not add random objects.','aynı olmuş':'Change archetype, lens, camera direction, transition and motion beat; preserve identity.','morphing oldu':'Reduce moving elements to one; freeze text/logo/product/face; add exact negatives.','yazı bozuldu':'Freeze text/logo; allow only camera/light/reflection movement.','drone gibi uçmuyor':'Use parallax travel, foreground pass, orbit, low tracking, or object POV; not digital zoom.','source kaybı':'Return to Scene Ingest, use raw vault, verify coverage 100%, then regenerate scene IDs.'};return `REPAIR PATCH — ${t}\nPath: ${active().path.name}\nFix: ${fixes[t]||fixes['AI video gibi']}\nMode: ${real?'real/commercial filmic repair':'animation/stylized tactile repair'}\nCopy into agent: Revise the current output using this repair while preserving scene IDs, source lock, @tags, identity, logo/text, approved still, and Production Path.`}
function qSceneScore(s){let score=40;if((s.function||'').length>4)score+=8;if((s.visual||'').length>25)score+=12;if((s.risk||'').length>12)score+=8;if((s.vo||'').length>20)score+=8;if((s.sourceHash||'').length)score+=12;if((s.clipPlan||'').includes('15s')||estimateSec(s.vo)<=13.5)score+=7;if((s.tags||s.logo||s.character||'').length>3)score+=5;return Math.min(100,score)}function quantumMetrics(){let integ=sourceIntegrity();let scenes=S.scenes.map(qSceneScore),avg=scenes.reduce((x,y)=>x+y,0)/Math.max(1,scenes.length);let path=90;if(conflict())path-=30;if(isRealPath(S.productionPath)&&isStylizedWorld(S.world))path-=40;let agent=95;let data=70+(S.client?5:0)+(S.objective?10:0)+(S.audience?5:0)+(S.brand?5:0);let brief=70+(S.scenes.length>=3?8:0)+(avg>80?8:0)+(S.rawVault?7:0);let source=integ.ok?100:Math.max(0,integ.coverage-20);let risk=isRealPath(S.productionPath)?(S.productionPath==='PRODUCT_HERO'&&!S.brand?72:90):88;return [['Path Fidelity',path],['Scene Intelligence',Math.round(avg)],['Source Integrity',source],['Client Data',Math.min(100,data)],['Brief Completeness',brief],['Agent Alignment',agent],['Production Risk Control',risk]]}function quantumScore(){let m=quantumMetrics();return Math.round(m.reduce((a,b)=>a+b[1],0)/m.length)}function quantumReportText(){let integ=sourceIntegrity();return `MAMILAS QUANTUM REPORT\nScore: ${quantumScore()}\nPath: ${active().path.name}\nProject: ${active().project.name}\nWorld: ${active().world.name}\nReference: ${active().ref.name}\nPalette: ${active().palette.name}\nSource Coverage: ${integ.coverage}%\nRaw Hash: ${integ.rawHash}\nScene Hash: ${integ.reconHash}\n\nMetrics:\n${quantumMetrics().map(x=>'- '+x[0]+': '+x[1]).join('\n')}\n\nNext Actions:\n${nextActions().map(x=>'- '+x).join('\n')}`}function nextActions(){let a=[];let integ=sourceIntegrity();if(!integ.ok)a.push('Fix source integrity: coverage must be 100%.');if(conflict())a.push('Resolve path/world conflict or enable hybrid intentionally.');if(!S.objective)a.push('Fill Objective for better brief.');if(!S.audience)a.push('Fill Audience for client-ready output.');if(S.scenes.some(s=>qSceneScore(s)<82))a.push('Run Shot Rhythm or Quantum Autofill for weak scenes.');if(S.productionPath==='PRODUCT_HERO'&&!S.brand)a.push('Enter product/brand name for Product Hero fidelity.');if(a.length===0)a.push('Export Final Brief and run Image/Motion agents.');return a}function quantumAutofill(){S.scenes=S.scenes.map((s,i)=>Object.assign(s,{function:s.function&&s.function!=='Build / Proof'?s.function:['Opening Hook','Rule Reveal','Proof Beat','Scale / Detail','Emotional Turn','Signature'][i]||'Production Beat',visual:s.visual&&s.visual.length>30?s.visual:(isRealPath(S.productionPath)?'A path-specific real-film visual event proving the idea through lens, light, surface, human/product/place behavior.':'A tactile world-explains event with one dominant lesson-object and one clear motion hook.'),risk:s.risk&&s.risk.length>15?s.risk:riskDefault(),estimatedSec:estimateSec(s.vo||s.source||''),clipPlan:planClip(estimateSec(s.vo||s.source||''))}));save();toast('Quantum Autofill applied');render()}

function goldenText(){
 let blocks = DATA.golden.map(g => [
  '['+g.id+'] '+g.name,
  'Agent: '+g.agent,
  'Path: '+g.path,
  'BAD: '+g.bad,
  'WHY BAD: '+g.why_bad,

 let regs = DATA.regression.map(r => [

  window.agentPacket=function(id){let a=active(),g=goldTarget();return `MAMILAS ${id.toUpperCase()} DIRECTOR\nProduction Path is supreme: ${a.path.name} / ${S.productionPath}.\nPreserve scene IDs, @tags, identity, logo, text, output order, and path lock.\nGolden Standard: ${g?g.name:'-'}.\nWhy Gold: ${g?g.why_gold:'-'}.\nGolden QA: ${g?(g.qa||[]).join(', '):'-'}.\nLinked References: ${g?(g.refs||[]).map(id=>(safeBy(DATA.refs,id)||{}).name||id).join(', '):'-'}.\nLinked Palettes: ${g?(g.palettes||[]).map(id=>(safeBy(DATA.palettes,id)||{}).name||id).join(', '):'-'}.\nReference → Best Paths: ${refPathRecs().join(', ')||'-'}.\nReference → Best Palettes: ${refPaletteRecs().join(', ')||'-'}.\n\nFINAL BRIEF CONTEXT\n${buildBrief()}`};
  Object.assign(window,{pageReference,pagePalette,pageGolden,pageQA,renderRight,buildBrief,agentPacket,qaScore,goldenText,applyRefBundle,applyGolden});
