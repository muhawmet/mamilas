<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MAMILAS</title><style>
:root{
--bg:#060709;--s1:#0b0c11;--s2:#0e1018;--s3:#13161f;
--line:#ffffff0f;--line2:#ffffff18;--line3:#ffffff28;
--text:#eeeaf8;--muted:#5e5c6e;--dim:#3a3845;
--gold:#f5c842;--gold2:#e8a820;--goldglow:#f5c84222;
--green:#4df5a0;--red:#f54d6b;--blue:#5b9fff;
--a:#f5c842;--b:#5b9fff;--c:#0a0c14;
--mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
--sans:-apple-system,'Inter',system-ui,sans-serif;
--r4:4px;--r8:8px;--r12:12px;--r16:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;font-size:13px;-webkit-font-smoothing:antialiased}

/* LAYOUT */
.app{display:grid;grid-template-columns:220px minmax(0,1fr) 300px;min-height:100vh}
.side{position:sticky;top:0;height:100vh;overflow:auto;background:var(--s1);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:0}
.right{position:sticky;top:0;height:100vh;overflow:auto;background:var(--s1);border-left:1px solid var(--line);padding:0}
.main{padding:36px 40px 100px;background:var(--bg)}
.main-inner{max-width:1100px}

/* SIDEBAR LOGO */
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--line)}
.logo-mark{display:flex;align-items:baseline;gap:0;line-height:1}
.logo-mark .m{font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--gold)}
.logo-mark .rest{font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--text);opacity:.85}
.logo-sub{font:10px/1 var(--mono);color:var(--muted);letter-spacing:.1em;margin-top:5px;text-transform:uppercase}

/* NAV */
.nav{flex:1;padding:10px 10px 0;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r8);cursor:pointer;border:0;background:transparent;color:var(--muted);text-align:left;width:100%;transition:background .12s,color .12s;position:relative}
.nav-item:hover{background:var(--s3);color:var(--text)}
.nav-item.on{background:linear-gradient(90deg,var(--goldglow),transparent);color:var(--text)}
.nav-item.on::before{content:'';position:absolute;left:0;top:20%;height:60%;width:2px;background:var(--gold);border-radius:0 2px 2px 0}
.nav-step{width:22px;height:22px;border-radius:var(--r4);background:var(--s3);border:1px solid var(--line2);display:grid;place-items:center;font:700 10px var(--mono);color:var(--muted);flex-shrink:0;transition:all .12s}
.nav-item.on .nav-step{background:var(--goldglow);border-color:var(--gold);color:var(--gold)}
.nav-item.done .nav-step{background:#4df5a015;border-color:#4df5a040;color:var(--green)}
.nav-label{flex:1;min-width:0}
.nav-label b{display:block;font-size:12px;font-weight:600;line-height:1.2}
.nav-label small{font-size:10px;color:var(--muted);display:block;margin-top:1px}
.nav-divider{height:1px;background:var(--line);margin:8px 10px}

/* SIDEBAR BOTTOM */
.side-bottom{padding:12px 10px 14px;border-top:1px solid var(--line)}
.readiness-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.readiness-label span{font:10px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.readiness-label strong{font:700 13px var(--mono);color:var(--text)}
.bar-track{height:3px;background:var(--s3);border-radius:99px;overflow:hidden;margin-bottom:8px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green));border-radius:99px;width:0;transition:width .3s}
.hint-text{font:11px var(--sans);color:var(--muted);margin-bottom:10px;min-height:16px}

/* STATUS CHIPS */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.status-chip{background:var(--s2);border:1px solid var(--line2);border-radius:var(--r8);padding:7px 9px;cursor:pointer;transition:border-color .12s}
.status-chip:hover{border-color:var(--line3)}
.status-chip-label{font:9px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px}
.status-chip-val{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.status-chip-val.empty{color:var(--dim)}

/* CTA BUTTONS IN SIDEBAR */
.side-actions{display:flex;flex-direction:column;gap:5px}
.btn-final{background:var(--gold);color:#1a1100;border:0;border-radius:var(--r8);padding:9px 14px;font:700 12px var(--sans);cursor:pointer;width:100%;letter-spacing:-.01em;transition:opacity .12s}
.btn-final:hover{opacity:.88}
.btn-reset{background:transparent;color:var(--muted);border:1px solid var(--line2);border-radius:var(--r8);padding:7px 14px;font:600 11px var(--sans);cursor:pointer;width:100%;transition:color .12s,border-color .12s}
.btn-reset:hover{color:var(--red);border-color:#f54d6b44}

/* RIGHT PANEL */
.rpanel-section{border-bottom:1px solid var(--line);padding:14px 16px}
.rpanel-section:last-child{border-bottom:0}
.rpanel-title{font:600 10px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.bigPreview{height:220px;position:relative;overflow:hidden;background:radial-gradient(circle at 73% 18%,var(--b),transparent 28%),linear-gradient(145deg,var(--a),var(--b) 50%,var(--c))}
.bigPreview:after{content:'';position:absolute;inset:0;background-image:radial-gradient(#fff6 1px,transparent 1px);background-size:18px 18px;opacity:.06;mix-blend-mode:screen;pointer-events:none}
.fx-deep{box-shadow:inset 0 0 100px #000c}
.fx-window:before{content:'';position:absolute;left:0;top:0;width:40%;height:100%;background:linear-gradient(108deg,#fff4,transparent 55%);mix-blend-mode:screen;pointer-events:none}
.fx-spot:before{content:'';position:absolute;left:-5%;top:-10%;width:70%;height:110%;background:radial-gradient(ellipse at 30% 30%,#f5c84266,transparent 45%);mix-blend-mode:screen;pointer-events:none}
.fx-cosmic:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 65%,#5b9fff33,transparent 15%),radial-gradient(#fff 1px,transparent 1px);background-size:auto,28px 28px;opacity:.4;pointer-events:none}
.previewLabel{position:absolute;bottom:10px;left:12px;z-index:5;font:700 11px var(--sans);color:rgba(255,255,255,.9);text-shadow:0 1px 8px #000}
.previewChip{position:absolute;top:10px;right:10px;z-index:5;font:700 9px var(--mono);background:#f5c842ee;color:#1a1100;border-radius:var(--r4);padding:3px 7px;letter-spacing:.04em;text-transform:uppercase}
.previewEngine{position:absolute;top:10px;left:10px;z-index:5;font:600 9px var(--mono);background:#00000088;color:rgba(255,255,255,.7);border-radius:var(--r4);padding:3px 7px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}

/* DETAIL ROWS */
.detail-row{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid var(--line)}
.detail-row:last-child{border-bottom:0}
.detail-row .dk{font:10px var(--mono);color:var(--muted);flex-shrink:0;padding-top:1px;text-transform:uppercase;letter-spacing:.06em}
.detail-row .dv{font-size:11px;font-weight:600;color:var(--text);text-align:right;line-height:1.4}
.detail-block{padding:8px 0;border-bottom:1px solid var(--line)}
.detail-block:last-child{border-bottom:0}
.detail-block-label{font:9px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.detail-block-val{font-size:11px;color:var(--text);line-height:1.45}

/* EVAL ITEMS */
.eval-item{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line)}
.eval-item:last-child{border-bottom:0}
.eval-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.eval-dot.ok{background:var(--green)}
.eval-dot.warn{background:var(--gold)}
.eval-dot.err{background:var(--red)}
.eval-item-inner .ev-title{font:600 11px var(--sans);color:var(--text);line-height:1.2}
.eval-item-inner .ev-sub{font-size:10px;color:var(--muted);margin-top:1px}

/* MAIN CONTENT */
.page-header{padding-bottom:24px;margin-bottom:28px;border-bottom:1px solid var(--line)}
.page-eyebrow{font:600 10px var(--mono);color:var(--gold);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px}
.page-title{font-size:32px;font-weight:800;letter-spacing:-1.2px;line-height:1.05;color:var(--text)}
.page-desc{font-size:13px;color:var(--muted);margin-top:8px;max-width:540px;line-height:1.6}

/* SECTION BOXES */
.box{border:1px solid var(--line2);background:var(--s1);border-radius:var(--r12);padding:16px;margin-bottom:12px}
.box h2{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;letter-spacing:-.02em}
.panel{margin-bottom:0}

/* CARDS */
.card{position:relative;border:1px solid var(--line2);background:var(--s1);border-radius:var(--r12);padding:14px;cursor:pointer;transition:border-color .14s,background .14s;min-height:100px;overflow:hidden}
.card:hover{border-color:var(--line3);background:var(--s2)}
.card.sel{border-color:var(--gold);background:linear-gradient(145deg,#f5c84210,var(--s1));animation:selPop .18s ease}
@keyframes selPop{0%{transform:scale(.96);opacity:.85}65%{transform:scale(1.025)}100%{transform:scale(1);opacity:1}}
.card.sel::after{content:'✓';position:absolute;right:10px;top:10px;background:var(--gold);color:#1a1100;border-radius:var(--r4);font:800 9px var(--mono);padding:2px 6px}
.card h3{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:4px;letter-spacing:-.01em}
.card p{font-size:11px;color:var(--muted);line-height:1.5}
.card em{font-style:normal;font-size:10px;color:var(--dim);display:block;margin-top:7px;font-family:var(--mono)}

/* SWATCHES */
.sw{display:flex;gap:3px;margin:7px 0}
.sw i{height:6px;flex:1;border-radius:2px}

/* BUTTONS */
.btn{border:1px solid var(--line2);background:var(--s2);color:var(--text);border-radius:var(--r8);padding:7px 12px;font:600 12px var(--sans);cursor:pointer;transition:border-color .12s,color .12s}
.btn:hover{border-color:var(--line3);color:var(--text)}
.btn.primary{background:var(--gold);color:#1a1100;border-color:transparent;font-weight:700}
.btn.primary:hover{opacity:.88}
.btn.danger{color:var(--red);border-color:transparent;background:transparent}
.btn.danger:hover{border-color:#f54d6b33;background:#f54d6b0a}
.btn.sm{padding:5px 9px;font-size:11px}
.btn:active{transform:scale(.96)!important;transition:transform .06s}
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* PILLS / TABS */
.pill,.tab{display:inline-flex;border:1px solid var(--line2);background:transparent;color:var(--muted);border-radius:var(--r4);padding:5px 10px;font:600 11px var(--sans);cursor:pointer;margin:0 4px 5px 0;transition:all .1s}
.pill.sel,.tab.sel{border-color:var(--gold);color:var(--gold);background:var(--goldglow)}
.pill:hover,.tab:hover{border-color:var(--line3);color:var(--text)}
.tabs{margin:10px 0;display:flex;flex-wrap:wrap;gap:0}

/* INPUTS */
input,textarea{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--text);border-radius:var(--r8);padding:10px 12px;outline:0;resize:vertical;font:13px/1.55 var(--sans)}
textarea:focus,input:focus{border-color:var(--gold)}

/* ADVISOR / STATUS BARS */
.advisor,.ok,.warn{border-radius:var(--r8);padding:9px 12px;margin:8px 0;font-size:11px;line-height:1.5}
.advisor,.ok{border:1px solid #4df5a028;background:#4df5a008;color:#a0f5cc}
.warn{border:1px solid #f5c84230;background:#f5c84208;color:#f5d980}

/* MINI PREVIEW */
.miniPrev{height:72px;border-radius:var(--r8);margin-bottom:10px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--a),var(--b) 50%,var(--c))}
.miniPrev .mp-glow,.miniPrev .mp-light{position:absolute;pointer-events:none}
/* SOFT 3D - warm key + bounce */
.mp-soft3d .mp-glow{inset:0;background:radial-gradient(circle at 70% 35%,#fff9 0,transparent 32%);mix-blend-mode:screen}
.mp-soft3d .mp-light{left:0;top:0;width:55%;height:100%;background:linear-gradient(115deg,#fff3,transparent 65%);mix-blend-mode:screen}
/* BAROQUE - single hot spot in deep dark */
.mp-baroque{background:linear-gradient(135deg,#0b0704,#1a0d05 55%,#2a1608)}
.mp-baroque .mp-glow{left:20%;top:-30%;width:55%;height:160%;background:radial-gradient(ellipse at 50% 50%,#f5c842dd 0,#c18a4288 22%,transparent 55%);mix-blend-mode:screen}
/* HISTORICAL - sepia haze + ground */
.mp-historical{background:linear-gradient(135deg,#3b2617,#5c3d20 50%,#c79a56)}
.mp-historical .mp-glow{inset:0;background:radial-gradient(circle at 60% 35%,#ece0c866 0,transparent 50%);mix-blend-mode:screen}
.mp-historical .mp-light{inset:0;background:linear-gradient(180deg,transparent 55%,#000a)}
/* ANIME - saturated sky + rim flare */
.mp-anime{background:linear-gradient(180deg,#6cb6ff 0%,#ff8fab 65%,#2d3561)}
.mp-anime .mp-glow{right:-5%;top:0;width:55%;height:100%;background:radial-gradient(ellipse at 75% 50%,#fff8 0,transparent 45%);mix-blend-mode:screen}
.mp-anime .mp-light{left:35%;top:10%;width:1px;height:80%;background:#fff;box-shadow:0 0 8px #fff,0 0 18px var(--a);opacity:.85}
/* GHIBLI - sky + meadow */
.mp-ghibli{background:linear-gradient(180deg,#8ec8ff 0%,#d8f0a0 60%,#9bd982)}
.mp-ghibli .mp-glow{inset:0;background:radial-gradient(circle at 50% 25%,#fffd 0,transparent 22%);mix-blend-mode:screen;opacity:.7}
/* CINEMA REAL - desaturated practical */
.mp-cinema{background:linear-gradient(135deg,#151820,#3a3f4a 50%,#66717a)}
.mp-cinema .mp-light{left:0;top:0;width:45%;height:100%;background:linear-gradient(110deg,#fff2,transparent 60%);mix-blend-mode:screen}
/* LUXURY - black gold elegance */
.mp-luxury{background:linear-gradient(135deg,#050505,#1a1308 55%,#3a2810)}
.mp-luxury .mp-glow{right:-15%;top:-30%;width:65%;height:160%;background:radial-gradient(ellipse at 30% 50%,#ffd27cbb 0,transparent 50%);mix-blend-mode:screen}
.mp-luxury .mp-light{left:0;top:50%;width:100%;height:1px;background:linear-gradient(90deg,transparent,#ffd27c66 50%,transparent)}
/* NEON NOIR - magenta/cyan haze + scanlines */
.mp-neon{background:linear-gradient(135deg,#0a0a18,#1a1430 50%,#2d1545)}
.mp-neon .mp-glow{inset:0;background:radial-gradient(circle at 22% 75%,#ff2d9577,transparent 38%),radial-gradient(circle at 78% 25%,#00d4ff66,transparent 38%);mix-blend-mode:screen}
.mp-neon .mp-light{inset:0;background:repeating-linear-gradient(90deg,transparent 0 13px,#fff1 13px 14px);opacity:.4}
/* COSMIC - starfield */
.mp-cosmic{background:radial-gradient(ellipse at 50% 90%,#2c65a8 0,#060914 70%)}
.mp-cosmic .mp-glow{inset:0;background:radial-gradient(circle at 50% 60%,#d9f1ff55,transparent 18%);mix-blend-mode:screen}
.mp-cosmic .mp-light{inset:0;background-image:radial-gradient(#fff 0.5px,transparent 1px);background-size:11px 9px;opacity:.75}
/* FANTASY - mythic golden mist */
.mp-fantasy{background:linear-gradient(180deg,#1a0f04,#3d2510 50%,#5a3a18)}
.mp-fantasy .mp-glow{left:30%;top:-30%;width:40%;height:160%;background:radial-gradient(ellipse,#ffd27c88 0,transparent 55%);mix-blend-mode:screen}
.mp-fantasy .mp-light{inset:0;background:linear-gradient(180deg,transparent 45%,#0009)}
/* ARCHITECTURE - clean window light */
.mp-arch{background:linear-gradient(135deg,#0e1118,#2a2f3a 60%,#3a3f4a)}
.mp-arch .mp-glow{left:55%;top:0;width:32%;height:100%;background:linear-gradient(180deg,#d7dce2cc,#d7dce266 55%,transparent);mix-blend-mode:screen}
.mp-arch .mp-light{left:0;bottom:0;width:100%;height:1px;background:#d7dce244}
/* EXPLAINER - clean diagram bg */
.mp-explainer{background:linear-gradient(135deg,#0f1830,#1a2540 60%,#2c3e60)}
.mp-explainer .mp-glow{left:30%;top:30%;width:40%;height:40%;background:radial-gradient(circle,#f9731677 0,transparent 55%);mix-blend-mode:screen}
.mp-explainer .mp-light{right:20%;top:20%;width:30%;height:60%;background:radial-gradient(circle,#60a5fa66 0,transparent 60%);mix-blend-mode:screen}
/* COMMERCIAL - premium gold studio */
.mp-commercial{background:linear-gradient(135deg,#1a1408,#2a200d 50%,#3a2810)}
.mp-commercial .mp-glow{left:50%;top:0;width:50%;height:100%;background:radial-gradient(ellipse at 60% 50%,#fff4d6cc 0,#ffd27c66 30%,transparent 60%);mix-blend-mode:screen}
.mp-commercial .mp-light{left:0;bottom:20%;width:100%;height:1px;background:#fff4d633}
/* NATURAL DOCUMENTARY - overcast */
.mp-natural{background:linear-gradient(180deg,#9ba89a 0%,#6f766f 55%,#3a3f3a)}
.mp-natural .mp-glow{inset:0;background:radial-gradient(circle at 50% 20%,#d6c7a366 0,transparent 45%);mix-blend-mode:screen}

/* TAGS */
.badgeTag,.tag{font:10px var(--mono);display:inline-flex;border:1px solid var(--line);border-radius:var(--r4);color:var(--muted);padding:2px 6px;margin:4px 3px 0 0}
.tag.red{color:var(--red);border-color:#f54d6b44}
.tag.gold{color:var(--gold);border-color:#f5c84244}
.tag.green{color:var(--green);border-color:#4df5a044}

/* SCENE WORKSPACE */
.sceneWS{display:grid;grid-template-columns:minmax(360px,1fr) minmax(480px,1fr);gap:12px}
.sceneList{display:flex;flex-direction:column;gap:8px;max-height:680px;overflow:auto}
.sceneItem{border:1px solid var(--line2);background:var(--bg);border-radius:var(--r12);padding:12px;transition:border-color .12s}
.sceneItem:hover{border-color:var(--line3)}
.sceneHead{display:flex;justify-content:space-between;gap:8px;margin-bottom:7px}
.sid{font:600 10px var(--mono);color:var(--gold);letter-spacing:.04em}
.sceneActions{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.sceneActions button{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:var(--r4);padding:4px 8px;font:600 10px var(--sans);cursor:pointer;transition:all .1s}
.sceneActions button:hover{border-color:var(--line3);color:var(--text)}

/* BRIEF / FINAL */
.final{min-height:560px;font-family:var(--mono);font-size:11.5px;line-height:1.68;background:var(--bg)}
.sysout{min-height:220px;font-family:var(--mono);font-size:11px;background:var(--bg)}

/* TIP CARDS */
.tip{border:1px solid var(--line);border-radius:var(--r8);background:var(--bg);padding:9px 11px;margin-bottom:7px}
.tip b{display:block;color:var(--text);font-size:11px;font-weight:700;margin-bottom:2px}
.tip p{color:var(--muted);font-size:11px;line-height:1.5}

/* SETUP ROW */
.setupRow{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid var(--line);font-size:11px}
.setupRow:last-child{border-bottom:0}
.setupRow span:first-child{color:var(--muted);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;padding-top:1px}
.setupRow span:last-child{font-weight:700;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}

/* TOAST */
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:9999;background:var(--s3);border:1px solid var(--line3);border-radius:var(--r8);padding:8px 16px;font:600 12px var(--sans);color:var(--text);box-shadow:0 8px 32px #000a}

/* SVG KIDS */


/* RESPONSIVE */
@media(max-width:1280px){.app{grid-template-columns:200px 1fr}.right{display:none}.g4{grid-template-columns:repeat(3,1fr)}.sceneWS{grid-template-columns:1fr}}



/* === PROJECT CARD === */
.project-card{padding:16px;min-height:160px}
.project-card .proj-tag{font:600 9px var(--mono);color:var(--gold);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;background:var(--goldglow);display:inline-block;padding:3px 7px;border-radius:var(--r4)}
.project-card h3{font-size:14px;margin-bottom:6px;color:var(--text)}
.project-card p{font-size:11.5px;line-height:1.55;margin-bottom:10px}
.project-card .sw{margin:8px 0 10px}
.project-card .sw i{height:7px;border-radius:2px}
.proj-meta{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.proj-engine{font:600 9px var(--mono);color:var(--muted);background:var(--bg);border:1px solid var(--line2);border-radius:var(--r4);padding:3px 7px;letter-spacing:.04em}
.project-card.sel .proj-tag{background:var(--gold);color:#1a1100}

/* === PALETTE CARD === */
.pal-card{padding:14px;min-height:150px}
.pal-card .pal-swatch{display:flex;gap:0;border-radius:var(--r8);overflow:hidden;height:36px;margin-bottom:10px;border:1px solid var(--line2)}
.pal-card .pal-swatch i{flex:1;display:block}
.pal-card h3{font-size:13px;margin-bottom:5px;color:var(--text)}

function buildSystemPrompt(profileId,kind){

  return header+'\n\n'+profileLine+'\n\nROLE\nYou are MAMILAS, a cinematic AI production brain for Mami (Muhammet, Art Director).\nSpeak Turkish to Mami. Write image prompts, motion prompts, and Suno prompts in English unless explicitly asked otherwise.\nMami\'s voice-over text always comes from a Turkish private school production. Treat it as locked source - do not rewrite or paraphrase it inside prompts.'+gptNote+'\n\nPIPELINE LOCK\nPhase order: IMAGE PHASE first, then MOTION PHASE.\nDo not write motion prompts until Mami says "IMAGE ONAY" or explicitly asks for Motion Phase.\nPreserve every [text#NNN] label exactly. Do not skip, merge, renumber, or invent scenes.\n\nSCENE NUMBERING\nEach scene is keyed by [text#NNN]. The number maps directly to Mami\'s image generator slot (Freepik / Nano Banana / Flux). One scene = one text number = one image = one motion clip.\n\nDURATION DISCIPLINE\nEach scene includes:\n  VO DURATION  - estimated voice-over length in seconds.\n  CLIP TARGET  - final video clip length in seconds.\n  TAIL         - silent buffer (CLIP minus VO).\n\nHard rules:\n  1. Voice-over is always equal to or shorter than the video clip. The clip can never end before the voice-over ends.\n  2. Engine usable limits (safe zone before morph artifacts):\n       Kling   - 8.5s safe / 10s hard max\n       Runway  - 14.5s safe / 16s hard max\n       Luma    - 8.0s safe / 9s hard max\n     The last 1-1.5 seconds of any clip is morph-prone. Plan motion to complete inside the safe zone.\n  3. TAIL is silent space. Do not start new action in tail. Use it for hold, slow drift, atmospheric settle, breath, or stabilization. Motion must finish before VO ends.\n  4. If a scene\'s VO exceeds engine usable, flag it in PRODUCTION NOTE. Mami will manually split it.\n\nREFERENCE BRAIN\nReference is production grammar, never a copy target. Use camera, lighting, material, and motion grammar from the locked reference. Do not copy IP, exact compositions, named characters, or trademarked styling.\n\n'+p.masterAddon+'\n\nTÜRKİYE CONTEXT LOCK\nEnglish prompts, Turkish visual world. Avoid foreign defaults, unintended English on-screen text, ethnic drift, generic Western look, random cultural props. Prefer Turkish / Mediterranean / Anatolian visual logic.\n\nIMAGE PHASE RULES\nFor each [text#NNN], write one image prompt.\n  - Start frame, not finished action. The frame must feel alive, dimensional, ready for motion.\n  - One scene = one idea = one focal path.\n  - Show, don\'t tell. No clutter, no random UI, no flat cardboard, no plastic skin, no generic AI look, no style clash.\n\nSHOT DIRECTOR\nPick camera by scene meaning:\n  wide       - scale and world reveal\n  medium     - interaction, dialogue\n  close-up   - emotion\n  macro      - small detail, focus pull\n  overhead   - systems, maps, patterns\n  low angle  - power, dignity\n  push-in    - discovery, slow realization\n  dolly zoom - shock, perspective break\n  rack focus - attention shift\n  orbit      - transformation\n  static     - history, prestige, dignity\n\nMOTION PHASE RULES (only after IMAGE ONAY)\nRespect each scene\'s CLIP TARGET and TAIL exactly.\nTwo dominant motion elements maximum. Stable identity. Engine-aware.\nOn-screen text only when short, large, clean, readable, intentional. Avoid long sentences, small typography, dense UI text, complex text deformation.\n\nENGINE BEHAVIOR\n  Flux         - photorealism, PBR materials, realistic lens, natural imperfection, cinematic light, skin/material realism.\n  Nano Banana  - premium 3D feature animation quality, clean staging, vibrant controlled palette, readable composition, expressive but stable child characters.\n  Kling motion - controlled start-frame motion, approach -> pause -> break/change -> reaction -> stabilize. Two dominant moving elements max.\n  Runway motion- concise subject-action-camera-lighting language, stable background unless intended, moderate motion intensity.\n  Luma motion  - spatial continuity, cinematic camera path, atmosphere, environment persistence, graceful movement, stable scene identity.\n\nOUTPUT FORMAT\nFor each scene Mami sends:\n[text#NNN]\nVO DURATION / CLIP TARGET / TAIL - echo exactly from the brief\nIMAGE PROMPT:\n<English image prompt, start frame ready for motion, alive but not finished>\n\nPRODUCTION NOTE:\n<short Turkish note: shot type, light intent, duration concern if any, context lock if any>\n\nDo not output motion prompts during IMAGE PHASE. Do not explain the system to Mami. Preserve all [text#NNN] labels exactly.\n\nSUNO / MUSIC (when useful)\nProvide narration-friendly instrumental Suno prompts: genre, instrumentation, BPM, mood, energy curve, arrangement, cinematic texture, mixing note, avoid list, negative prompt. No vocals unless explicitly requested.\n\nINTERACTION STYLE WITH MAMI\nConcise, direct, non-emotive. No emojis, no filler, no padding. Maximum two sentences before action. Push back on weak ideas. Maintain high standards.';
}

  let clean=String(text||'').replace(/^\s*(?:ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI)\s*:/i,'').replace(/\[\s*(?:SAHNE|SCENE|TEXT|text)\s*#?\s*\d+\s*\][:.\-]?/gi,'').trim();
  let words=clean.split(/\s+/).filter(Boolean).length;
  if(!words)return 0;
  let wpm=getWPM();
  return +((words/wpm)*60).toFixed(1);
}
function clipTarget(voSecs){
  if(voSecs<=0)return 0;
  let lim=getEngineLimits();
  let withBuffer=voSecs+0.5; // breath/transition
  let target=Math.ceil(withBuffer);
  if(target<5)target=5; // engines minimum ~5s
  if(target>lim.max)target=lim.max;
  return target;
}
function durationWarning(voSecs){
  if(voSecs<=0)return ['-','dim'];
  let lim=getEngineLimits();
  if(voSecs>lim.usable)return ['BÖLEMEZSİN','red'];
  if(voSecs>lim.usable*0.85)return ['BÖL ÖNER','gold'];
  if(voSecs<2)return ['ÇOK KISA','gold'];
  return ['OK','green'];
}


function sentenceSplit(text){
  // Returns array of sentences with .!? as boundaries, preserving punctuation
  let clean=String(text||'').replace(/\s+/g,' ').trim();
  if(!clean)return[];
  // Split on .!? but keep them with the previous sentence; handle ... and !?
  let raw=clean.match(/[^.!?]+[.!?]+(?=\s|$)|[^.!?]+$/g)||[clean];
  return raw.map(s=>s.trim()).filter(Boolean);
}
function commaSplit(sentence){
  // Last-resort split on , or ; for sentences too long even on their own
  let parts=sentence.split(/[,;]\s+/).map(p=>p.trim()).filter(Boolean);
  return parts.length>1?parts:[sentence];
}
function autoSplitText(raw){
  // Stable scene editor brain: repair imported text first, keep speaker blocks intact,

  let text=repairImportedText(raw);

  let lim=getEngineLimits();
  let usable=lim.usable||8.5;
  let markerRe=/^\s*(\[?\s*(?:SAHNE|SCENE|TEXT|text)\s*#?\s*\d{1,5}\s*\]?[:.\-]?)/i;
  let speakerRe=/^\s*((?:ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI)\s*:\s*)/i;
  let rawBlocks=text.split(/\n\s*\n+/).map(b=>b.trim()).filter(Boolean);
  let normalizedBlocks=[];
  rawBlocks.forEach(block=>{
    // If ARAS/DEFNE appears in the middle because of pasted script, split before the speaker but do not split words.
    let parts=block.replace(/\s+(?=(?:ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI)\s*:)/gi,'\n§§SPEAKER§§').split(/\n§§SPEAKER§§/).map(x=>x.trim()).filter(Boolean);
    normalizedBlocks.push(...parts);
  });
  let all=[];
  normalizedBlocks.forEach(block=>{
    let marker='';
    let mm=block.match(markerRe);
    if(mm){marker=mm[1].trim();block=block.slice(mm[0].length).trim();}
    let sm=block.match(speakerRe);
    let speaker=sm?sm[1].trim():'';
    let body=sm?block.slice(sm[0].length).trim():block;
    let sentences=sentenceSplit(body);
    if(!sentences.length && body)sentences=[body];
    let prefix=[marker,speaker].filter(Boolean).join(' ').trim();
    let pushScene=(txt)=>{txt=repairImportedText(txt);if(!txt)return;all.push(prefix?prefix+' '+txt:txt)};
    let buf='',bufVO=0;
    sentences.forEach(sent=>{
      sent=repairImportedText(sent);
      let sentVO=estimateVO(sent);
      if(sentVO>usable){
        if(buf){pushScene(buf);buf='';bufVO=0;}
        let parts=commaSplit(sent);
        if(parts.length===1){pushScene(sent);return;}
        let pbuf='',pvo=0;
        parts.forEach(p=>{
          p=repairImportedText(p);let pv=estimateVO(p);
          if(pvo+pv>usable && pbuf){pushScene(pbuf);pbuf=p;pvo=pv;}
          else{pbuf=pbuf?pbuf+', '+p:p;pvo+=pv;}
        });
        if(pbuf)pushScene(pbuf);
        return;
      }
      if(bufVO+sentVO>usable && buf){pushScene(buf);buf=sent;bufVO=sentVO;}
      else{buf=buf?buf+' '+sent:sent;bufVO+=sentVO;}
    });
    if(buf)pushScene(buf);
  });

}

function repairImportedText(t){

function stripSceneMarker(t){return String(t||'').replace(/^\s*\[?\s*(?:SAHNE|SCENE|TEXT|text)\s*#?\s*\d{1,5}\s*\]?[:.\-]?\s*/i,'').trim()}

    let speaker=/^(?:ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI)\s*:/i.test(s);

function splitSceneSuggestedParts(txt){let clean=cleanSceneText(txt);let parts=autoSplitText(clean).map(x=>cleanSceneText(x)).filter(x=>x.length>8);if(parts.length>1)return parts;let cuts=[...clean.matchAll(/[.!?…]\s+/g)].map(m=>m.index+m[0].length);if(cuts.length){let mid=clean.length/2,cut=cuts.sort((a,b)=>Math.abs(a-mid)-Math.abs(b-mid))[0];return [clean.slice(0,cut).trim(),clean.slice(cut).trim()].filter(Boolean)}let mid=Math.floor(clean.length/2);let space=clean.indexOf(' ',mid);if(space<0)space=clean.lastIndexOf(' ',mid);if(space>20)return [clean.slice(0,space).trim(),clean.slice(space).trim()].filter(Boolean);return [clean]}

tarea data-scene="${i}" style="min-height:96px;margin-top:8px">${safe(b.rawText)}</textarea><div class="sceneActions"><button onclick="copyScenePlain(${i})">⧉ Kopyala</button><button onclick="moveScene(${i},-1)">↑ Yukarı</button><button onclick="moveScene(${i},1)">↓ Aşağı</button><button onclick="mergePrev(${i})">⇈ Birleş</button><button onclick="splitAtCursor(${i})">⎘ İmleçten böl</button><button onclick="splitSuggested(${i})">⚡ Böl Öner</button><button onclick="duplicateScene(${i})">⧉ Duplicate</button><button onclick="deleteScene(${i})">✕ Sil</button></div></div>`}function saveRawScenes(){let raw=$('rawScenes').value.trim();if(production.autoSplit!==false&&raw){let split=postProcessScenes(autoSplitText(raw));production.scenes=split.join('\n\n');production.finalConfirmed=false;save();render();toast('Auto-split: '+split.length+' sahne')}else{production.scenes=raw;production.finalConfirmed=false;save();render();toast('Scenes parsed')}}function draftScenes(){let a=splitScenes(production.scenes);let nodes=document.querySelectorAll('[data-scene]');if(nodes.length!==a.length){toast('⚠ Editor/raw desync - raw kullanıldı');return postProcessScenes(a.filter(Boolean))}nodes.forEach(n=>a[+n.dataset.scene]=cleanSceneText(n.value.trim()));return postProcessScenes(a.filter(Boolean))}function setScenes(a){a=postProcessScenes(a);production.scenes=a.join('\n\n');production.finalConfirmed=false;save();render()}function applySceneEditor(){setScenes(draftScenes());toast('Scene editleri uygulandı')}function addScene(){let a=draftScenes();a.push('Yeni sahne metni...');setScenes(a)}function moveScene(i,d){let a=draftScenes(),j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];setScenes(a)}function mergePrev(i){let a=draftScenes();if(i<=0)return;a[i-1]=(a[i-1]+'\n'+a[i]).trim();a.splice(i,1);setScenes(a)}function splitAtCursor(i){let n=document.querySelector(`[data-scene="${i}"]`);if(!n)return;let nodes=[...document.querySelectorAll('[data-scene]')];let a=nodes.map(x=>cleanSceneText(x.value.trim())).filter(Boolean);let p=n.selectionStart;if(!p||p<=0||p>=n.value.length){toast('İmleci bölünecek yere koy');return}let x=cleanSceneText(n.value.slice(0,p).trim()),y=cleanSceneText(n.value.slice(p).trim());if(!x||!y){toast('İmleci metnin ortasına koy');return}a.splice(i,1,x,y);setScenes(a);toast('İmleçten bölündü')}function duplicateScene(i){let a=draftScenes();a.splice(i+1,0,a[i]);setScenes(a)}function deleteScene(i){let a=draftScenes();a.splice(i,1);setScenes(a)}
function resolve(){let proj=findProject(),pal=findPalette(),ref=findRef();return{project:proj?.name||'General cinematic education video',world:production.world||proj?.world||'Premium Pixar Education',imageEngine:production.imageEngine||proj?.imageEngine||'Nano Banana',motionEngine:production.motionEngine||proj?.motionEngine||'Kling',palette:pal?.name||proj?.recommendedPalettes?.[0]||'Vibrant Clean Education',paletteBehavior:pal?.behavior||'project-appropriate clean cinematic color separation',lightBias:pal?.lightBias||'scene-appropriate cinematic light',shadowBias:pal?.shadowBias||'clean readable shadow behavior',paletteAvoid:pal?.avoid||'muddy color and clutter',reference:ref?.name||'Infer from selected palette, project type, and scene context',referenceLook:ref?.look||'No single reference locked; infer visual grammar from production setup.',refBrain:production.referenceBrain||null,characterMode:production.characterMode||proj?.characterMode||'Aras + Defne Locked, scene-adaptive visibility',costumeLogic:production.costumeLogic||proj?.costumeLogic||'scene-context adaptive costume logic',tone:production.tone||proj?.tone||'warm, clear, cinematic, production-quality',scenes:sceneBlocks().map(b=>{let durLine=b.voSecs>0?`VO DURATION: ~${b.voSecs}s · CLIP TARGET: ${b.clipSecs}s · TAIL: ${b.tailSecs}s`:'';return `[text#${b.id}]${durLine?'\n'+durLine:''}\n${sceneDirectiveLine(b)}\n${b.rawText}`}).join('\n\n')||'Scene text will be provided separately by Mami.'}}function engineRules(img,mot){let imgRule=img==='Flux'?'For Flux image prompts: prioritize photorealism, PBR materials, realistic lens behavior, natural imperfections, cinematic light, skin/material realism.':img==='Nano Banana'?'For Nano Banana image prompts: prioritize premium 3D animated feature quality, clean staging, vibrant controlled palette, readable composition, expressive but stable child characters, material clarity, and cinematic depth.':'For selected image engine: prioritize clarity, composition, light, material, scene readability.';let motRule=mot==='Kling'?'For Kling motion prompts after IMAGE ONAY: use start-frame based controlled motion, approach → pause → break/change → reaction → stabilize, max two dominant moving elements, and clear environmental reaction.':mot==='Runway'?'For Runway motion prompts after IMAGE ONAY: use concise subject-action-camera-lighting language, stable background unless intended, moderate motion intensity, no over-complex transformations.':mot==='Luma'?'For Luma motion prompts after IMAGE ONAY: prioritize spatial continuity, cinematic camera path, atmosphere, environment persistence, graceful movement, and stable scene identity.':'For selected motion engine: use controlled, engine-aware motion and preserve scene identity.';return imgRule+'\n'+motRule}function cleanBriefText(t){return String(t||'').replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').trim()}

  if(prof==='commercial')return{root:'skin-commercial',label:'premium hero',anime:false};

/* Reference name -> world key mapping */
function getWorldKey(ref){
  if(!ref) return null;
  let n = (ref.name||'').toLowerCase();
  if(n.includes('bleach')) return 'bleach';
  if(n.includes('one piece')) return 'one-piece';
  if(n.includes('naruto')) return 'naruto';
  if(n.includes('hunter x hunter')||n.includes('hxh')) return 'hxh';
  if(n.includes('demon slayer')) return 'demon-slayer';
  if(n.includes('jujutsu')) return 'jjk';
  if(n.includes('my hero')) return 'my-hero';
  if(n.includes('dragon ball')) return 'dragon-ball';
  if(n.includes('haikyuu')) return 'haikyuu';
  if(n.includes('spirited away')) return 'spirited-away';
  if(n.includes('totoro')) return 'totoro';
  if(n.includes('mononoke')) return 'mononoke';
  if(n.includes('howl')) return 'howl';
  if(n.includes('ponyo')) return 'ponyo';
  if(n.includes('wind rises')) return 'wind-rises';
  if(n.includes('inside out')) return 'inside-out';
  if(n.includes('coco')) return 'coco';
  if(n.includes('soul')) return 'soul';
  if(n==='up'||n.startsWith('up ')) return 'up';
  if(n.includes('wall-e')||n.includes('walle')) return 'wall-e';
  if(n.includes('encanto')) return 'encanto';
  if(n.includes('kurzgesagt')) return 'kurzgesagt';
  if(n.includes('ted ed')||n.includes('ted-ed')) return 'ted-ed';
  if(n.includes('3blue1brown')||n.includes('3 blue')) return '3blue1brown';

  function screenTextControls(b){let m=sceneMeta(b.id);let id=String(b.id).replace(/'/g,'&#039;');return `<div class="screenTextBox"><div class="sceneQuickGroup"><span class="sceneQuickLabel">Video içi yazı</span><button class="sceneChipBtn ${m.screenStyle==='title'?'on':''}" onclick="setSceneMeta('${id}','screenStyle','title')">Title</button><button class="sceneChipBtn ${m.screenStyle==='label'?'on':''}" onclick="setSceneMeta('${id}','screenStyle','label')">Label</button><button class="sceneChipBtn ${m.screenStyle==='subtitle'?'on':''}" onclick="setSceneMeta('${id}','screenStyle','subtitle')">Subtitle</button><button class="sceneChipBtn ${m.screenPosition==='top'?'on':''}" onclick="setSceneMeta('${id}','screenPosition','top')">Top</button><button class="sceneChipBtn ${m.screenPosition==='center'?'on':''}" onclick="setSceneMeta('${id}','screenPosition','center')">Center</button><button class="sceneChipBtn ${m.screenPosition==='bottom'?'on':''}" onclick="setSceneMeta('${id}','screenPosition','bottom')">Bottom</button><button class="sceneChipBtn danger ${!m.screenText?'on':''}" onclick="clearSceneScreenText('${id}')">Yok</button></div><input class="screenTextInput" value="${esc(m.screenText||'')}" placeholder="Bu sahnede videoya yazılacak kısa metin..." oninput="setSceneTextMeta('${id}','screenText',this.value)" onchange="setSceneTextMeta('${id}','screenText',this.value)"></div>`}

  window.sceneItem=function(b,i){let lim=getEngineLimits();let eng=production.motionEngine||'Kling';let durLabel=b.voSecs>0?`VO ~${b.voSecs}s · CLIP ${b.clipSecs}s · TAIL ${b.tailSecs}s`:`${b.charCount} krk`;let meta=sceneMeta(b.id);let charVal=meta.character||'auto',metVal=meta.metaphor||'auto';let directive=sceneDirectiveLine(b);let itemClass=b.warning[1]==='red'?'sceneItem mustSplit':b.warning[1]==='gold'?'sceneItem needsSplit':'sceneItem';let warnTag=b.warning[0]!=='OK'&&b.warning[0]!=='-'?`<span class="tag ${b.warning[1]} warnJump" onclick="splitSuggested(${i})" title="Bu sahneyi önerilen yerden böl">${b.warning[0]} · Böl Öner</span>`:`<span class="tag ${b.warning[1]}">${b.warning[0]}</span>`;return `<div class="${itemClass}"><div class="sceneHead"><span class="sid">[text#${b.id}]</span><span><span class="tag">${b.speaker}</span><span class="tag gold">${charDirectiveLabel(inferCharacterDirective(b))}</span><span class="tag">${metaphorDirectiveLabel(metVal)}</span>${meta.screenText?'<span class="tag green">TEXT</span>':''}${warnTag}<span class="tag" title="${eng} max ${lim.max}s · usable ${lim.usable}s">${durLabel}</span></span></div><div>${b.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><div class="sceneDirector"><label>Character Strategy${sceneMetaSelectHTML(b.id,'character',SCENE_CHARACTER_OPTIONS,charVal)}</label><label>Visual Metaphor${sceneMetaSelectHTML(b.id,'metaphor',SCENE_METAPHOR_OPTIONS,metVal)}</label></div>${sceneQuickControls(b,charVal,metVal)}${screenTextControls(b)}<div class="sceneDirective">${esc(directive)}</div><textarea data-scene="${i}" style="min-height:96px;margin-top:8px">${esc(b.rawText)}</textarea><div class="sceneActions"><button onclick="copyScenePlain(${i})">⧉ Kopyala</button><button onclick="moveScene(${i},-1)">↑ Yukarı</button><button onclick="moveScene(${i},1)">↓ Aşağı</button><button onclick="mergePrev(${i})">⇈ Birleş</button><button onclick="splitAtCursor(${i})">⎘ İmleçten böl</button><button onclick="splitSugges <script id="mamilas-v339-world-preview-and-brief-bridge">
(function(){
  const E=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  function pal(){try{let p=findPalette&&findPalette();if(p&&p.colors)return{name:p.name,c0:p.colors[0],c1:p.colors[1],c2:p.colors[2]}}catch(e){}return{name:'Palette',c0:'#f5c842',c1:'#5b9fff',c2:'#060709'}}
  function key(ref){
    let n=String(ref?.name||'').toLowerCase();
    const map=[
      ['finding nemo','finding-nemo'],['nemo','finding-nemo'],['cars','cars'],['incredibles','incredibles'],['zootopia','zootopia'],['kung fu panda','kung-fu-panda'],
      ['moana','moana'],['frozen','frozen'],['tangled','tangled'],['brave','brave'],['toy story','toy-story'],['spider','spider-verse'],
      ['how to train','httyd'],['big hero','big-hero-6'],['shrek','shrek'],['turning red','turning-red'],['madagascar','madagascar'],
      ['ice age','ice-age'],['despicable','despicable-me'],['minion','despicable-me'],['puss in boots','puss-in-boots'],['ratatouille','ratatouille'],
      ['lightyear','lightyear'],['onward','onward'],['good dinosaur','good-dinosaur'],['mitchell','mitchells'],['nimona','nimona'],['klaus','klaus'],
      ['bad guys','bad-guys'],['bug life','bug-life'],['bolt','bolt'],['wreck','wreck-it-ralph'],['ralph','wreck-it-ralph'],['rio','rio'],
      ['hotel transylvania','hotel-transylvania'],['elemental','elemental'],['luca','luca'],['soul','soul'],['piper','piper'],['inside out','inside-out'],
      ['coco','coco'],['wall-e','wall-e'],['walle','wall-e'],['up','up'],['encanto','encanto'],
      ['bleach','bleach'],['one piece','one-piece'],['hunter','hxh'],['naruto','naruto'],['demon slayer','demon-slayer'],['jujutsu','jjk'],
      ['my hero','my-hero'],['dragon ball','dragon-ball'],['haikyuu','haikyuu'],['spirited away','spirited-away'],['totoro','totoro'],
      ['mononoke','mononoke'],['howl','howl'],['ponyo','ponyo'],['wind rises','wind-rises'],['kurzgesagt','kurzgesagt'],['ted ed','ted-ed'],['3blue1brown','3blue1brown']
    ];
    for(const [a,b] of map)if(n.includes(a))return b;
    try{return getWorldKey&&getWorldKey(ref)}catch(e){return null}
  }
  function fallbackScene(ref,p){
    let name=String(ref?.name||p.name||'Reference'),cat=String(ref?.category||'').toLowerCase();
    let mode=cat.includes('historical')?'#7c3f16':cat.includes('anime')?'#7c3aed':cat.includes('sci')?'#0ea5e9':cat.includes('commercial')?'#c47a1b':p.c1;
    return `<rect width="400" height="260" fill="${p.c2}"/><rect width="400" height="170" fill="${mode}" opacity=".74"/><circle cx="320" cy="58" r="42" fill="${p.c0}" opacity=".65"/><rect y="194" width="400" height="66" fill="#050609" opacity=".42"/><g opacity=".88"><rect x="82" y="82" width="70" height="112" rx="8" fill="${p.c0}" opacity=".36"/><rect x="176" y="54" width="82" height="140" rx="8" fill="${p.c1}" opacity=".32"/><rect x="282" y="100" width="54" height="94" rx="8" fill="#fff" opacity=".18"/></g><path d="M40 198 C126 132 226 226 360 118" stroke="${p.c0}" stroke-width="5" fill="none" opacity=".65"/><text x="14" y="242" font-size="14" font-weight="900" font-family="Arial" fill="#fff" paint-order="stroke" stroke="#000" stroke-width="5">${E(name)}</text>`;
  }
  function scene(ref){
    let p=pal(),k=key(ref),svg='';
    try{if(k&&window.WORLDS&&WORLDS[k])svg=WORLDS[k]({c0:p.c0,c1:p.c1,c2:p.c2})}catch(e){svg=''}
    if(!svg)svg=fallbackScene(ref,p);
    return `${svg}<rect width="400" height="260" fill="${p.c0}" opacity=".035"/><rect y="214" width="400" height="46" fill="${p.c2}" opacity=".18"/>`;
  }
  window.miniPrev=function(o){
    return `<div class="miniPrev" title="${E(o?.name||'reference')}"><svg viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice" width="100%" height="100%" style="display:block;position:absolute;inset:0">${scene(o)}</svg><span class="px-badge">${E((o?.category||'REF').replace(' / ',' · '))}</span><span class="px-title"><b>${E(o?.name||'Reference')}</b></span></div>`;
  };
  window.renderPreview=function(){
    let ref=null;try{ref=findRef&&findRef()}catch(e){}
    let p=pal(),preview=document.getElementById('preview');if(!preview)return;
    preview.className='bigPreview fx-deep';
    preview.style.setProperty('--a',p.c0);preview.style.setProperty('--b',p.c1);preview.style.setProperty('--c',p.c2);

  };
  const oldBuild=window.buildBrief;
  if(typeof oldBuild==='function'){
    window.buildBrief=function(mode='claude'){

        let payload=blocks.slice(0,10).map(b=>{let dur=b.voSecs>0?`VO ~${b.voSecs}s · CLIP ${b.clipSecs}s`:'';return `[text#${b.id}]${dur?'\n'+dur:''}\n${sceneDirectiveLine(b)}\n${b.rawText.slice(0,260)}${b.rawText.length>260?'...':''}`}).join('\n\n')+(blocks.length>10?`\n\n...(+${blocks.length-10} sahne. Devam istenirse sıradaki text numarasından sürdür.)`:'')||'Scene text will be provided separately by Mami.';
        out=out.replace(/SCENES\n[\s\S]*?\nOUTPUT FORMAT/g,`SCENES\n${payload}\n\nOUTPUT FORMAT`);
      }
      return out;
    };
  }
  if(typeof render==='function')setTimeout(()=>render(),0);
})();
</script>

<script id="mamilas-v341-scene-editor-clean">
(function(){
  const E=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const SQ=s=>String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');
  function chip(id,key,val,label,current,extra=''){
    return `<button class="cleanChip ${extra} ${current===val?'on':''}" onclick="setSceneMeta('${SQ(id)}','${key}','${val}')">${E(label)}</button>`;
  }
  function chips(id,key,items,current){
    return `<div class="chipGrid">${items.map(x=>chip(id,key,x[0],x[1],current,x[2]||'')).join('')}</div>`;
  }
  function textChip(id,key,val,label,current,extra=''){
    return `<button class="cleanChip ${extra} ${current===val?'on':''}" onclick="setSceneMeta('${SQ(id)}','${key}','${val}')">${E(label)}</button>`;
  }
  function screenText(b){
    let m=sceneMeta(b.id),id=String(b.id),has=String(m.screenText||'').trim();
    let styles=[['title','Title'],['label','Label'],['subtitle','Subtitle']];
    let pos=[['top','Top'],['center','Center'],['bottom','Bottom']];
    return `<div class="screenTextClean">
      <div class="directorHead"><b>Video İçi Yazı</b><span class="directorHint">${has?'brief locked':'boşsa yazısız gider'}</span></div>
      <div class="screenTextLine"><input value="${E(m.screenText||'')}" placeholder="Kısa, büyük, temiz yazı..." oninput="setSceneTextMeta('${SQ(id)}','screenText',this.value)" onchange="setSceneTextMeta('${SQ(id)}','screenText',this.value)"><button class="cleanChip danger ${!has?'on':''}" onclick="clearSceneScreenText('${SQ(id)}')">Yok</button></div>
      <div class="screenTextControls">${styles.map(x=>textChip(id,'screenStyle',x[0],x[1],m.screenStyle||'label')).join('')}${pos.map(x=>textChip(id,'screenPosition',x[0],x[1],m.screenPosition||'center')).join('')}</div>
    </div>`;
  }
  window.sceneItem=function(b,i){
    let lim=getEngineLimits(),eng=production.motionEngine||'Kling',meta=sceneMeta(b.id);
    let charVal=meta.character||'auto',metVal=meta.metaphor||'auto',ch=inferCharacterDirective(b),directive=sceneDirectiveLine(b);
    let itemClass=b.warning[1]==='red'?'sceneEditorCard mustSplit':b.warning[1]==='gold'?'sceneEditorCard needsSplit':'sceneEditorCard';
    let dur=b.voSecs>0?`VO ${b.voSecs}s · Clip ${b.clipSecs}s · Tail ${b.tailSecs}s`:`${b.charCount} krk`;
    let warn=b.warning[0]!=='OK'&&b.warning[0]!=='-'?`<button class="sceneTag ${b.warning[1]}" onclick="splitSuggested(${i})" title="Bu sahneyi önerilen yerden böl">${E(b.warning[0])} · böl</button>`:`<span class="sceneTag ${b.warning[1]}">${E(b.warning[0])}</span>`;
    let charItems=[['auto','Auto'],['defne','Defne'],['aras','Aras'],['both','Both'],['world','World'],['none','No char','danger']];
    let metaItems=[['auto','Auto'],['mirror-system','Mirror'],['coded-construction','Kod'],['spatial-transformation','Spatial'],['material-reaction','Material'],['camera-discovery','Camera'],['world-explains','World'],['literal-safe','Minimal']];
    return `<div class="${itemClass}">
      <div class="sceneTop">
        <span class="sceneIdBadge">text#${E(b.id)}</span>
        <div class="sceneTopMeta">
          <span class="sceneTag blue">${E(b.speaker)}</span>
          <span class="sceneTag gold">${E(charDirectiveLabel(ch))}</span>
          <span class="sceneTag">${E(metaphorDirectiveLabel(metVal))}</span>
          ${meta.screenText?'<span class="sceneTag green">TEXT</span>':''}
          ${b.tags.map(t=>`<span class="sceneTag">${E(t)}</span>`).join('')}
          ${warn}
        </div>
        <span class="sceneDur" title="${E(eng)} max ${lim.max}s · usable ${lim.usable}s">${E(dur)}</span>
      </div>
      <div class="sceneBody">
        <textarea class="sceneTextArea" data-scene="${i}">${E(b.rawText)}</textarea>
        <div class="sceneDirectorClean">
          <div class="directorBlock">
            <div class="directorHead"><b>Karakter</b><span class="directorHint">${E(charDirectiveLabel(ch))}</span></div>
            ${chips(b.id,'character',charItems,charVal)}
          </div>
          <div class="directorBlock">
            <div class="directorHead"><b>Metafor</b><span class="directorHint">${E(metaphorDirectiveLabel(metVal))}</span></div>
            ${chips(b.id,'metaphor',metaItems,metVal)}
          </div>
        </div>
        ${screenText(b)}
        <details class="sceneDirectiveClean"><summary>DIRECTOR CHOICE</summary><pre>${E(directive)}</pre></details>
      </div>
      <div class="sceneActionsClean">
        <button class="primary" onclick="applySceneEditor()">Uygula</button>
        <button onclick="copyScenePlain(${i})">Kopyala</button>
        <button onclick="moveScene(${i},-1)">Yukarı</button>
        <button onclick="moveScene(${i},1)">Aşağı</button>
        <button onclick="mergePrev(${i})">Birleş</button>
        <button onclick="splitAtCursor(${i})">İmleçten Böl</button>
        <button onclick="splitSuggested(${i})">Böl Öner</button>
        <button onclick="duplicateScene(${i})">Duplicate</button>
        <button class="danger" onclick="deleteScene(${i})">Sil</button>
      </div>
    </div>`;
  };
  window.renderScenes=function(){
    let blocks=sceneBlocks(),totalChars=(production.scenes||'').length,warnCount=blocks.filter(b=>b.warning[0]!=='OK'&&b.warning[0]!=='-').length,redCount=blocks.filter(b=>b.warning[1]==='red').length;
    let totalVO=blocks.reduce((s,b)=>s+(b.voSecs||0),0).toFixed(1),totalClip=blocks.reduce((s,b)=>s+(b.clipSecs||0),0),lim=getEngineLimits(),eng=production.motionEngine||'Kling',wpm=getWPM();
    let startNum=production.startTextNum||1,lastNum=blocks.length?startNum+blocks.length-1:startNum,autoOn=production.autoSplit!==false;
    let pinfo=`<div class="duration-info"><span class="di-item"><b>Engine:</b> ${E(eng)}</span><span class="di-item"><b>Usable:</b> ${lim.usable}s / ${lim.max}s</span><span class="di-item"><b>WPM:</b> ${wpm}</span>${blocks.length?`<span class="di-item"><b>Range:</b> text#${startNum} → text#${lastNum}</span><span class="di-item"><b>VO:</b> ~${totalVO}s</span><span class="di-item"><b>Clip:</b> ${totalClip}s (~${(totalClip/60).toFixed(1)}dk)</span>`:''}</div>`;
    let controls=`<div class="split-controls"><div class="split-ctrl-item"><label>Başlangıç text#</label><input type="number" id="startTextNum" min="1" max="99999" value="${startNum}" onchange="production.startTextNum=Math.max(1,parseInt(this.value)||1);save();render()"></div><div class="split-ctrl-item"><label>Otomatik Bölme</label><div class="toggle-row"><button class="toggle ${autoOn?'on':''}" onclick="production.autoSplit=true;save();render();toast('Auto-split açık')">Açık</button><button class="toggle ${!autoOn?'on':''}" onclick="production.autoSplit=false;save();render();toast('Manuel mod')">Kapalı</button></div></div><div class="split-ctrl-help">${autoOn?'Metni cümle cümle böler; engine usable limitini hedefler.':'Boş satır, konuşmacı veya text# marker ile manuel çalışır.'}</div></div>`;
    let toolbar=`<div class="sceneToolbarClean"><button class="btn sm" onclick="addScene()">+ Sahne</button><button class="btn sm primary" onclick="applySceneEditor()">Editleri Uygula</button><button class="btn sm" onclick="copyAllCleanScenes()">Temizleri Kopyala</button><button class="btn sm" onclick="splitAllSuggested()">Uyarılıları Böl</button>${autoOn?'<button class="btn sm" onclick="reSplitNow()">Temizle + Böl</button>':''}</div>`;
    return `${pinfo}${controls}<div class="sceneWS"><div class="box"><div class="section-head" style="margin-bottom:10px;padding-bottom:6px"><h2>Raw Scene Text</h2><span class="section-sub">${totalChars} krk · ${blocks.length} sahne</span></div><textarea id="rawScenes" placeholder="Voice-over metnini yapıştır...">${E(production.scenes)}</textarea><div class="row" style="margin-top:10px"><button class="btn primary" onclick="saveRawScenes()">Kaydet · Böl</button><button class="btn" onclick="if(confirm('Tüm sahneler silinecek. Emin misin?')){production.scenes='';production.finalConfirmed=false;save();render()}">Temizle</button></div></div><div class="box"><div class="section-head" style="margin-bottom:10px;padding-bottom:6px"><h2>Scene Editor</h2><span class="section-sub">${blocks.length} sahne${redCount?` · <span class="warnJump" onclick="jumpFirstWarning()" style="color:var(--red)">${redCount} bölünmeli</span>`:warnCount?` · <span class="warnJump" onclick="jumpFirstWarning()">${warnCount} uyarı</span>`:''}</span></div>${(redCount||warnCount)?`<div class="editorAlert"><b>${redCount||warnCount} uyarı var.</b> Karttaki “Böl Öner” veya üstteki toplu bölme ile temizleyebilirsin.</div>`:''}${toolbar}<div class="sceneList">${blocks.length?blocks.map((b,i)=>sceneItem(b,i)).join(''):'<div class="hint" style="padding:30px 0;text-align:center">Henüz sahne yok. Sol panele metin yapıştır.</div>'}</div></div></div>`;
  };
  if(typeof render==='function')setTimeout(()=>{try{render()}catch(e){console.error('v341 scene editor',e)}},0);
})();
</script>

<script id="mamilas-v342-preview-and-brief-brain">

  const rgb=x=>{x=String(x||'#888').replace('#','');if(x.length===3)x=x.split('').map(c=>c+c).join('');let n=parseInt(x.slice(0,6),16);return [(n>>16)&255,(n>>8)&255,n&255]};

,['#18181b','#ec4899','#06b6d4'],'pink rebel'],klaus:['Snow Postal Warmth',['#f0d6a3','#7c2d12','#0f172a'],'snow postal figure'],'bad-guys':['Graphic Heist Orange',['#111827','#f97316','#f8fafc'],'heist crew'],'bug-life':['Macro Grass Blue',['#166534','#84cc16','#7dd3fc'],'macro insect'],bolt:['White Dog Hero',['#1f2937','#f8fafc','#fbbf24'],'white dog hero'],'wreck-it-ralph':['Arcade Brick Pop',['#7c2d12','#ef4444','#fbbf24'],'arcade hero'],rio:['Tropical Bird Flight',['#0ea5e9','#facc15','#22c55e'],'blue bird flight'],'hotel-transylvania':['Monster Hotel Night',['#111827','#7c3aed','#ef4444'],'monster hotel'],elemental:['Fire Water Contrast',['#111827','#f97316','#38bdf8'],'fire water characters'],luca:['Coastal Summer',['#6ec9e9','#f5c842','#0b7fab'],'coastal friends'],soul:['Jazz Afterglow',['#0b1630','#ffd27c','#d9f1ff'],'jazz soul glow'],piper:['Beach Macro Soft',['#f7d28b','#6b4f1d','#fff6d6'],'small beach bird'],'inside-out':['Emotion Console',['#4c1d95','#f59e0b','#22c55e'],'emotion console'],coco:['Marigold Memory',['#0f172a','#f97316','#fbbf24'],'marigold memory'],'wall-e':['Dusty Robot Earth',['#d97706','#fde68a','#111827'],'small robot'],up:['Balloon Sky',['#7dd3fc','#facc15','#ef4444'],'balloon house'],encanto:['Magic House Bloom',['#0f5132','#ff4d8d','#facc15'],'magic house']

<script id="mamilas-v351-production-intelligence">
(function(){
  function low(s){return String(s||'').toLowerCase()}
  function has(s,re){return re.test(low(s))}
  function metaphorFor(s){
    s=low(s);
    if(/simetri|yansı|ayna|eş/.test(s))return 'mirror-system: reflected objects, balanced architecture, paired motion';
    if(/kesir|parça|böl|yarım|çeyrek|oran/.test(s))return 'fraction-world: objects split into readable parts, recombine cleanly';
    if(/cumhuriyet|demokrasi|meclis|oy|karar|toplum/.test(s))return 'civic-structure: many small voices/objects assemble into one shared structure';
    if(/özgüven|cesaret|başar|inan|heyecan/.test(s))return 'confidence-trail: growing warm light path, posture opens, environment responds';
    if(/plan|hedef|kısa vadeli|uzun vadeli|yolculuk|harita/.test(s))return 'milestone-map: tactile route, checkpoints, near/far goal depth';
    if(/deneyim|incele|dedektif|araştır|gözlem|püf/.test(s))return 'research-detective: magnifier, clues, notes, experience trail';
    if(/kitap|enstrüman|basketbol|ingilizce|kelime/.test(s))return 'interest-islands: hobby objects become reachable learning stations';
    if(/neden|sonuç|etki|tepki|değiş/.test(s))return 'cause-effect chain: one object action creates visible environmental reaction';
    if(/duygu|kalp|içindeki|fark/.test(s))return 'inner-world reveal: small warm interior light externalizes emotion';
    return 'world-explains: physical props teach the idea without flat narration';
  }
  function motionRisk(b){
    let s=low(b.rawText),score=0,why=[];
    if((b.voSecs||0)>8){score+=2;why.push('long VO')}
    if((b.voSecs||0)>6){score+=1;why.push('dense narration')}
    if(/konuş|söyl|diyor|dedi|hoş geldiniz|görüşmek/.test(s)){score+=1;why.push('possible lip-sync')}
    if(/hızlı|koş|zıpla|dans|savaş|patla|dönüş|uç|kalabalık|herkes|ikisi birden/.test(s)){score+=2;why.push('motion complexity')}
    if(/yazı|başlık|kelime|soru|plan/.test(s)){score+=1;why.push('text/readability')}
    let level=score>=5?'UNSTABLE':score>=3?'HEAVY':score>=2?'MEDIUM':'SAFE';
    return{level,why:why.join(', ')||'simple controlled motion'};
  }
  function healthScore(b,risk,metaphor){
    let score=86,s=low(b.rawText);
    if(risk.level==='UNSTABLE')score-=24; else if(risk.level==='HEAVY')score-=16; else if(risk.level==='MEDIUM')score-=8;
    if((b.rawText||'').length<28)score-=8;
    if(/^\s*(aras|defne):\s*$/i.test(b.rawText||''))score-=25;
    if(/:\)|\bARAS:\s*DEFNE\b/i.test(b.rawText||''))score-=10;
    if(metaphor.startsWith('world-explains'))score-=3;
    if(/hedef|plan|yolculuk|deneyim|gelişim|gelecek/.test(s))score+=5;
    return Math.max(20,Math.min(100,score));
  }
  function continuityNote(b,i,prev){
    if(!prev)return 'establish continuity';
    let note=[];
    if(b.speaker!==prev.speaker)note.push('speaker focus shift');
    if((b.tags||[]).join(',')!==(prev.tags||[]).join(','))note.push('topic/tag shift');
    if(Math.abs((b.voSecs||0)-(prev.voSecs||0))>3)note.push('pacing shift');
    return note.join('; ')||'continue same world/light/outfit';
  }
  function palettePhysics(){
    let p=null,r=null;try{p=findPalette&&findPalette();r=findRef&&findRef()}catch(e){}
    let name=p?.name||production.palette||'selected palette';
    let ref=r?.name||production.reference||'selected reference';
    return `${name} controls light softness, bounce color, shadow temperature, bloom/fog density, material response and emotional warmth. ${ref} controls camera/framing/material rhythm; palette must not flatten reference identity.`;
  }
  function grammarLine(){
    let r=null;try{r=findRef&&findRef()}catch(e){}
    if(!r)return 'No locked reference: infer camera, light, material, motion and emotional pacing from project route.';
    return `${r.name}: camera=${r.cameraGrammar}; light=${r.lightingGrammar}; material=${r.materialGrammar}; motion=${r.motionGrammar}.`;
  }
  window.mamilasProductionIntel=function(){
    let blocks=[];try{blocks=sceneBlocks()}catch(e){}
    let rows=blocks.map((b,i)=>{
      let m=metaphorFor(b.rawText),risk=motionRisk(b),health=healthScore(b,risk,m),cont=continuityNote(b,i,blocks[i-1]);
      return{id:b.id,health,risk:risk.level,riskWhy:risk.why,metaphor:m,continuity:cont,pacing:(b.voSecs||0)>7?'slow/controlled, split if needed':(b.voSecs||0)>5?'medium, clear beat changes':'short, simple motion'};
    });
    let avg=rows.length?Math.round(rows.reduce((a,b)=>a+b.health,0)/rows.length):0;
    let heavy=rows.filter(r=>/HEAVY|UNSTABLE/.test(r.risk)).length;
    return{rows,avg,heavy,palette:palettePhysics(),grammar:grammarLine()};
  };

  const oldBuildBriefV351=window.buildBrief;
  if(typeof oldBuildBriefV351==='function')window.buildBrief=function(mode='claude'){
    let out=oldBuildBriefV351(mode);
    if(/BACKEND PRODUCTION INTELLIGENCE v351/.test(out))return out;
    let intel=mamilasProductionIntel();
    let map=intel.rows.slice(0,80).map(r=>`[text#${r.id}] health ${r.health}/100 · motion ${r.risk} (${r.riskWhy}) · metaphor ${r.metaphor} · pacing ${r.pacing} · continuity ${r.continuity}`).join('\n');
    let block=`BACKEND PRODUCTION INTELLIGENCE v351
Active invisible systems: continuity brain, motion risk analyzer, metaphor engine, palette intelligence, scene health score, anti-generic filter, VO timing analyzer, and production grammar engine.
Average scene health: ${intel.avg||'-'}/100. Heavy/unstable motion scenes: ${intel.heavy||0}.
Palette physics: ${intel.palette}
Production grammar: ${intel.grammar}

SCENE INTELLIGENCE MAP
${map||'No scenes yet.'}

USE THESE NOTES SILENTLY
Do not output this map as user-facing explanation unless asked. Use it to strengthen image prompts, reduce generic staging, protect continuity, control motion risk, and choose cinematic metaphors. If a scene score is weak, improve the prompt; do not complain. If motion risk is HEAVY/UNSTABLE, prefer controlled environmental motion, fewer moving objects, stable camera, and safer duration.`;
    out=out.replace(/\nQUALITY GATE\n/,`\n${block}\n\nQUALITY GATE\n`);
    if(!/BACKEND PRODUCTION INTELLIGENCE v351/.test(out))out+='\n\n'+block;
    return out;
  };

  const oldBrainV351=window.buildMamilasBrainInstructions;
  if(typeof oldBrainV351==='function')window.buildMamilasBrainInstructions=function(kind='gpt'){
    let txt=oldBrainV351(kind);

      txt+=`\n\nBACKEND PRODUCTION INTELLIGENCE v351\nWhen MAMILAS final brief includes scene intelligence map, use it silently. It is not output format; it is production guidance. Preserve continuity, reduce motion risk, use metaphor engine, enforce palette physics, avoid generic AI filler, and improve weak scenes without asking unnecessary questions.`;
    }

  };

  const oldAuditV351=window.mamilasAudit;
  window.mamilasAudit=function(){
    let a=oldAuditV351?oldAuditV351():{issues:[],score:100};
    let intel=mamilasProductionIntel();

    return a;
  };

  if(typeof render==='function')setTimeout(()=>{try{render()}catch(e){console.error('v351 production intelligence',e)}},0);
})();

<script id="mamilas-v357-auto-split-review">
(function(){
  function cleanText(t){
    let x=typeof cleanSceneText==='function'?cleanSceneText(t):String(t||'').trim();
    x=x.replace(/atmak,İngilizce/gi,'atmak, İngilizce').replace(/\bBen Daha\b/g,'Ben daha').replace(/\s+([,.;:!?])/g,'$1').replace(/([,.;:!?])(?=\S)/g,'$1 ');
    return x.replace(/\s{2,}/g,' ').trim();
  }
  function prefixParts(scene){
    let s=cleanText(scene),marker='',speaker='';
    let mm=s.match(/^\s*(\[?\s*(?:SAHNE|SCENE|TEXT|text)\s*#?\s*\d{1,5}\s*\]?[:.\-]?)/i);
    if(mm){marker=mm[1].trim();s=s.slice(mm[0].length).trim()}
    let sm=s.match(/^\s*((?:ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\s+BİRDEN|IKISI\s+BIRDEN|BOTH)\s*:\s*)/i);
    if(sm){speaker=sm[1].trim();s=s.slice(sm[0].length).trim()}

  }
  function splitUnits(body){
    let text=cleanText(body);
    let units=text.match(/[^.!?…]+[.!?…]+(?=\s|$)|[^.!?…]+$/g)?.map(x=>x.trim()).filter(Boolean)||[text];
    let out=[];
    units.forEach(u=>{

        let comma=u.split(/(?<=[,;])\s+/).map(x=>x.trim()).filter(Boolean);
        if(comma.length>1)out.push(...comma);else out.push(u);
      }else out.push(u);

  }
  function wordSafeChunks(text,target){
    let words=cleanText(text).split(/\s+/).filter(Boolean),out=[],buf='';
    words.forEach(w=>{
      let next=buf?buf+' '+w:w;

      else buf=next;
    });
    if(buf)out.push(buf);
    return out;
  }
  function splitWarningScene(scene){
    let lim=typeof getEngineLimits==='function'?getEngineLimits():{usable:8.5};
    let usable=lim.usable||8.5,target=Math.max(4.2,usable*0.72);
    let p=prefixParts(scene),units=splitUnits(p.body),groups=[],buf='';
    if(units.length<2 && (typeof estimateVO==='function'?estimateVO(p.body):0)>usable*0.85){
      units=wordSafeChunks(p.body,target);
    }
    units.forEach(u=>{
      u=cleanText(u);
      let next=buf?buf+' '+u:u;
      if(buf && (typeof estimateVO==='function'?estimateVO(next):0)>target){groups.push(buf);buf=u}
      else buf=next;
    });

    groups=groups.flatMap(g=>((typeof estimateVO==='function'?estimateVO(g):0)>usable?wordSafeChunks(g,target):[g])).map(cleanText).filter(Boolean);
    if(groups.length<2)return [cleanText(scene)];
    return groups.map((g,i)=>{
      g=cleanText(g).replace(/[,;]\s*$/,'');

  }
  function mergeContinuationScenes(list){
    let out=[];
    (list||[]).forEach(scene=>{
      let cur=prefixParts(scene),prevScene=out[out.length-1],prev=prevScene?prefixParts(prevScene):null;
      let sameSpeaker=prev&&cur.speaker&&prev.speaker&&cur.speaker.toLowerCase()===prev.speaker.toLowerCase();

  }
  window.mamilasAutoSplitWarnings=autoSplitWarnings;
  const oldSaveRawV357=window.saveRawScenes;
  window.saveRawScenes=function(){

    production.finalConfirmed=false;
    try{save();render();toast(production.autoSplitReview?`Otomatik böldüm: ${production.autoSplitReview.count} sahne · incele`:`Lossless parse: ${scenes.length} sahne`)}catch(e){if(oldSaveRawV357)oldSaveRawV357()}
  };

    production.scenes=(typeof postProcessScenes==='function'?postProcessScenes(scenes):scenes).join('\n\n');
    production.finalConfirmed=false;
    try{save();render();toast(production.autoSplitReview?`Böldüm, incele: ${production.autoSplitReview.before} → ${production.autoSplitReview.after}`:`Yeniden bölündü: ${scenes.length} sahne`)}catch(e){if(oldReSplitV357)oldReSplitV357()}
  };
  const oldApplyV357=window.applySceneEditor;
  window.applySceneEditor=function(){
    let base=typeof draftScenes==='function'?draftScenes():[];
    let scenes=autoSplitWarnings(base,'editor apply');
    if(typeof setScenes==='function')setScenes(scenes,'apply editor auto split');
    try{toast(production.autoSplitReview?`Editleri uyguladım, ${production.autoSplitReview.count} sahneyi böldüm · incele`:'Scene editleri uygulandı')}catch(e){if(oldApplyV357)oldApplyV357()}
  };
  const oldSplitAllV357=window.splitAllSuggested;
  window.splitAllSuggested=function(){
    let base=typeof draftScenes==='function'?draftScenes():[];
    let scenes=autoSplitWarnings(base,'manual split warnings');
    if(typeof setScenes==='function')setScenes(scenes,'manual split warnings');
    try{toast(production.autoSplitReview?`Uyarılıları böldüm: ${production.autoSplitReview.before} → ${production.autoSplitReview.after}`:'Bölünecek uyarı yok')}catch(e){if(oldSplitAllV357)oldSplitAllV357()}
  };
  const oldRenderScenesV357=window.renderScenes;
  if(typeof oldRenderScenesV357==='function')window.renderScenes=function(){
    let html=oldRenderScenesV357();

      html=html.replace('<div class="sceneList">',msg+'<div class="sceneList">');

  };
  if(typeof render==='function')setTimeout(()=>{try{render()}catch(e){console.error('v357 auto split review',e)}},0);

<script id="mamilas-clean-lossless-parser">
(function(){
  const SPEAKER_RE=/^(ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\s+BİRDEN|IKISI\s+BIRDEN|BOTH)\s*:?\s*(.*)$/i;
  function cleanLine(s){
    return String(s||'')
      .replace(/\r/g,'')
      .replace(/atmak,İngilizce/gi,'atmak, İngilizce')
      .replace(/\bBen Daha\b/g,'Ben daha')
      .replace(/hoşçakalın/gi,'hoşça kalın')
      .replace(/\s+([,.;:!?])/g,'$1')
      .replace(/([,.;:!?])(?=[^\s"”')\]])/g,'$1 ')
      .replace(/(:)(["“])/g,'$1 $2')
      .replace(/(["”])(?=[A-Za-zÇĞİÖŞÜçğıöşü])/g,'$1 ')
      .replace(/\s+([)\]”])/g,'$1')
      .replace(/([(\[“])\s+/g,'$1')
      .replace(/\s{2,}/g,' ')
      .trim();
  }
  function normSpeaker(s){
    s=String(s||'').toUpperCase().replace('OGRETMEN','ÖĞRETMEN').replace('IKISI BIRDEN','İKİSİ BİRDEN').replace(/\s+/g,' ');
    if(s==='BOTH')return 'İKİSİ BİRDEN';
    return s;
  }
  function terminal(s){return /[.!?…:]"?$/.test(cleanLine(s))}
  function openEnded(s){
    s=cleanLine(s).replace(/[.,;:!?…"“”]+$/,'').toLowerCase();
    return /\b(en|daha|gibi|ve|veya|ile|için|o|bu|şu|kısa|uzun|alanı|kişilerin|büyüklerinden|her gün|içindeki)$/.test(s);
  }
  function startsContinuation(s){
    s=cleanLine(s);
    return /^[a-zçğıöşü"“'’)]/.test(s)||/^(önemli|istiyorum|öğrenmek|alanı|kişilerin|bilgi|vadeli|bir önceki|yolculuğundur|seçmelisin)\b/i.test(s);
  }
  function parseBlocks(raw){
    let lines=String(raw||'').split(/\n+/).map(cleanLine).filter(Boolean),blocks=[],cur=null;
    function flush(){if(cur&&cleanLine(cur.text)){cur.text=cleanLine(cur.text);blocks.push(cur)}cur=null}
    lines.forEach(line=>{
      let m=line.match(SPEAKER_RE);
      if(m && /^(ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ|IKISI|BOTH)/i.test(line)){
        flush();
        cur={speaker:normSpeaker(m[1]),text:cleanLine(m[2]||'')};
        return;
      }
      if(cur&&(!terminal(cur.text)||openEnded(cur.text)||startsContinuation(line))){
        cur.text=cleanLine((cur.text?cur.text+' ':'')+line);
      }else{
        flush();
        cur={speaker:'',text:line};
      }
    });
    flush();
    return blocks;
  }
  function splitSentencesSmart(text){
    let s=cleanLine(text);
    if(!s)return[];
    let out=[],buf='',quote=0,paren=0;
    for(let i=0;i<s.length;i++){
      let ch=s[i],next=s[i+1]||'';
      buf+=ch;
      if(ch==='"'||ch==='“'||ch==='”')quote^=1;
      if(ch==='(')paren++;
      if(ch===')')paren=Math.max(0,paren-1);
      if(/[.!?…]/.test(ch)){
        let endQuote=/["”]/.test(next);
        if(endQuote){buf+=next;i++}
        let after=s[i+1]||'';
        let ok=!paren && (!after || /\s/.test(after));
        if(ok){out.push(cleanLine(buf));buf=''}
      }
    }
    if(cleanLine(buf))out.push(cleanLine(buf));
    return out.length?out:[s];
  }
  function splitLongSentence(sentence,target){
    let s=cleanLine(sentence);
    let parts=s.split(/(?<=[,;:])\s+/).map(cleanLine).filter(Boolean);
    if(parts.length<2)parts=s.split(/\s+(?=(?:ve|veya|ama|Bu|Bugün|Birkaç|Plan|Kendini|Örnek|Kısa|Uzun)\b)/).map(cleanLine).filter(Boolean);
    if(parts.length<2)return [s];
    let out=[],buf='';
    parts.forEach(p=>{
      let next=buf?buf+' '+p:p;
      if(buf && estimateVO(next)>target){out.push(cleanLine(buf).replace(/[,;:]$/,''));buf=p}
      else buf=next;
    });
    if(buf)out.push(cleanLine(buf).replace(/[,;:]$/,''));
    return out;
  }
  function parseLosslessScenes(raw){
    let lim=typeof getEngineLimits==='function'?getEngineLimits():{usable:8.5};
    let target=Math.max(5.2,(lim.usable||8.5)*0.76);
    let scenes=[];
    parseBlocks(raw).forEach(block=>{
      let sentences=splitSentencesSmart(block.text),buf='';
      function push(txt){
        txt=cleanLine(txt);
        if(!txt)return;
        let prefix=block.speaker?block.speaker+': ':'';
        scenes.push(prefix+txt);
      }
      sentences.forEach(sent=>{
        let pieces=estimateVO(sent)>target?splitLongSentence(sent,target):[sent];
        pieces.forEach(piece=>{
          let next=buf?buf+' '+piece:piece;
          if(buf && estimateVO(next)>target){push(buf);buf=piece}
          else buf=next;
        });
      });
      if(buf)push(buf);
    });
    scenes=scenes.map(cleanLine).filter(Boolean);
    return scenes;
  }
  window.mamilasParseLosslessScenes=parseLosslessScenes;
  function setParsedScenes(raw,reason){
    try{if(typeof snapshot==='function')snapshot(reason||'lossless parse')}catch(e){}
    production.sceneRawSource=raw;
    production.sceneParsedClean=true;
    let scenes=parseLosslessScenes(raw);
    production.scenes=scenes.join('\n\n');
    production.finalConfirmed=false;
    production.autoSplitReview={count:0,before:0,after:scenes.length,reason:'lossless parser',at:new Date().toISOString()};
    try{save();render();toast('Lossless parse temiz: '+scenes.length+' sahne · metin kaybı yok')}catch(e){}
  }
  window.saveRawScenes=function(){
    let raw=document.getElementById('rawScenes')?.value??'';
    setParsedScenes(raw,'raw lossless parse');
  };
  window.reSplitNow=function(){
    let raw=production.sceneRawSource||production.scenes||'';
    if(!raw)return;
    setParsedScenes(raw,'lossless resplit');
  };
  const oldSplitScenesClean=window.splitScenes;
  window.splitScenes=function(raw){
    let text=String(raw||'').trim();
    if(!text)return[];
    if(production&&production.sceneParsedClean&&text===(production.scenes||'').trim()){
      return text.split(/\n\s*\n+/).map(cleanLine).filter(Boolean);
    }
    if(/\n\s*\n/.test(text)&&!/\bGelişim yolculuğu\b/.test(text)){
      return text.split(/\n\s*\n+/).map(cleanLine).filter(Boolean);
    }
    return oldSplitScenesClean?oldSplitScenesClean(raw):parseLosslessScenes(raw);
  };
  const oldBuildBriefClean=window.buildBrief;
  if(typeof oldBuildBriefClean==='function')window.buildBrief=function(mode='claude'){
    let out=oldBuildBriefClean(mode);
    out=out
      .replace(/^MAMILAS CLEAN PRODUCTION BRIEF v\d+\s*—/m,'MAMILAS PRODUCTION BRIEF —')
      .replace(/V343 ARTWORK \/ REFERENCE ENGINE/g,'REFERENCE ARTWORK ENGINE')
      .replace(/AI ART DIRECTOR OPERATING BRAIN v\d+/g,'AI ART DIRECTOR OPERATING BRAIN')
      .replace(/FINAL BRIEF CLARITY PATCH v\d+/g,'FINAL BRIEF AUTHORITY')
      .replace(/VISUAL ATTACHMENT MOTION WORKFLOW v\d+/g,'VISUAL ATTACHMENT MOTION WORKFLOW')
      .replace(/BACKEND PRODUCTION INTELLIGENCE v\d+/g,'PRODUCTION INTELLIGENCE')
      .replace(/FINAL AUTHORITY v\d+/g,'FINAL AUTHORITY')
      .replace(/\bv3\d+\b/g,'MAMILAS');
    return out;
  };
  const oldRenderScenesClean=window.renderScenes;
  if(typeof oldRenderScenesClean==='function')window.renderScenes=function(){
    let html=oldRenderScenesClean();
    html=html.replace(/<b>Otomatik böldüm, incele:<\/b>[^<]+/g,'<b>Lossless parser aktif:</b> Ham metin korunarak sahnelere bölündü. ');
    return html;
  };
  if(typeof render==='function')setTimeout(()=>{try{render()}catch(e){console.error('mamilas clean lossless parser',e)}},0);
})();
</script>
<script id="mamilas-verbatim-scene-editor">
(function(){
  const SPEAKERS='ARAS|DEFNE|ÖĞRETMEN|OGRETMEN|ANLATICI|NARRATOR|TEACHER|VOICEOVER|VO|MÜŞTERİ|MUSTERI|MÜSTERİ|CLIENT|CUSTOMER|SUNUCU|UZMAN|VELİ|VELI|ÖĞRENCİ|OGRENCI|İKİSİ\\s+BİRDEN|IKISI\\s+BIRDEN|BOTH';
  const SPEAKER_START=new RegExp(`^\\s*(${SPEAKERS})(?:\\s*:\\s*|\\s+)([\\s\\S]*)$`,'i');
  const MARKER_START=/^\s*\[?\s*(?:SAHNE|SCENE|TEXT|text)\s*#?\s*\d{1,5}\s*\]?[:.\-]?\s*/i;
  function oneLine(s){return String(s||'').replace(/\r/g,'').replace(/[ \t]+/g,' ').trim()}
  function speakerName(s){
    s=String(s||'').toUpperCase().replace('OGRETMEN','ÖĞRETMEN').replace('IKISI BIRDEN','İKİSİ BİRDEN').replace('BOTH','İKİSİ BİRDEN').replace(/\s+/g,' ');
    return s;
  }
  function stripMarker(s){return String(s||'').replace(MARKER_START,'').trim()}
  function stripSpeaker(s){
    s=stripMarker(s);
    let m=s.match(SPEAKER_START);
    return m?oneLine(m[2]||''):oneLine(s);
  }
  function normForCompare(s){
    return String(s||'')
      .replace(/\r/g,'')
      .split(/\n+/).map(oneLine).filter(Boolean).map(line=>stripSpeaker(line)).filter(Boolean).join(' ')
      .replace(/\s+/g,' ')
      .trim();
  }
  function normScenesForCompare(scenes){
    return (scenes||[]).map(stripSpeaker).filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
  }
  function parseBlocksVerbatim(raw){
    let lines=String(raw||'').replace(/\r/g,'').split(/\n+/).map(oneLine).filter(Boolean);
    let blocks=[],cur=null;
    function flush(){if(cur&&oneLine(cur.text)){cur.text=oneLine(cur.text);blocks.push(cur)}cur=null}
    lines.forEach(line=>{
      let m=line.match(SPEAKER_START);
      if(m){
        flush();
        cur={speaker:speakerName(m[1]),text:oneLine(m[2]||'')};
      }else if(cur){
        cur.text=oneLine((cur.text?cur.text+' ':'')+line);
      }else{
        cur={speaker:'',text:line};
      }
    });

    return blocks;
  }

      if(ch==='(')paren++;
      if(ch===')')paren=Math.max(0,paren-1);
      if(/[.!?…]/.test(ch)&&!paren){
        if(/["”]/.test(next)){buf+=next;i++}
        let after=s[i+1]||'';
        if(!after||/\s/.test(after)){out.push(oneLine(buf));buf=''}

    if(parts.length<2)parts=s.split(/\s+(?=(?:ve|veya|ama|Bu|Bugün|Birkaç|Plan|Kendini|Örnek|Kısa|Uzun|Seçtiğin|Senden|Başka|Bir)\b)/).map(oneLine).filter(Boolean);
    if(parts.length<2)return [s];
    let out=[],buf='';
    parts.forEach(p=>{
      let next=buf?buf+' '+p:p;
      if(buf&&(typeof estimateVO==='function'?estimateVO(next):0)>target){out.push(oneLine(buf));buf=p}
      else buf=next;
    });
    if(buf)out.push(oneLine(buf));

  function parseScenesVerbatim(raw){
    let lim=typeof getEngineLimits==='function'?getEngineLimits():{usable:8.5};
    let target=Math.max(5.5,(lim.usable||8.5)*0.78);

    parseBlocksVerbatim(raw).forEach(block=>{

      let buf='';
      function push(txt){
