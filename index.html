4. Lighting Director: use motivated light; palette controls shadow behavior.
5. Material Proof: every shot needs tactile surfaces and contact shadows.
6. Motion-Ready Start Frame: image shows the breath before action, not the final result.
7. World-as-Teacher: the environment explains the concept before narration finishes.
8. Reference Translation: translate reference into camera, material, light, emotional pacing and motion physics; do not copy IP.
9. Continuity Supervisor: protect characters, wardrobe, world, palette and sequence identity.
10. Quality Gate: reject cheap mascot look, flat poster look, random particles, broken text, clutter, plastic skin and dead camera.

OUTPUT FORMAT
For every scene:
[text#NNN]

PRODUCTION NOTE:
<short Turkish note: creative logic + camera/light decision>

SCENES
${S.scenes||'[Paste scene batch here]'}

Finish full batch. End with: Proje bitti.`}

function renderAcademy(){let keys=Object.keys(ACADEMY),k=S.academy||keys[0],items=ACADEMY[k]||[];return header('Cine Academy','AI video, sinematografi, lens, ışık, kamera, motion physics ve prompt cerrahisi. Buradan pro refleks kazanırsın.')+`<div class="academyHero"><h2>${esc(k)}</h2><p>Bu bölüm üretim kararlarını otomatikleştirmek için tasarlandı. Her kart direkt prompt kalitesine ve sahne zekasına çalışır.</p></div><div class="tabs">${keys.map(x=>`<button class="tab ${k===x?'on':''}" onclick="S.academy='${x}';save();render()">${x}</button>`).join('')}</div><div class="grid g2">${items.map(i=>`<div class="card academyCard"><b>${esc(i[0])}</b><span>${esc(i[1])}</span></div>`).join('')}</div>`}
function render(){renderPreview();renderNav();let html={project:renderProject,reference:renderRefs,palette:renderPalette,scenes:renderScenes,brief:renderBrief,academy:renderAcademy}[S.tab]?.()||renderProject();$('screen').innerHTML=html}

(function(){

    .sceneRaw{min-height:250px}
  }`;
  document.head.appendChild(sceneStyle);

  function pad(n){return String(n).padStart(3,'0')}
  function half(n){return Math.round(n*2)/2}
  function cleanText(t){return String(t||'').replace(/\[text#\d+\]/g,'').trim()}
  function sceneBlocks(){
    const raw=S.scenes||'';
    const re=/\[text#(\d+)\]\s*([\s\S]*?)(?=\n\s*\[text#\d+\]|\s*$)/g;
    let m,out=[];
    while((m=re.exec(raw))!==null){
      out.push({id:pad(m[1]),text:(m[2]||'').trim()});
    }
    if(out.length) return out;
    const chunks=raw.split(/\n{2,}/).map(x=>x.trim()).filter(Boolean);
    return chunks.map((t,i)=>({id:pad((Number(S.sceneStart)||1)+i),text:t}));
  }
  function rebuild(blocks){
    S.scenes=blocks.map(b=>`[text#${pad(b.id)}]\n${(b.text||'').trim()}`).join('\n\n');
    save(); render();
  }
  function engineSafe(){
    const eng=(refObj().engine||project().engine||'').toLowerCase();
    if(eng.includes('runway')) return 14.5;
    if(eng.includes('luma')) return 8.0;
    if(eng.includes('kling')) return 8.5;
    return 8.5;
  }
  function estimateVO(text){
    const words=cleanText(text).split(/\s+/).filter(Boolean).length;
    if(!words) return 0;
    return half(Math.max(3.0, words/2.35 + 0.8));
  }
  function sceneTiming(b){
    const meta=S.sceneMeta?.[b.id]||{};
    const vo=Number(meta.vo)||estimateVO(b.text);
    const limit=engineSafe();
    let clip=Number(meta.clip)||half(Math.min(limit, Math.max(4, vo+1.0)));
    let forced=false;
    if(vo>limit && !Number(meta.clip)){clip=limit; forced=true}
    const tail=half(clip-vo);
    return {vo:half(vo),clip:half(clip),tail,limit,forced,manual:!!(meta.vo||meta.clip)};
  }
  function nextId(blocks){
    let nums=blocks.map(b=>Number(b.id)).filter(n=>!isNaN(n));
    return pad((nums.length?Math.max(...nums):0)+1);
  }
  function selectedBlock(){return sceneBlocks().find(b=>b.id===S.sceneSelected)||sceneBlocks()[0]}

  window.sceneNumberRaw=function(){
    let blocks=sceneBlocks();
    if(!blocks.length){toast('Önce metin gir');return}
    rebuild(blocks);
    toast('text# numaraları kilitlendi');
  }
  window.sceneAdd=function(){
    let blocks=sceneBlocks();
    const id=nextId(blocks);
    const newBlock={id,text:'Yeni sahne metni buraya yazılacak.'};
    const idx=blocks.findIndex(b=>b.id===S.sceneSelected);
    if(idx>=0) blocks.splice(idx+1,0,newBlock); else blocks.push(newBlock);
    S.sceneSelected=id;
    rebuild(blocks);
  }
  window.sceneDelete=function(id){
    let blocks=sceneBlocks().filter(b=>b.id!==id);
    if(S.sceneSelected===id) S.sceneSelected=blocks[0]?.id||'';
    rebuild(blocks);
  }
  window.sceneSelect=function(id){S.sceneSelected=id;save();render()}
  window.sceneUpdateText=function(id,val){
    let blocks=sceneBlocks();
    let b=blocks.find(x=>x.id===id);
    if(b){b.text=val;rebuild(blocks)}
  }
  window.sceneRename=function(id){
    let n=prompt('Yeni text numarası:', id);
    if(!n)return;
    n=pad(n.replace(/\D/g,''));
    if(!n||n==='000')return;
    let blocks=sceneBlocks();
    if(blocks.some(b=>b.id===n)){toast('Bu numara zaten var');return}
    let b=blocks.find(x=>x.id===id);
    if(b){b.id=n; S.sceneMeta[n]=S.sceneMeta[id]||{}; delete S.sceneMeta[id]; S.sceneSelected=n; rebuild(blocks)}
  }
  window.sceneSplit=function(id){
    let blocks=sceneBlocks();
    let idx=blocks.findIndex(b=>b.id===id);
    if(idx<0)return;
    let text=blocks[idx].text.trim();
    if(text.length<20){toast('Bu sahne bölmek için çok kısa');return}
    let sentences=text.match(/[^.!?\n]+[.!?]?/g)||text.split(/\n+/);
    let first,second;
    if(sentences.length>1){
      const mid=Math.ceil(sentences.length/2);
      first=sentences.slice(0,mid).join(' ').trim();
      second=sentences.slice(mid).join(' ').trim();
    }else{
      const words=text.split(/\s+/), mid=Math.ceil(words.length/2);
      first=words.slice(0,mid).join(' ');
      second=words.slice(mid).join(' ');
    }
    const nid=nextId(blocks);
    blocks[idx].text=first;
    blocks.splice(idx+1,0,{id:nid,text:second});
    S.sceneSelected=nid;
    rebuild(blocks);
  }
  window.sceneSetMeta=function(id,key,val){
    S.sceneMeta=S.sceneMeta||{};
    S.sceneMeta[id]=S.sceneMeta[id]||{};
    if(val===''||isNaN(Number(val))) delete S.sceneMeta[id][key];
    else S.sceneMeta[id][key]=Number(val);
    save();render();
  }
  window.sceneClearMeta=function(id){
    if(S.sceneMeta) delete S.sceneMeta[id];
    save();render();
  }

  const oldBuildBrief = buildBrief;
  buildBrief = function(){
    const r=refObj(),p=pal(S.palette),pr=project();
    const blocks=sceneBlocks();
    const packet=blocks.length?blocks.map(b=>{
      const t=sceneTiming(b);
      const warn=t.vo>t.limit?`ENGINE WARNING: VO exceeds ${t.limit}s safe usable limit. Keep image phase intact; flag this scene for possible manual split.`:'';
      return `[text#${b.id}]\nVO DURATION: ${t.vo}s\nCLIP TARGET: ${t.clip}s\nTAIL: ${t.tail}s\n${warn}\nSOURCE TEXT:\n${b.text}`;
    }).join('\n\n'):(S.scenes||'[Paste scene batch here]');
    return `MAMILAS DIRECTOR BIBLE v402 — SCENE ENGINE LOCKED

ROLE
You are MAMILAS: creative director, prompt engineer, cinematographer, production designer, editor, motion supervisor and QA lead in one system. Speak Turkish to Mami; write image/motion/Suno prompts in English.

Project: ${pr.name}
World: ${pr.world}
Engine: ${r.engine}

Reference DNA: ${r.dna}
Reference Look: ${r.look}

Palette Mood: ${p.mood}

SCENE ENGINE LOCK

DIRECTOR BRAIN
1. Scene Kernel: identify one dominant idea per scene.
2. Visual Metaphor: convert abstract teaching into physical cinematic behavior.

7. World-as-Teacher: the environment explains the concept before narration finishes.
8. Reference Translation: translate reference into camera, material, light, emotional pacing and motion physics; do not copy IP.
9. Continuity Supervisor: protect characters, wardrobe, world, palette and sequence identity.
10. Quality Gate: reject cheap mascot look, flat poster look, random particles, broken text, clutter, plastic skin and dead camera.

OUTPUT FORMAT
For every scene:
[text#NNN]
VO DURATION / CLIP TARGET / TAIL: echo exactly.
IMAGE PROMPT:
<one powerful English paragraph: subject, environment, camera, lens feeling, lighting, material, mood, composition, motion-ready trigger>

<short Turkish note: creative logic + camera/light decision + duration warning if any>

SCENE PACKET
${packet}

Finish full batch. End with: Proje bitti.`;
  }

  renderScenes=function(){
    const blocks=sceneBlocks();
    const selected=selectedBlock();
    const totalWords=blocks.reduce((a,b)=>a+cleanText(b.text).split(/\s+/).filter(Boolean).length,0);
