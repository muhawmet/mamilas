<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MAMILAS v322 Pixel Preview Rebuild</title><style>
:root{
--bg:#060709;--s1:#0b0c11;--s2:#0e1018;--s3:#13161f;
--line:#ffffff0f;--line2:#ffffff18;--line3:#ffffff28;
--text:#eeeaf8;--muted:#5e5c6e;--dim:#3a3845;
--gold:#f5c842;--gold2:#e8a820;--goldglow:#f5c84222;
--green:#4df5a0;--red:#f54d6b;--blue:#5b9fff;
--a:#f5c842;--b:#5b9fff;--c:#0a0c14;
--mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
--sans:-apple-system,'Inter',system-ui,sans-serif;
--r4:4px;--r8:8px;--r12:12px;--r16:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;font-size:13px;-webkit-font-smoothing:antialiased}

/* LAYOUT */
.app{display:grid;grid-template-columns:220px minmax(0,1fr) 300px;min-height:100vh}
.side{position:sticky;top:0;height:100vh;overflow:auto;background:var(--s1);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:0}
.right{position:sticky;top:0;height:100vh;overflow:auto;background:var(--s1);border-left:1px solid var(--line);padding:0}
.main{padding:36px 40px 100px;background:var(--bg)}
.main-inner{max-width:1100px}

/* SIDEBAR LOGO */
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--line)}
.logo-mark{display:flex;align-items:baseline;gap:0;line-height:1}
.logo-mark .m{font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--gold)}
.logo-mark .rest{font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--text);opacity:.85}
.logo-sub{font:10px/1 var(--mono);color:var(--muted);letter-spacing:.1em;margin-top:5px;text-transform:uppercase}

/* NAV */
.nav{flex:1;padding:10px 10px 0;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r8);cursor:pointer;border:0;background:transparent;color:var(--muted);text-align:left;width:100%;transition:background .12s,color .12s;position:relative}
.nav-item:hover{background:var(--s3);color:var(--text)}
.nav-item.on{background:linear-gradient(90deg,var(--goldglow),transparent);color:var(--text)}
.nav-item.on::before{content:'';position:absolute;left:0;top:20%;height:60%;width:2px;background:var(--gold);border-radius:0 2px 2px 0}
.nav-step{width:22px;height:22px;border-radius:var(--r4);background:var(--s3);border:1px solid var(--line2);display:grid;place-items:center;font:700 10px var(--mono);color:var(--muted);flex-shrink:0;transition:all .12s}
.nav-item.on .nav-step{background:var(--goldglow);border-color:var(--gold);color:var(--gold)}
.nav-item.done .nav-step{background:#4df5a015;border-color:#4df5a040;color:var(--green)}
.nav-label{flex:1;min-width:0}
.nav-label b{display:block;font-size:12px;font-weight:600;line-height:1.2}
.nav-label small{font-size:10px;color:var(--muted);display:block;margin-top:1px}
.nav-divider{height:1px;background:var(--line);margin:8px 10px}

/* SIDEBAR BOTTOM */
.side-bottom{padding:12px 10px 14px;border-top:1px solid var(--line)}
.readiness-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.readiness-label span{font:10px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.readiness-label strong{font:700 13px var(--mono);color:var(--text)}
.bar-track{height:3px;background:var(--s3);border-radius:99px;overflow:hidden;margin-bottom:8px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green));border-radius:99px;width:0;transition:width .3s}
.hint-text{font:11px var(--sans);color:var(--muted);margin-bottom:10px;min-height:16px}

/* STATUS CHIPS */
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.status-chip{background:var(--s2);border:1px solid var(--line2);border-radius:var(--r8);padding:7px 9px;cursor:pointer;transition:border-color .12s}
.status-chip:hover{border-color:var(--line3)}
.status-chip-label{font:9px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px}
.status-chip-val{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.status-chip-val.empty{color:var(--dim)}

/* CTA BUTTONS IN SIDEBAR */
.side-actions{display:flex;flex-direction:column;gap:5px}
.btn-final{background:var(--gold);color:#1a1100;border:0;border-radius:var(--r8);padding:9px 14px;font:700 12px var(--sans);cursor:pointer;width:100%;letter-spacing:-.01em;transition:opacity .12s}
.btn-final:hover{opacity:.88}
.btn-reset{background:transparent;color:var(--muted);border:1px solid var(--line2);border-radius:var(--r8);padding:7px 14px;font:600 11px var(--sans);cursor:pointer;width:100%;transition:color .12s,border-color .12s}
.btn-reset:hover{color:var(--red);border-color:#f54d6b44}

/* RIGHT PANEL */
.rpanel-section{border-bottom:1px solid var(--line);padding:14px 16px}
.rpanel-section:last-child{border-bottom:0}
.rpanel-title{font:600 10px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.bigPreview{height:220px;position:relative;overflow:hidden;background:radial-gradient(circle at 73% 18%,var(--b),transparent 28%),linear-gradient(145deg,var(--a),var(--b) 50%,var(--c))}
.bigPreview:after{content:'';position:absolute;inset:0;background-image:radial-gradient(#fff6 1px,transparent 1px);background-size:18px 18px;opacity:.06;mix-blend-mode:screen;pointer-events:none}
.fx-deep{box-shadow:inset 0 0 100px #000c}
.fx-window:before{content:'';position:absolute;left:0;top:0;width:40%;height:100%;background:linear-gradient(108deg,#fff4,transparent 55%);mix-blend-mode:screen;pointer-events:none}
.fx-spot:before{content:'';position:absolute;left:-5%;top:-10%;width:70%;height:110%;background:radial-gradient(ellipse at 30% 30%,#f5c84266,transparent 45%);mix-blend-mode:screen;pointer-events:none}
.fx-cosmic:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 65%,#5b9fff33,transparent 15%),radial-gradient(#fff 1px,transparent 1px);background-size:auto,28px 28px;opacity:.4;pointer-events:none}
.previewLabel{position:absolute;bottom:10px;left:12px;z-index:5;font:700 11px var(--sans);color:rgba(255,255,255,.9);text-shadow:0 1px 8px #000}
.previewChip{position:absolute;top:10px;right:10px;z-index:5;font:700 9px var(--mono);background:#f5c842ee;color:#1a1100;border-radius:var(--r4);padding:3px 7px;letter-spacing:.04em;text-transform:uppercase}
.previewEngine{position:absolute;top:10px;left:10px;z-index:5;font:600 9px var(--mono);background:#00000088;color:rgba(255,255,255,.7);border-radius:var(--r4);padding:3px 7px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}

/* DETAIL ROWS */
.detail-row{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid var(--line)}
.detail-row:last-child{border-bottom:0}
.detail-row .dk{font:10px var(--mono);color:var(--muted);flex-shrink:0;padding-top:1px;text-transform:uppercase;letter-spacing:.06em}
.detail-row .dv{font-size:11px;font-weight:600;color:var(--text);text-align:right;line-height:1.4}
.detail-block{padding:8px 0;border-bottom:1px solid var(--line)}
.detail-block:last-child{border-bottom:0}
.detail-block-label{font:9px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.detail-block-val{font-size:11px;color:var(--text);line-height:1.45}

/* EVAL ITEMS */
.eval-item{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line)}
.eval-item:last-child{border-bottom:0}
.eval-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.eval-dot.ok{background:var(--green)}
.eval-dot.warn{background:var(--gold)}
.eval-dot.err{background:var(--red)}
.eval-item-inner .ev-title{font:600 11px var(--sans);color:var(--text);line-height:1.2}
.eval-item-inner .ev-sub{font-size:10px;color:var(--muted);margin-top:1px}

/* MAIN CONTENT */
.page-header{padding-bottom:24px;margin-bottom:28px;border-bottom:1px solid var(--line)}
.page-eyebrow{font:600 10px var(--mono);color:var(--gold);text-transform:uppercase;letter-spacing:.14em;margin-bottom:8px}
.page-title{font-size:32px;font-weight:800;letter-spacing:-1.2px;line-height:1.05;color:var(--text)}
.page-desc{font-size:13px;color:var(--muted);margin-top:8px;max-width:540px;line-height:1.6}

/* SECTION BOXES */
.box{border:1px solid var(--line2);background:var(--s1);border-radius:var(--r12);padding:16px;margin-bottom:12px}
.box h2{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;letter-spacing:-.02em}
.panel{margin-bottom:0}

/* CARDS */
.card{position:relative;border:1px solid var(--line2);background:var(--s1);border-radius:var(--r12);padding:14px;cursor:pointer;transition:border-color .14s,background .14s;min-height:100px;overflow:hidden}
.card:hover{border-color:var(--line3);background:var(--s2)}
.card.sel{border-color:var(--gold);background:linear-gradient(145deg,#f5c84210,var(--s1))}
.card.sel::after{content:'✓';position:absolute;right:10px;top:10px;background:var(--gold);color:#1a1100;border-radius:var(--r4);font:800 9px var(--mono);padding:2px 6px}
.card h3{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:4px;letter-spacing:-.01em}
.card p{font-size:11px;color:var(--muted);line-height:1.5}
.card em{font-style:normal;font-size:10px;color:var(--dim);display:block;margin-top:7px;font-family:var(--mono)}

/* SWATCHES */
.sw{display:flex;gap:3px;margin:7px 0}
.sw i{height:6px;flex:1;border-radius:2px}

/* BUTTONS */
.btn{border:1px solid var(--line2);background:var(--s2);color:var(--text);border-radius:var(--r8);padding:7px 12px;font:600 12px var(--sans);cursor:pointer;transition:border-color .12s,color .12s}
.btn:hover{border-color:var(--line3);color:var(--text)}
.btn.primary{background:var(--gold);color:#1a1100;border-color:transparent;font-weight:700}
.btn.primary:hover{opacity:.88}
.btn.danger{color:var(--red);border-color:transparent;background:transparent}
.btn.danger:hover{border-color:#f54d6b33;background:#f54d6b0a}
.btn.sm{padding:5px 9px;font-size:11px}
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* PILLS / TABS */
.pill,.tab{display:inline-flex;border:1px solid var(--line2);background:transparent;color:var(--muted);border-radius:var(--r4);padding:5px 10px;font:600 11px var(--sans);cursor:pointer;margin:0 4px 5px 0;transition:all .1s}
.pill.sel,.tab.sel{border-color:var(--gold);color:var(--gold);background:var(--goldglow)}
.pill:hover,.tab:hover{border-color:var(--line3);color:var(--text)}
.tabs{margin:10px 0;display:flex;flex-wrap:wrap;gap:0}

/* INPUTS */
input,textarea{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--text);border-radius:var(--r8);padding:10px 12px;outline:0;resize:vertical;font:13px/1.55 var(--sans)}
textarea:focus,input:focus{border-color:var(--gold)}

/* ADVISOR / STATUS BARS */
.advisor,.ok,.warn{border-radius:var(--r8);padding:9px 12px;margin:8px 0;font-size:11px;line-height:1.5}
.advisor,.ok{border:1px solid #4df5a028;background:#4df5a008;color:#a0f5cc}
.warn{border:1px solid #f5c84230;background:#f5c84208;color:#f5d980}

/* MINI PREVIEW */
.miniPrev{height:72px;border-radius:var(--r8);margin-bottom:10px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--a),var(--b) 50%,var(--c))}
.miniPrev .mp-glow,.miniPrev .mp-light{position:absolute;pointer-events:none}
/* SOFT 3D - warm key + bounce */
.mp-soft3d .mp-glow{inset:0;background:radial-gradient(circle at 70% 35%,#fff9 0,transparent 32%);mix-blend-mode:screen}
.mp-soft3d .mp-light{left:0;top:0;width:55%;height:100%;background:linear-gradient(115deg,#fff3,transparent 65%);mix-blend-mode:screen}
/* BAROQUE - single hot spot in deep dark */
.mp-baroque{background:linear-gradient(135deg,#0b0704,#1a0d05 55%,#2a1608)}
.mp-baroque .mp-glow{left:20%;top:-30%;width:55%;height:160%;background:radial-gradient(ellipse at 50% 50%,#f5c842dd 0,#c18a4288 22%,transparent 55%);mix-blend-mode:screen}
/* HISTORICAL - sepia haze + ground */
.mp-historical{background:linear-gradient(135deg,#3b2617,#5c3d20 50%,#c79a56)}
.mp-historical .mp-glow{inset:0;background:radial-gradient(circle at 60% 35%,#ece0c866 0,transparent 50%);mix-blend-mode:screen}
.mp-historical .mp-light{inset:0;background:linear-gradient(180deg,transparent 55%,#000a)}
/* ANIME - saturated sky + rim flare */
.mp-anime{background:linear-gradient(180deg,#6cb6ff 0%,#ff8fab 65%,#2d3561)}
.mp-anime .mp-glow{right:-5%;top:0;width:55%;height:100%;background:radial-gradient(ellipse at 75% 50%,#fff8 0,transparent 45%);mix-blend-mode:screen}
.mp-anime .mp-light{left:35%;top:10%;width:1px;height:80%;background:#fff;box-shadow:0 0 8px #fff,0 0 18px var(--a);opacity:.85}
/* GHIBLI - sky + meadow */
.mp-ghibli{background:linear-gradient(180deg,#8ec8ff 0%,#d8f0a0 60%,#9bd982)}
.mp-ghibli .mp-glow{inset:0;background:radial-gradient(circle at 50% 25%,#fffd 0,transparent 22%);mix-blend-mode:screen;opacity:.7}
/* CINEMA REAL - desaturated practical */
.mp-cinema{background:linear-gradient(135deg,#151820,#3a3f4a 50%,#66717a)}
.mp-cinema .mp-light{left:0;top:0;width:45%;height:100%;background:linear-gradient(110deg,#fff2,transparent 60%);mix-blend-mode:screen}
/* LUXURY - black gold elegance */
.mp-luxury{background:linear-gradient(135deg,#050505,#1a1308 55%,#3a2810)}
.mp-luxury .mp-glow{right:-15%;top:-30%;width:65%;height:160%;background:radial-gradient(ellipse at 30% 50%,#ffd27cbb 0,transparent 50%);mix-blend-mode:screen}
.mp-luxury .mp-light{left:0;top:50%;width:100%;height:1px;background:linear-gradient(90deg,transparent,#ffd27c66 50%,transparent)}
/* NEON NOIR - magenta/cyan haze + scanlines */
.mp-neon{background:linear-gradient(135deg,#0a0a18,#1a1430 50%,#2d1545)}
.mp-neon .mp-glow{inset:0;background:radial-gradient(circle at 22% 75%,#ff2d9577,transparent 38%),radial-gradient(circle at 78% 25%,#00d4ff66,transparent 38%);mix-blend-mode:screen}
.mp-neon .mp-light{inset:0;background:repeating-linear-gradient(90deg,transparent 0 13px,#fff1 13px 14px);opacity:.4}
/* COSMIC - starfield */
.mp-cosmic{background:radial-gradient(ellipse at 50% 90%,#2c65a8 0,#060914 70%)}
.mp-cosmic .mp-glow{inset:0;background:radial-gradient(circle at 50% 60%,#d9f1ff55,transparent 18%);mix-blend-mode:screen}
.mp-cosmic .mp-light{inset:0;background-image:radial-gradient(#fff 0.5px,transparent 1px);background-size:11px 9px;opacity:.75}
/* FANTASY - mythic golden mist */
.mp-fantasy{background:linear-gradient(180deg,#1a0f04,#3d2510 50%,#5a3a18)}
.mp-fantasy .mp-glow{left:30%;top:-30%;width:40%;height:160%;background:radial-gradient(ellipse,#ffd27c88 0,transparent 55%);mix-blend-mode:screen}
.mp-fantasy .mp-light{inset:0;background:linear-gradient(180deg,transparent 45%,#0009)}
/* ARCHITECTURE - clean window light */
.mp-arch{background:linear-gradient(135deg,#0e1118,#2a2f3a 60%,#3a3f4a)}
.mp-arch .mp-glow{left:55%;top:0;width:32%;height:100%;background:linear-gradient(180deg,#d7dce2cc,#d7dce266 55%,transparent);mix-blend-mode:screen}
.mp-arch .mp-light{left:0;bottom:0;width:100%;height:1px;background:#d7dce244}
/* EXPLAINER - clean diagram bg */
.mp-explainer{background:linear-gradient(135deg,#0f1830,#1a2540 60%,#2c3e60)}
.mp-explainer .mp-glow{left:30%;top:30%;width:40%;height:40%;background:radial-gradient(circle,#f9731677 0,transparent 55%);mix-blend-mode:screen}
.mp-explainer .mp-light{right:20%;top:20%;width:30%;height:60%;background:radial-gradient(circle,#60a5fa66 0,transparent 60%);mix-blend-mode:screen}
/* COMMERCIAL - premium gold studio */
.mp-commercial{background:linear-gradient(135deg,#1a1408,#2a200d 50%,#3a2810)}
.mp-commercial .mp-glow{left:50%;top:0;width:50%;height:100%;background:radial-gradient(ellipse at 60% 50%,#fff4d6cc 0,#ffd27c66 30%,transparent 60%);mix-blend-mode:screen}
.mp-commercial .mp-light{left:0;bottom:20%;width:100%;height:1px;background:#fff4d633}
/* NATURAL DOCUMENTARY - overcast */
.mp-natural{background:linear-gradient(180deg,#9ba89a 0%,#6f766f 55%,#3a3f3a)}
.mp-natural .mp-glow{inset:0;background:radial-gradient(circle at 50% 20%,#d6c7a366 0,transparent 45%);mix-blend-mode:screen}

/* TAGS */
.badgeTag,.tag{font:10px var(--mono);display:inline-flex;border:1px solid var(--line);border-radius:var(--r4);color:var(--muted);padding:2px 6px;margin:4px 3px 0 0}
.tag.red{color:var(--red);border-color:#f54d6b44}
.tag.gold{color:var(--gold);border-color:#f5c84244}
.tag.green{color:var(--green);border-color:#4df5a044}

/* SCENE WORKSPACE */
.sceneWS{display:grid;grid-template-columns:minmax(360px,1fr) minmax(480px,1fr);gap:12px}
.sceneList{display:flex;flex-direction:column;gap:8px;max-height:680px;overflow:auto}
.sceneItem{border:1px solid var(--line2);background:var(--bg);border-radius:var(--r12);padding:12px;transition:border-color .12s}
.sceneItem:hover{border-color:var(--line3)}
.sceneHead{display:flex;justify-content:space-between;gap:8px;margin-bottom:7px}
.sid{font:600 10px var(--mono);color:var(--gold);letter-spacing:.04em}
.sceneActions{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.sceneActions button{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:var(--r4);padding:4px 8px;font:600 10px var(--sans);cursor:pointer;transition:all .1s}
.sceneActions button:hover{border-color:var(--line3);color:var(--text)}

/* BRIEF / FINAL */
.final{min-height:560px;font-family:var(--mono);font-size:11.5px;line-height:1.68;background:var(--bg)}
.sysout{min-height:220px;font-family:var(--mono);font-size:11px;background:var(--bg)}

/* TIP CARDS */
.tip{border:1px solid var(--line);border-radius:var(--r8);background:var(--bg);padding:9px 11px;margin-bottom:7px}
.tip b{display:block;color:var(--text);font-size:11px;font-weight:700;margin-bottom:2px}
.tip p{color:var(--muted);font-size:11px;line-height:1.5}

/* SETUP ROW */
.setupRow{display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-bottom:1px solid var(--line);font-size:11px}
.setupRow:last-child{border-bottom:0}
.setupRow span:first-child{color:var(--muted);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;padding-top:1px}
.setupRow span:last-child{font-weight:700;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}

/* TOAST */
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:9999;background:var(--s3);border:1px solid var(--line3);border-radius:var(--r8);padding:8px 16px;font:600 12px var(--sans);color:var(--text);box-shadow:0 8px 32px #000a}

/* SVG KIDS */


/* RESPONSIVE */
@media(max-width:1280px){.app{grid-template-columns:200px 1fr}.right{display:none}.g4{grid-template-columns:repeat(3,1fr)}.sceneWS{grid-template-columns:1fr}}



/* === PROJECT CARD === */
.project-card{padding:16px;min-height:160px}
.project-card .proj-tag{font:600 9px var(--mono);color:var(--gold);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;background:var(--goldglow);display:inline-block;padding:3px 7px;border-radius:var(--r4)}
.project-card h3{font-size:14px;margin-bottom:6px;color:var(--text)}
.project-card p{font-size:11.5px;line-height:1.55;margin-bottom:10px}
.project-card .sw{margin:8px 0 10px}
.project-card .sw i{height:7px;border-radius:2px}
.proj-meta{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.proj-engine{font:600 9px var(--mono);color:var(--muted);background:var(--bg);border:1px solid var(--line2);border-radius:var(--r4);padding:3px 7px;letter-spacing:.04em}
.project-card.sel .proj-tag{background:var(--gold);color:#1a1100}

/* === PALETTE CARD === */
.pal-card{padding:14px;min-height:150px}
.pal-card .pal-swatch{display:flex;gap:0;border-radius:var(--r8);overflow:hidden;height:36px;margin-bottom:10px;border:1px solid var(--line2)}
.pal-card .pal-swatch i{flex:1;display:block}
.pal-card h3{font-size:13px;margin-bottom:5px;color:var(--text)}
.pal-card p{font-size:11px;line-height:1.5;margin-bottom:8px;min-height:32px}

emarked styling.\n\n'+p.masterAddon+'\n\nTÜRKİYE CONTEXT LOCK\nEnglish prompts, Turkish visual world. Avoid foreign defaults, unintended English on-screen text, ethnic drift, generic Western look, random cultural props. Prefer Turkish / Mediterranean / Anatolian visual logic.\n\nIMAGE PHASE RULES\nFor each [text#NNN], write one image prompt.\n  - Start frame, not finished action. The frame must feel alive, dimensional, ready for motion.\n  - One scene = one idea = one focal path.\n  - Show, don\'t tell. No clutter, no random UI, no flat cardboard, no plastic skin, no generic AI look, no style clash.\n\nSHOT DIRECTOR\nPick camera by scene meaning:\n  wide       - scale and world reveal\n  medium     - interaction, dialogue\n  close-up   - emotion\n  macro      - small detail, focus pull\n  overhead   - systems, maps, patterns\n  low angle  - power, dignity\n  push-in    - discovery, slow realization\n  dolly zoom - shock, perspective break\n  rack focus - attention shift\n  orbit      - transformation\n  static     - history, prestige, dignity\n\nMOTION PHASE RULES (only after IMAGE ONAY)\nRespect each scene\'s CLIP TARGET and TAIL exactly.\nTwo dominant motion elements maximum. Stable identity. Engine-aware.\nOn-screen text only when short, large, clean, readable, intentional. Avoid long sentences, small typography, dense UI text, complex text deformation.\n\nENGINE BEHAVIOR\n  Flux         - photorealism, PBR materials, realistic lens, natural imperfection, cinematic light, skin/material realism.\n  Nano Banana  - premium 3D feature animation quality, clean staging, vibrant controlled palette, readable composition, expressive but stable child characters.\n  Kling motion - controlled start-frame motion, approach -> pause -> break/change -> reaction -> stabilize. Two dominant moving elements max.\n  Runway motion- concise subject-action-camera-lighting language, stable background unless intended, moderate motion intensity.\n  Luma motion  - spatial continuity, cinematic camera path, atmosphere, environment persistence, graceful movement, stable scene identity.\n\nOUTPUT FORMAT\nFor each scene Mami sends:\n[text#NNN]\nVO DURATION / CLIP TARGET / TAIL - echo exactly from the brief\nIMAGE PROMPT:\n<English image prompt, start frame ready for motion, alive but not finished>\n\nPRODUCTION NOTE:\n<short Turkish note: shot type, light intent, duration concern if any, context lock if any>\n\nDo not output motion prompts during IMAGE PHASE. Do not explain the system to Mami. Preserve all [text#NNN] labels exactly.\n\nSUNO / MUSIC (when useful)\nProvide narration-friendly instrumental Suno prompts: genre, instrumentation, BPM, mood, energy curve, arrangement, cinematic texture, mixing note, avoid list, negative prompt. No vocals unless explicitly requested.\n\nINTERACTION STYLE WITH MAMI\nConcise, direct, non-emotive. No emojis, no filler, no padding. Maximum two sentences before action. Push back on weak ideas. Maintain high standards.';

function estimateVO(text){

  let words=clean.split(/\s+/).filter(Boolean).length;

function sentenceSplit(text){
  // Returns array of sentences with .!? as boundaries, preserving punctuation
  let clean=String(text||'').replace(/\s+/g,' ').trim();
  if(!clean)return[];
  // Split on .!? but keep them with the previous sentence; handle ... and !?
  let raw=clean.match(/[^.!?]+[.!?]+(?=\s|$)|[^.!?]+$/g)||[clean];
  return raw.map(s=>s.trim()).filter(Boolean);
}
function commaSplit(sentence){

/* Reference name -> world key mapping */
function getWorldKey(ref){
  if(!ref) return null;
  let n = (ref.name||'').toLowerCase();
  if(n.includes('bleach')) return 'bleach';
  if(n.includes('one piece')) return 'one-piece';
  if(n.includes('naruto')) return 'naruto';
  if(n.includes('hunter x hunter')||n.includes('hxh')) return 'hxh';
  if(n.includes('demon slayer')) return 'demon-slayer';
  if(n.includes('jujutsu')) return 'jjk';
  if(n.includes('my hero')) return 'my-hero';
  if(n.includes('dragon ball')) return 'dragon-ball';
  if(n.includes('haikyuu')) return 'haikyuu';

window.selectedRefStrip=function(){let r=findRef();if(!r)return `<div class="warn" style="margin-bottom:12px">Henüz referans seçilmedi. Kart seçince palette, engine, world ve pixel preview birlikte güncellenir.</div>`;return `<div class="selected-ref-strip">${miniPrev(r)}<div><div class="selected-ref-kicker">Selected Reference · ${REFERENCES.length} curated refs</div><div class="selected-ref-title">${safe(r.name)}</div><div class="selected-ref-copy">${safe(r.look)}</div><div class="selected-ref-meta"><span class="badgeTag">${safe(r.category)}</span><span class="badgeTag">${safe(r.imageEngine)}</span><span class="badgeTag">${safe(r.motionEngine)}</span><span class="badgeTag mode-${r.previewMode}">pixel-v322</span></div></div></div>`};
window.renderReference=function(){let cats=[...new Set(REFERENCES.map(r=>r.category))],q=ui.referenceSearch.toLowerCase().trim();let searchList=q?REFERENCES.filter(r=>(r.name+' '+r.category+' '+r.look+' '+r.bestFor).toLowerCase().includes(q)):null;let selected=selectedRefStrip();let refCard=r=>`<div class="card ref-card ${production.reference===r.name?'sel':''}" onclick='applyRef(${JSON.stringify(r)})'>${miniPrev(r)}<div><h3>${safe(r.name)}</h3><p>${safe(r.look)}</p><div class="ref-meta"><span class="badgeTag">${safe(r.imageEngine)}</span><span class="badgeTag">${safe(r.motionEngine)}</span><span class="badgeTag mode-${r.previewMode}">pixel-v322</span></div></div></div>`;if(searchList!==null){return selected+`<div class="ref-toolbar"><input class="ref-search" placeholder="Ara: Bleach, Caravaggio, Atatürk, Piper..." value="${safe(ui.referenceSearch)}" oninput="ui.referenceSearch=this.value;save();render()"><button class="ref-clear" onclick="ui.referenceSearch='';save();render()">✕</button><div class="ref-counter">${searchList.length} sonuç</div></div>${searchList.length?`<div class="grid g3">${searchList.map(refCard).join('')}</div>`:'<div class="warn" style="margin-top:14px">Sonuç yok - aramayı temizle.</div>'}`;}return selected+`<div class="ref-toolbar"><input class="ref-search" placeholder="Ara: Bleach, Caravaggio, Atatürk, Piper..." value="${safe(ui.referenceSearch)}" oninput="ui.referenceSearch=this.value;save();render()"><div class="ref-counter">${REFERENCES.length} ref</div></div>${cats.map(c=>{let refs=REFERENCES.filter(r=>r.category===c);let open=isCatOpen(c);let emoji=getCatEmoji(c);return `<div class="acc-section"><button class="acc-head ${open?'open':''}" onclick="toggleCat('${c}')"><span class="acc-emoji">${emoji}</span><span class="acc-title">${c}</span><span class="acc-count">${refs.length}</span><span class="acc-chevron">${open?'▲':'▼'}</span></button>${open?`<div class="acc-body"><div class="grid g3">${refs.map(refCard).join('')}</div></div>`:''}</div>`}).join('')}`};
REFERENCES.forEach(r=>{r.previewMode='pixel-v322'; if(/placeholder|gradient/i.test(r.look||''))r.look=(r.name||'Reference')+' pixel preview grammar: unique silhouette, props, environment, palette-reactive lighting.'});
try{render();}catch(e){console.error('MAMILAS v322 preview rebuild render error',e)}
})();
</script>
