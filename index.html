      <div class="brainItem"><b>Always Refreshable</b> Mami 'sıfırdan yenile' dediğinde bu bölüm güncel production doctrine olarak yenilenir.</div>
    </div></div>
    <div class="academyHero"><h2>${esc(k)}</h2><p>Seçili mod, sahne kurarken hangi karar sistemine odaklanacağını söyler.</p></div><div class="tabs">${keys.map(x=>`<button class="tab ${k===x?'on':''}" onclick="S.academy='${x}';save();render()">${x}</button>`).join('')}</div><div class="grid g2">${items.map(i=>`<div class="card academyCard"><b>${esc(i[0])}</b><span>${esc(i[1])}</span></div>`).join('')}</div>`
  };

  window.sceneDuplicate=function(id){ const arr=sceneBlocks(); const i=arr.findIndex(x=>x.id===id); if(i<0)return; const item={id:nextSceneId(arr), text:arr[i].text}; arr.splice(i+1,0,item); serializeSceneBlocks(arr); S.sceneSelected=item.id; save(); render(); toast('Sahne kopyalandı'); };
  window.sceneMove=function(id,dir){ const arr=sceneBlocks(); const i=arr.findIndex(x=>x.id===id); const j=i+dir; if(i<0||j<0||j>=arr.length) return; [arr[i],arr[j]]=[arr[j],arr[i]]; serializeSceneBlocks(arr); save(); render(); toast('Sahne taşındı'); };
  renderScenes=function(){
    const blocks=sceneBlocks(); const selected=selectedBlock();
    const totalWords=blocks.reduce((a,b)=>a+cleanText(b.text).split(/\s+/).filter(Boolean).length,0);
    const warnings=blocks.filter(b=>sceneTiming(b).vo>sceneTiming(b).limit || sceneTiming(b).tail<0).length;
    const selectedEditor=selected?(()=>{ const t=sceneTiming(selected), meta=S.sceneMeta?.[selected.id]||{}; return `<div class="sceneEditor"><h3>[text#${selected.id}] Seçili sahne</h3><div class="sceneDurGrid"><div><label>VO duration</label><input type="number" step="0.5" placeholder="${t.vo}" value="${meta.vo??''}" oninput="sceneSetMeta('${selected.id}','vo',this.value)"></div><div><label>Clip target</label><input type="number" step="0.5" placeholder="${t.clip}" value="${meta.clip??''}" oninput="sceneSetMeta('${selected.id}','clip',this.value)"></div><div><label>Tail</label><input disabled value="${t.tail}s"></div></div><textarea onblur="sceneUpdateText('${selected.id}',this.value)">${esc(selected.text)}</textarea><div class="sceneActions"><button class="gold" onclick="sceneSplit('${selected.id}')">Böl</button><button onclick="sceneAdd()">Altına sahne ekle</button><button onclick="sceneDuplicate('${selected.id}')">Kopyala</button><button onclick="sceneMove('${selected.id}',-1)">Yukarı</button><button onclick="sceneMove('${selected.id}',1)">Aşağı</button><button onclick="sceneRename('${selected.id}')">text# değiştir</button><button onclick="sceneClearMeta('${selected.id}')">Süreyi otomatiğe al</button><button onclick="sceneDelete('${selected.id}')">Sil</button></div></div>`; })():'';
    const list=blocks.map(b=>{ const t=sceneTiming(b); const warn=t.vo>t.limit || t.tail<0; return `<div class="sceneCard ${S.sceneSelected===b.id?'on':''}"><div class="sceneTop"><span class="sceneId">[text#${b.id}]</span><button class="button ${S.sceneSelected===b.id?'gold':''}" onclick="sceneSelect('${b.id}')">Seç</button></div><div class="sceneBadges"><span class="sceneBadge ${t.vo>t.limit?'err':''}">VO ${t.vo}s</span><span class="sceneBadge">CLIP ${t.clip}s</span><span class="sceneBadge ${t.tail<0?'err':t.tail<1?'warn':''}">TAIL ${t.tail}s</span><span class="sceneBadge ${warn?'warn':''}">${t.manual?'MANUAL':'AUTO'}</span></div><div class="sceneText">${esc(b.text||'Boş sahne')}</div><div class="sceneActions"><button onclick="sceneSelect('${b.id}')">Edit</button><button onclick="sceneSplit('${b.id}')">Böl</button><button onclick="sceneDuplicate('${b.id}')">Kopyala</button><button onclick="sceneMove('${b.id}',-1)">↑</button><button onclick="sceneMove('${b.id}',1)">↓</button><button onclick="sceneDelete('${b.id}')">Sil</button></div></div>`; }).join('');
    return header('Scenes','Kilit bölüm: bölme, seçme, text# kilidi, manuel/otomatik süre ve Final Brief duration echo burada.')+`<div class="scenePanel"><div class="sceneMiniGrid"><div class="sceneMetric"><b>${blocks.length}</b><span>Sahne</span></div><div class="sceneMetric"><b>${totalWords}</b><span>Kelime</span></div><div class="sceneMetric"><b>${warnings}</b><span>Risk</span></div></div><div class="sceneTools"><button class="button gold" onclick="sceneNumberRaw()">text# numarala/kilitle</button><button class="button" onclick="sceneAdd()">Sahne ekle</button><button class="button" onclick="S.scenes='';S.sceneSelected='';save();render()">Temizle</button><button class="button gold" onclick="setTab('brief')">Final Brief →</button></div>${selectedEditor}<div class="muted" style="margin-top:12px">Ham batch alanı. [text#001] formatı korunur.</div><textarea class="sceneRaw" placeholder="[text#001]&#10;Sahne metni...&#10;&#10;[text#002]&#10;Sahne metni..." oninput="S.scenes=this.value;save()">${esc(S.scenes)}</textarea><div class="sceneList">${list}</div></div>`
  };

  document.title='MAMILAS Reborn v500 Pixel Brain';
})();

render();

</script>
</body></html>
